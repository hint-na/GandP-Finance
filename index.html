<script>
// =====================================================
// SUPABASE CLIENT
// =====================================================
// Public domain used for all client-facing links (upload / signature / agreement / apply)
const PUBLIC_APP_URL = 'https://www.gpl-finance.com/';

const SUPABASE_URL = 'https://ockgaeriotbczxavyeyn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sAK3POeuE2Yyx3uEHBStBw_btNjQCV4';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

// =====================================================
// CASE CONVERSION (Postgres snake_case ↔ JS camelCase)
// =====================================================
function snakeToCamel(obj) {
  if (obj === null || obj === undefined) return obj;
  if (Array.isArray(obj)) return obj.map(snakeToCamel);
  if (typeof obj !== 'object') return obj;
  const result = {};
  for (const key in obj) {
    const camel = key.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
    result[camel] = obj[key];
  }
  return result;
}

// =====================================================
// STATE
// =====================================================
let state = {
  users: [],
  clients: [],
  loans: [],
  payments: [],
  audit: [],
  products: [],
  clientLinks: [],
  settings: {},
  currentUser: null,
  currentView: 'dashboard',
  currentReportTab: 'daily',
  currentSettingsTab: 'company',
  pendingKyc: {},
  filters: {
    clients: '',
    loans: { search: '', status: 'all', officer: 'all' },
    payments: { search: '', method: 'all', from: '', to: '' }
  },
  bulkSelection: { loans: new Set() },
  charts: {}
};

// =====================================================
// REFERENCE NUMBER DISPLAY HELPERS (must load before renders)
// =====================================================
function loanRef(loan) {
  if (!loan) return '';
  return loan.refNo || (loan.id ? loan.id.substring(0, 8) : '');
}
function clientRef(client) {
  if (!client) return '';
  return client.refNo || (client.id ? client.id.substring(0, 8) : '');
}
function paymentRef(payment) {
  if (!payment) return '';
  return payment.refNo || (payment.id ? payment.id.substring(0, 8) : '');
}
function loanRefById(loanId) {
  const l = state.loans.find(x => x.id === loanId);
  return loanRef(l);
}
function clientRefById(clientId) {
  const c = state.clients.find(x => x.id === clientId);
  return clientRef(c);
}

// =====================================================
// DATA LOADING (from Supabase)
// =====================================================
async function loadData() {
  try {
    const [clientsRes, loansRes, paymentsRes, productsRes, settingsRes, auditRes, profilesRes, linksRes, applicationsRes, capitalRes, bankStRes, bankTxRes] = await Promise.all([
      db.from('clients').select('*').order('registration_date', {ascending: false}),
      db.from('loans').select('*').order('disbursement_date', {ascending: false}),
      db.from('payments').select('*').order('payment_date', {ascending: false}),
      db.from('products').select('*').order('name'),
      db.from('settings').select('*').eq('id', 1).maybeSingle(),
      db.from('audit').select('*').order('timestamp', {ascending: false}).limit(500),
      db.from('profiles').select('*'),
      db.from('client_links').select('*').order('created_at', {ascending: false}),
      db.from('loan_applications').select('*').order('submitted_at', {ascending: false}),
      db.from('capital_investments').select('*').order('invested_on', {ascending: false}),
      db.from('bank_statements').select('*').order('created_at', {ascending: false}),
      db.from('bank_transactions').select('*').order('tx_date', {ascending: false})
    ]);
    state.clients = (clientsRes.data || []).map(snakeToCamel);
    state.loans = (loansRes.data || []).map(snakeToCamel);
    state.payments = (paymentsRes.data || []).map(snakeToCamel);
    state.products = (productsRes.data || []).map(snakeToCamel);
    state.settings = settingsRes.data ? snakeToCamel(settingsRes.data) : {};
    if (state.settings.logo) localStorage.setItem('gpl_company_logo', state.settings.logo);
    state.audit = (auditRes.data || []).map(snakeToCamel);
    state.users = (profilesRes.data || []).map(snakeToCamel);
    state.clientLinks = (linksRes.data || []).map(snakeToCamel);
    state.applications = (applicationsRes.data || []).map(snakeToCamel);
    state.capital = (capitalRes.data || []).map(snakeToCamel);
    state.bankStatements = (bankStRes.data || []).map(snakeToCamel);
    state.bankTx = (bankTxRes.data || []).map(snakeToCamel);
    // Normalize field names
    if (state.settings.penaltyConfig) state.settings.penalty = state.settings.penaltyConfig;
    if (!state.settings.penalty) state.settings.penalty = { enabled: false, type: 'percentage', amount: 5, basis: 'instalment', frequency: 'monthly', gracePeriodDays: 3, maxPenaltyPercent: 100 };
    state.settings.sync = { enabled: false };
    // Ensure all loans have schedules
    state.loans.forEach(l => { if (!l.schedule || l.schedule.length === 0) l.schedule = generateSchedule(l); });
  } catch (e) {
    console.error('Load error:', e);
  }
  updateStatusBar();
}

async function saveSettings() {
  const record = {
    company_name: state.settings.companyName,
    namfisa_reg: state.settings.namfisaReg,
    address: state.settings.address,
    phone: state.settings.phone,
    email: state.settings.email,
    default_rate: state.settings.defaultRate,
    default_term: state.settings.defaultTerm,
    penalty_config: state.settings.penalty || {},
    logo: state.settings.logo || null,
    updated_by: state.currentUser?.id
  };
  const { error } = await db.from('settings').update(record).eq('id', 1);
  if (error && /logo/i.test(error.message)) {
    showAlert('The database needs a one-time update to store the logo. Run this in the Supabase SQL Editor, then save again:\n\nalter table public.settings add column if not exists logo text;', 'One-Time Setup Needed');
    throw error;
  }
  if (error) { showAlert('Settings save failed: ' + error.message, 'Storage Error'); throw error; }
}

async function saveTable(name) {
  // Reload from Supabase to sync state
  const tableMap = { clients: 'clients', loans: 'loans', payments: 'payments', products: 'products', audit: 'audit', users: 'profiles', clientLinks: 'client_links', applications: 'loan_applications', capital: 'capital_investments', bankStatements: 'bank_statements', bankTx: 'bank_transactions' };
  const table = tableMap[name];
  if (!table) return;
  const orderMap = { clients: 'registration_date', loans: 'disbursement_date', payments: 'payment_date', audit: 'timestamp', clientLinks: 'created_at', applications: 'submitted_at', capital: 'invested_on', bankStatements: 'created_at', bankTx: 'tx_date' };
  let q = db.from(table).select('*');
  if (orderMap[name]) q = q.order(orderMap[name], { ascending: false });
  if (name === 'audit') q = q.limit(500);
  const { data } = await q;
  state[name] = (data || []).map(snakeToCamel);
  if (name === 'loans') state.loans.forEach(l => { if (!l.schedule || l.schedule.length === 0) l.schedule = generateSchedule(l); });
  updateStatusBar();
}

function updateStatusBar() {
  const el = document.getElementById('storage-status');
  if (el) el.textContent = `${state.clients.length} clients · ${state.loans.length} loans · ${state.payments.length} payments`;
}

// =====================================================
// HELPERS
// =====================================================
const fmt = (n) => 'N$ ' + (n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '-';
const fmtDateTime = (d) => d ? new Date(d).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-';
const genId = (prefix) => prefix + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2, 4).toUpperCase();
const today = () => {
  // Use local timezone, not UTC, to avoid date shifts near midnight
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
};
const daysBetween = (d1, d2) => Math.floor((new Date(d2) - new Date(d1)) / (1000 * 60 * 60 * 24));
const escapeHtml = (s) => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function hashPassword(pw) {
  const buf = new TextEncoder().encode(pw);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// =====================================================
// PERMISSIONS
// =====================================================
const PERMS = {
  'Administrator': {
    clients: ['create','read','update','delete'],
    loans: ['create','read','update','delete'],
    payments: ['create','read','update','delete'],
    users: ['create','read','update','delete'],
    reports: ['read'], audit: ['read']
  },
  'Loan Officer': {
    clients: ['create','read','update'], loans: ['create','read','update'],
    payments: ['create','read','update'], users: [], reports: ['read'], audit: []
  },
  'Cashier': {
    clients: ['read'], loans: ['read'], payments: ['create','read'],
    users: [], reports: ['read'], audit: []
  },
  'Auditor': {
    clients: ['read'], loans: ['read'], payments: ['read'],
    users: [], reports: ['read'], audit: ['read']
  }
};

function can(action, entity) {
  if (!state.currentUser) return false;
  const p = PERMS[state.currentUser.role];
  return p && p[entity] && p[entity].includes(action);
}

function requirePerm(action, entity) {
  if (!can(action, entity)) {
    showAlert(`You don't have permission to ${action} ${entity}.`, 'Permission Denied');
    return false;
  }
  return true;
}

// =====================================================
// AUDIT TRAIL
// =====================================================
async function logAudit(action, entity, entityId, details = {}) {
  const entry = {
    timestamp: new Date().toISOString(),
    user_id: state.currentUser?.id || null,
    user_name: state.currentUser?.fullName || 'System',
    action, entity, entity_id: entityId ? String(entityId) : null,
    details
  };
  try {
    await db.from('audit').insert(entry);
    state.audit.unshift(snakeToCamel(entry));
    if (state.audit.length > 500) state.audit = state.audit.slice(0, 500);
  } catch (e) { console.warn('Audit log failed:', e); }
}

function diffObjects(before, after, ignoreFields = ['updatedAt', 'createdAt']) {
  const changes = {};
  const allKeys = new Set([...Object.keys(before || {}), ...Object.keys(after || {})]);
  for (const k of allKeys) {
    if (ignoreFields.includes(k)) continue;
    if (typeof before[k] === 'object' || typeof after[k] === 'object') continue;
    if (before[k] !== after[k]) changes[k] = { before: before[k], after: after[k] };
  }
  return changes;
}

// =====================================================
// PAYMENT SCHEDULE
// =====================================================
function generateSchedule(loan) {
  const schedule = [];
  const baseDate = new Date(loan.disbursementDate);
  // First instalment lands on the client's payday when one was chosen;
  // later instalments follow monthly from it.
  const firstDue = loan.firstPaymentDate ? new Date(loan.firstPaymentDate) : null;
  let remaining = loan.totalRepayable;
  for (let i = 1; i <= loan.termMonths; i++) {
    const dueDate = firstDue ? new Date(firstDue) : new Date(baseDate);
    dueDate.setMonth(dueDate.getMonth() + (firstDue ? i - 1 : i));
    const amount = (i === loan.termMonths) ? remaining : loan.monthlyInstallment;
    remaining -= amount;
    schedule.push({
      instalmentNo: i,
      dueDate: dueDate.toISOString().split('T')[0],
      amountDue: Math.round(amount * 100) / 100,
      amountPaid: 0,
      status: 'Pending'
    });
  }
  return schedule;
}

function ensureSchedule(loan) {
  if (!loan.schedule || loan.schedule.length === 0) {
    loan.schedule = generateSchedule(loan);
  }
  return loan.schedule;
}

function allocatePayments(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return;
  const schedule = ensureSchedule(loan);
  // Reset
  schedule.forEach(s => { s.amountPaid = 0; s.status = 'Pending'; });
  // Get payments sorted by date
  const payments = state.payments
    .filter(p => p.loanId === loanId)
    .sort((a, b) => a.paymentDate.localeCompare(b.paymentDate));
  let pool = payments.reduce((s, p) => s + p.amount, 0);
  // FIFO allocation: oldest unpaid instalment first
  for (const inst of schedule) {
    if (pool <= 0.01) break;
    const alloc = Math.min(pool, inst.amountDue);
    inst.amountPaid = Math.round(alloc * 100) / 100;
    pool -= alloc;
  }
  // Status
  const today_ = today();
  schedule.forEach(s => {
    if (s.amountPaid >= s.amountDue - 0.01) s.status = 'Paid';
    else if (s.amountPaid > 0 && s.dueDate < today_) s.status = 'Partial';
    else if (s.amountPaid > 0) s.status = 'Partial';
    else if (s.dueDate < today_) s.status = 'Overdue';
    else s.status = 'Pending';
  });
}

function reallocateAllSchedules() {
  state.loans.forEach(l => allocatePayments(l.id));
}

// =====================================================
// CALCULATIONS
// =====================================================
function calcLoan(principal, rate, term) {
  const totalRepayable = principal + (principal * rate / 100);
  const monthlyInstallment = Math.round((totalRepayable / term) * 100) / 100;
  return { totalRepayable, monthlyInstallment };
}

function loanPaid(loanId) {
  return state.payments.filter(p => p.loanId === loanId).reduce((s, p) => s + p.amount, 0);
}

function loanOutstanding(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return 0;
  const penalties = totalPenalties(loanId);
  return Math.round((loan.totalRepayable + penalties - loanPaid(loanId)) * 100) / 100;
}

function loanOutstandingExclPenalty(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return 0;
  return Math.round((loan.totalRepayable - loanPaid(loanId)) * 100) / 100;
}

function clientName(clientId) {
  const c = state.clients.find(c => c.id === clientId);
  return c ? c.fullName : '—';
}

function isOverdue(loan) {
  if (loan.status !== 'Active') return false;
  const schedule = ensureSchedule(loan);
  return schedule.some(s => s.status === 'Overdue');
}

function daysOverdue(loan) {
  const schedule = ensureSchedule(loan);
  const overdue = schedule.filter(s => s.status === 'Overdue');
  if (overdue.length === 0) return 0;
  const oldest = overdue.reduce((a, b) => a.dueDate < b.dueDate ? a : b);
  return daysBetween(oldest.dueDate, today());
}

// =====================================================
// AUTH (Supabase)
// =====================================================
async function attemptLogin(email, password) {
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) return { ok: false, msg: error.message };
  // Load user profile
  const { data: profile } = await db.from('profiles').select('*').eq('id', data.user.id).maybeSingle();
  if (!profile) return { ok: false, msg: 'User profile not found. Contact administrator.' };
  if (!profile.active) return { ok: false, msg: 'Account is inactive. Contact administrator.' };
  state.currentUser = { id: data.user.id, email: data.user.email, fullName: profile.full_name, role: profile.role };
  await logAudit('login', 'user', data.user.id, { username: data.user.email });
  return { ok: true };
}

async function logout() {
  if (state.currentUser) {
    await logAudit('logout', 'user', state.currentUser.id, { username: state.currentUser.email });
  }
  window._intentionalLogout = true;
  await db.auth.signOut();
  window._intentionalLogout = false;
  state.currentUser = null;
  state.notifications = [];
  if (window._notificationChannel) {
    db.removeChannel(window._notificationChannel);
    window._notificationChannel = null;
  }
  if (window._dataChannel) {
    db.removeChannel(window._dataChannel);
    window._dataChannel = null;
  }
  document.title = window._originalTitle || 'GPL Finance';
  renderApp();
}

async function restoreSession() {
  const { data } = await db.auth.getSession();
  if (data?.session?.user) {
    const { data: profile } = await db.from('profiles').select('*').eq('id', data.session.user.id).maybeSingle();
    if (profile && profile.active) {
      state.currentUser = { id: data.session.user.id, email: data.session.user.email, fullName: profile.full_name, role: profile.role };
      return true;
    }
  }
  return false;
}

// -----------------------------------------------------
// SESSION-EXPIRY WATCHDOG
// A login can silently die (refresh token expired/revoked) while the UI
// still shows the user as signed in; the database then rejects every save
// with a row-level security error. Detect it and force a clean re-login.
// -----------------------------------------------------
function handleSessionExpired() {
  if (!state.currentUser) return;
  state.currentUser = null;
  state.notifications = [];
  if (window._notificationChannel) {
    db.removeChannel(window._notificationChannel);
    window._notificationChannel = null;
  }
  if (window._dataChannel) {
    db.removeChannel(window._dataChannel);
    window._dataChannel = null;
  }
  document.title = window._originalTitle || 'GPL Finance';
  renderApp();
  showAlert('Your login session has expired. Please sign in again to continue.', 'Session Expired');
}

async function verifySessionAlive() {
  if (!state.currentUser) return;
  try {
    const { data } = await db.auth.getSession();
    if (!data?.session) handleSessionExpired();
  } catch (e) { /* offline — leave the session alone */ }
}

db.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT' && state.currentUser && !window._intentionalLogout) handleSessionExpired();
});
document.addEventListener('visibilitychange', () => { if (!document.hidden) verifySessionAlive(); });
setInterval(verifySessionAlive, 60000);

// COMPANY LOGO
// Stored as a small image in settings; shown in the app header, the
// login screen (cached locally so it appears before sign-in), and on
// PDF documents (agreements and receipts).
// =====================================================
function applyCompanyLogo() {
  const logo = state.settings?.logo || localStorage.getItem('gpl_company_logo') || '';
  ['app-logo-login', 'app-logo-sidebar', 'app-logo-mobile'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (logo) {
      el.innerHTML = `<img src="${logo}" alt="logo" style="width:100%; height:100%; object-fit:contain; border-radius:inherit;">`;
      el.classList.remove('bg-blue-700');
      el.style.background = 'white';
    } else {
      el.innerHTML = 'GPL';
      el.classList.add('bg-blue-700');
      el.style.background = '';
    }
  });
  // Preload for PDF generation (needs the image dimensions synchronously)
  if (logo && (!window._logoImg || window._logoImg.src !== logo)) {
    window._logoImg = new Image();
    window._logoImg.src = logo;
  }
  if (!logo) window._logoImg = null;
  applyDynamicAppIcons(logo);
}

// Rebuild the install icons (home-screen icon, browser tab) from the
// company logo, so "Add to Home Screen" installs show the real brand.
function applyDynamicAppIcons(logo) {
  if (!logo || window._iconsApplied === logo) return;
  const img = new Image();
  img.onload = () => {
    window._iconsApplied = logo;
    const iconFor = (size) => {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);
      const pad = size * 0.12;
      const ratio = img.width / img.height;
      let w = size - 2 * pad, h = w / ratio;
      if (h > size - 2 * pad) { h = size - 2 * pad; w = h * ratio; }
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      return c.toDataURL('image/png');
    };
    // Android / Chrome install icon via a rebuilt manifest
    const manifest = {
      name: 'GPL Finance',
      short_name: 'GPL Finance',
      description: 'Cash loan management system for GPL Finance',
      start_url: new URL('./', location.href).href,
      scope: new URL('./', location.href).href,
      display: 'standalone',
      orientation: 'portrait-primary',
      background_color: '#f8fafc',
      theme_color: '#1e40af',
      icons: [
        { src: iconFor(512), sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
        { src: iconFor(192), sizes: '192x192', type: 'image/png', purpose: 'any' }
      ]
    };
    const mLink = document.querySelector('link[rel="manifest"]');
    if (mLink) mLink.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
    // iPhone home-screen icon
    let apple = document.querySelector('link[rel="apple-touch-icon"]');
    if (!apple) { apple = document.createElement('link'); apple.rel = 'apple-touch-icon'; document.head.appendChild(apple); }
    apple.href = iconFor(180);
    // Browser tab icon
    const fav = document.querySelector('link[rel="icon"]');
    if (fav) fav.href = iconFor(64);
  };
  img.src = logo;
}

// Draws the logo centred at the top of a PDF; returns the updated y position.
function addPdfLogo(doc, s, pageW, y) {
  const logo = s.logo || state.settings?.logo;
  if (!logo || !window._logoImg?.complete || !window._logoImg.naturalHeight) return y;
  try {
    const ratio = window._logoImg.naturalWidth / window._logoImg.naturalHeight;
    const h = 14;
    const w = Math.min(h * ratio, 60);
    doc.addImage(logo, 'PNG', pageW / 2 - w / 2, y - 4, w, h);
    return y + h + 2;
  } catch (e) { return y; }
}

  else if (v === 'capital') c.innerHTML = renderCapital();
  else if (v === 'bankrecon') c.innerHTML = renderBankRecon();
  else if (v === 'data') { c.innerHTML = renderDataManagement(); setTimeout(hydrateCloudBackups, 50); }
  else if (v === 'settings') c.innerHTML = renderSettings();
  // Init lender signature pad when on the Signature settings tab
  if (v === 'settings' && state.currentSettingsTab === 'signature') {
    setTimeout(() => initLenderSignaturePad(), 50);
  }
  // Update push toggle state on notifications tab
  if (v === 'settings' && state.currentSettingsTab === 'notifications') {
    pushEnabledOnDevice().then(enabled => {
      const container = document.getElementById('push-toggle-container');
      if (container) container.innerHTML = renderPushToggleUI(enabled);
    });
  }
  // Update mobile view title
  const titleEl = document.getElementById('mobile-view-title');
  if (titleEl) {
    const titles = {
      dashboard: 'Dashboard', loans: 'Loans', clients: 'Clients', applications: 'Applications',
      payments: 'Payments', reminders: 'Reminders', reports: 'Reports',
      users: 'Users', audit: 'Audit Log', capital: 'Capital Investment', bankrecon: 'Bank Recon', data: 'Backup & Export', settings: 'Settings'
    };
    titleEl.textContent = titles[v] || 'GPL Finance';
  }
  // Auto-close mobile sidebar after navigation
  toggleMobileSidebar(false);
  // After DOM is ready, init any charts for dashboard
  if (v === 'dashboard') setTimeout(initDashboardCharts, 50);
}

function toggleMobileSidebar(open) {
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.querySelector('.mobile-backdrop');
  if (!sidebar) return;
  if (open) {
    sidebar.classList.add('mobile-open');
    if (backdrop) backdrop.classList.add('active');
  } else {
    sidebar.classList.remove('mobile-open');
    if (backdrop) backdrop.classList.remove('active');
  }
}

function renderDashboard() {
  const activeLoans = state.loans.filter(l => l.status === 'Active');
  const totalOutstanding = activeLoans.reduce((s, l) => s + loanOutstanding(l.id), 0);
  const totalDisbursed = activeLoans.reduce((s, l) => s + l.principal, 0);
  const thisMonth = new Date().toISOString().slice(0, 7);
  const collectionsMTD = state.payments.filter(p => p.paymentDate.startsWith(thisMonth)).reduce((s, p) => s + p.amount, 0);
  const overdueLoans = state.loans.filter(isOverdue);
  const overdueAmount = overdueLoans.reduce((s, l) => {
    return s + ensureSchedule(l).filter(i => i.status === 'Overdue').reduce((x, i) => x + (i.amountDue - i.amountPaid), 0);
  }, 0);

  // Expected today
  const today_ = today();
  const dueToday = state.loans.flatMap(l => ensureSchedule(l).filter(i => i.dueDate === today_ && i.status !== 'Paid').map(i => ({ loan: l, inst: i })));
  const expectedToday = dueToday.reduce((s, x) => s + (x.inst.amountDue - x.inst.amountPaid), 0);

  const recentLoans = [...state.loans].sort((a,b) => b.disbursementDate.localeCompare(a.disbursementDate)).slice(0, 5);

      <div class="card p-5"><div class="text-xs font-medium text-slate-500 uppercase">Collections MTD</div><div class="text-3xl font-bold text-green-700 mt-2">${fmt(collectionsMTD)}</div><div class="text-xs text-slate-500 mt-1">${state.payments.filter(p => p.paymentDate.startsWith(thisMonth)).length} payments</div></div>
      <div class="card p-5"><div class="text-xs font-medium text-slate-500 uppercase">Overdue</div><div class="text-3xl font-bold text-red-700 mt-2">${overdueLoans.length}</div><div class="text-xs text-slate-500 mt-1">${fmt(overdueAmount)} arrears</div></div>
    </div>

    <div class="card p-5 mb-6 bg-blue-50 border-blue-200">
      <div class="flex justify-between items-center">

        <div class="flex gap-2">

          <h3 class="font-semibold text-slate-900">Recent Loans</h3>

function renderLoans() {
  const f = state.filters.loans;
  const q = (f.search || '').toLowerCase().trim();
  let filtered = [...state.loans];
  if (q) {
    filtered = filtered.filter(l => {
      const c = state.clients.find(c => c.id === l.clientId);
      return (l.id || '').toLowerCase().includes(q) ||
             (c?.fullName || '').toLowerCase().includes(q) ||
             (c?.phone || '').includes(q) ||
             (c?.idNumber || '').toLowerCase().includes(q);
    });
  }
  if (f.status !== 'all') {
    if (f.status === 'Overdue') filtered = filtered.filter(l => isOverdue(l));
    else filtered = filtered.filter(l => l.status === f.status);
  }
  if (f.officer !== 'all') filtered = filtered.filter(l => l.createdBy === f.officer);

  const selectedCount = state.bulkSelection.loans.size;
  const allOnPageSelected = filtered.length > 0 && filtered.every(l => state.bulkSelection.loans.has(l.id));
  const officers = [...new Set(state.loans.map(l => l.createdBy).filter(Boolean))]
    .map(id => state.users.find(u => u.id === id))
    .filter(Boolean);

  return `
    <div class="mb-6 flex justify-between items-center">
      <div><h1 class="text-2xl font-bold text-slate-900">Loans</h1><p class="text-slate-500 text-sm mt-1">${state.loans.length} total · ${filtered.length} shown${selectedCount ? ` · <span class="text-blue-700 font-medium">${selectedCount} selected</span>` : ''}</p></div>
      <div class="flex gap-2">
        ${selectedCount > 0 && can('update','loans') ? `<button onclick="openBulkLoanActions()" class="text-sm bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">Bulk Actions (${selectedCount}) <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></button>` : ''}
        ${can('create','loans') ? `<button onclick="openLoanForm()" class="btn-primary flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>New Loan</button>` : ''}
      </div>
    </div>
    <div class="card p-4 mb-4">
      <div class="grid grid-cols-4 gap-3">
        <div class="col-span-2 relative">
          <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search loan ID, client name, phone, or ID..." style="padding-left: 36px;" value="${escapeHtml(f.search || '')}" oninput="state.filters.loans.search = this.value; debouncedRender();">
        </div>
        <select onchange="state.filters.loans.status = this.value; render();">
          <option value="all" ${f.status==='all'?'selected':''}>All statuses</option>
          <option value="Active" ${f.status==='Active'?'selected':''}>Active</option>
          <option value="Pending" ${f.status==='Pending'?'selected':''}>Pending</option>
          <option value="Overdue" ${f.status==='Overdue'?'selected':''}>Overdue</option>
          <option value="Completed" ${f.status==='Completed'?'selected':''}>Completed</option>
          <option value="Defaulted" ${f.status==='Defaulted'?'selected':''}>Defaulted</option>
          <option value="Written Off" ${f.status==='Written Off'?'selected':''}>Written Off</option>
        </select>
        ${officers.length > 1 ? `<select onchange="state.filters.loans.officer = this.value; render();">
          <option value="all" ${f.officer==='all'?'selected':''}>All officers</option>
          ${officers.map(o => `<option value="${o.id}" ${f.officer===o.id?'selected':''}>${escapeHtml(o.fullName)}</option>`).join('')}
        </select>` : '<div></div>'}
      </div>
      ${(f.search || f.status !== 'all' || f.officer !== 'all') ? `<div class="mt-3"><button onclick="state.filters.loans={search:'',status:'all',officer:'all'}; render();" class="text-xs text-blue-700 hover:underline">Clear filters</button></div>` : ''}
    </div>
    <div class="card overflow-hidden">
      ${filtered.length === 0 ? `
        <div class="p-12 text-center">
          <h3 class="font-medium text-slate-900">${state.loans.length === 0 ? 'No loans yet' : 'No loans match your filters'}</h3>
          <p class="text-sm text-slate-500 mt-1">${state.loans.length === 0 ? 'Create your first loan to get started' : 'Try adjusting search or filters'}</p>
          ${state.loans.length === 0 && can('create','loans') ? '<button onclick="openLoanForm()" class="btn-primary mt-4">Create Loan</button>' : ''}
        </div>` : `
        <table>
          <thead><tr>
            ${can('update','loans') ? `<th style="width:32px"><input type="checkbox" ${allOnPageSelected ? 'checked' : ''} onchange="toggleSelectAllLoans(this.checked, ${JSON.stringify(filtered.map(l=>l.id)).replace(/"/g,'&quot;')})"></th>` : ''}
            <th>Loan Ref</th><th>Client</th><th>Principal</th><th>Outstanding</th><th>Maturity</th><th>Status</th>
          </tr></thead>
          <tbody>
            ${filtered.map(l => {
              const overdue = isOverdue(l);
              const status = overdue ? 'Overdue' : l.status;
              const checked = state.bulkSelection.loans.has(l.id);
              return `
                <tr class="clickable">
                  ${can('update','loans') ? `<td onclick="event.stopPropagation();"><input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleLoanSelection('${l.id}', this.checked)"></td>` : ''}
                  <td class="font-mono text-xs" onclick="openLoanDetail('${l.id}')">${loanRef(l)}</td>
                  <td class="font-medium" onclick="openLoanDetail('${l.id}')">${escapeHtml(clientName(l.clientId))}</td>
                  <td onclick="openLoanDetail('${l.id}')">${fmt(l.principal)}</td>
                  <td class="font-medium" onclick="openLoanDetail('${l.id}')">${fmt(loanOutstanding(l.id))}</td>
                  <td onclick="openLoanDetail('${l.id}')">${fmtDate(l.maturityDate)}</td>
                  <td onclick="openLoanDetail('${l.id}')"><span class="badge badge-${status.toLowerCase()}">${status}</span></td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>`}
    </div>
  `;
}

          <div class="text-xs text-slate-500 -mt-2">APR is the effective annual percentage rate required by NAMFISA for disclosure on loan agreements.</div>

function filterLoanClientList(query, clearSelection) {
  const box = document.getElementById('client-search-results');
  if (!box) return;
  if (clearSelection) document.getElementById('f-clientId').value = '';
  const q = (query || '').trim().toLowerCase();
  const matches = state.clients.filter(c =>
    !q ||
    (c.fullName || '').toLowerCase().includes(q) ||
    (c.phone || '').toLowerCase().includes(q) ||
    (c.idNumber || '').includes(q)
  ).slice(0, 25);
  box.innerHTML = matches.length
    ? matches.map(c => `
        <button type="button" class="w-full text-left px-3 py-2 hover:bg-slate-50 text-sm border-b border-slate-100" onclick="selectLoanClient('${c.id}')">
          <span class="font-medium text-slate-900">${escapeHtml(c.fullName)}</span>
          <span class="text-xs text-slate-500 ml-2">${escapeHtml(c.phone || '')}${c.idNumber ? ' · ID ' + escapeHtml(c.idNumber) : ''}</span>
        </button>`).join('')
    : '<div class="px-3 py-2 text-sm text-slate-500">No matching clients</div>';
  box.classList.remove('hidden');
}

function selectLoanClient(clientId) {
  const c = state.clients.find(x => x.id === clientId);
  if (!c) return;
  document.getElementById('f-clientId').value = clientId;
  document.getElementById('f-clientSearch').value = `${c.fullName} - ${c.phone || ''}`;
  document.getElementById('client-search-results').classList.add('hidden');
  showKycWarningForClient(clientId);
  prefillFirstPaymentFromApplication(clientId);
  prefillPrincipalFromApplication(clientId);
  prefillDisbMethodFromApplication(clientId);
  showTopUpSuggestion(clientId);
}

// Pre-select the payout method the client chose on their application
function prefillDisbMethodFromApplication(clientId) {
  const el = document.getElementById('f-disbMethod');
  if (!el) return;
  const apps = (state.applications || []).filter(a => a.clientId === clientId && applicationDisbMethod(a));
  if (apps.length) {
    apps.sort((a, b) => (b.submittedAt || '').localeCompare(a.submittedAt || ''));
    const m = applicationDisbMethod(apps[0]);
    if (['eWallet', 'Bank Transfer (EFT)', 'Cash'].includes(m)) el.value = m;
  }
  updateLoanCalc();
}

function clientActiveLoans(clientId) {
  return state.loans.filter(l => l.clientId === clientId && l.status === 'Active' && loanOutstanding(l.id) > 0.01);
}

// Company practice: a client with a running loan gets a top-up
// (refinance), not a second parallel loan.
function showTopUpSuggestion(clientId) {
  const box = document.getElementById('topup-suggestion');
  if (!box) return;
  const active = clientId ? clientActiveLoans(clientId) : [];
  if (!active.length) { box.innerHTML = ''; return; }
  const l = active[0];
  box.innerHTML = `
    <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm text-amber-900">
      <strong>This client already has an active loan</strong> — ${loanRef(l)} with ${fmt(loanOutstanding(l.id))} outstanding.
      Standard practice is a <strong>Top-Up</strong>: the old loan is settled and the client keeps one loan and one instalment.
      <div class="mt-2"><button onclick="closeModal(); openTopUpForm('${l.id}')" class="text-xs bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded font-medium">Top Up ${loanRef(l)} Instead</button></div>
    </div>`;
}

// Suggest the amount the client asked for on their most recent application
function prefillPrincipalFromApplication(clientId) {
  const el = document.getElementById('f-principal');
  if (!el || el.value) return;
  const apps = (state.applications || []).filter(a => a.clientId === clientId && a.amountRequested);
  if (!apps.length) return;
  apps.sort((a, b) => (b.submittedAt || '').localeCompare(a.submittedAt || ''));
  el.value = apps[0].amountRequested;
  updateLoanCalc();
}

function defaultFirstPaymentDate(disbDate) {
  const d = new Date(disbDate);
  d.setMonth(d.getMonth() + 1);
  return d.toISOString().split('T')[0];
}

// Next occurrence of the payday the client gave on their loan application
function nextClientPayday(clientId) {
  const withDate = (state.applications || []).filter(a => a.clientId === clientId && applicationRepayDate(a));
  if (!withDate.length) return null;
  withDate.sort((a, b) => (b.submittedAt || '').localeCompare(a.submittedAt || ''));
  const d = new Date(applicationRepayDate(withDate[0]));
  const t = new Date(today());
  while (d <= t) d.setMonth(d.getMonth() + 1);
  return d.toISOString().split('T')[0];
}

function prefillFirstPaymentFromApplication(clientId) {
  const el = document.getElementById('f-firstPayDate');
  const hint = document.getElementById('firstpay-hint');
  if (!el) return;
  const payday = clientId ? nextClientPayday(clientId) : null;
  if (payday) {
    el.value = payday;
    if (hint) hint.textContent = 'Pre-filled with the payday from the client’s loan application.';
  } else {
    if (hint) hint.textContent = '';
  }
}

// Keep the default first-payment date in step when disbursement changes,
// unless a payday from the application is in charge of the field.
function syncFirstPaymentDefault() {
  const el = document.getElementById('f-firstPayDate');
  const hint = document.getElementById('firstpay-hint');
  const disb = document.getElementById('f-disbDate')?.value;
  if (!el || !disb) return;
  if (hint && hint.textContent) return;
  el.value = defaultFirstPaymentDate(disb);
}

// eWallet payouts cost N$20, passed on to the client in the repayment.
const EWALLET_FEE = 20;
const EWALLET_MARKER = ' · Disbursed via eWallet (incl. N$20 eWallet fee)';

function stripDisbMarker(purpose) {
  return (purpose || '').replace(EWALLET_MARKER, '');
}

function loanEwalletFee(loan) {
  return (loan?.purpose || '').includes('eWallet fee') ? EWALLET_FEE : 0;
}

function loanFormDisbMethod(editing) {
  if (!editing) return 'Bank Transfer (EFT)';
  return loanEwalletFee(editing) ? 'eWallet' : 'Bank Transfer (EFT)';
}

function loanFormFeeTotals(p, r, t) {
  const { totalRepayable, monthlyInstallment } = calcLoan(p, r, t);
  const method = document.getElementById('f-disbMethod')?.value || 'Bank Transfer (EFT)';
  const fee = method === 'eWallet' ? EWALLET_FEE : 0;
  const total = Math.round((totalRepayable + fee) * 100) / 100;
  const monthly = Math.round((total / t) * 100) / 100;
  return { totalRepayable: total, monthlyInstallment: monthly, fee, method };
}

function updateLoanCalc() {
  const p = parseFloat(document.getElementById('f-principal').value) || 0;
  const r = parseFloat(document.getElementById('f-rate').value) || 0;
  const t = parseInt(document.getElementById('f-term').value) || 1;
  const { totalRepayable, monthlyInstallment, fee } = loanFormFeeTotals(p, r, t);
  document.getElementById('calc-total').textContent = fmt(totalRepayable);
  document.getElementById('calc-monthly').textContent = fmt(monthlyInstallment);
  const apr = calculateAPR(p, monthlyInstallment, t);
  document.getElementById('calc-apr').textContent = apr.toFixed(2) + '%';
  const hint = document.getElementById('disb-method-hint');
  if (hint) hint.textContent = fee ? `Includes ${fmt(fee)} eWallet fee in the total repayable.` : '';
}

async function saveLoan(editId) {
  const clientId = document.getElementById('f-clientId').value;
  const principal = parseFloat(document.getElementById('f-principal').value);
  const rate = parseFloat(document.getElementById('f-rate').value);
  const term = parseInt(document.getElementById('f-term').value);
  const disbDate = document.getElementById('f-disbDate').value;
  const firstPayDate = document.getElementById('f-firstPayDate')?.value || '';
  const purpose = document.getElementById('f-purpose').value;
  const productEl = document.getElementById('f-productId');
  const productId = productEl ? productEl.value : '';
  if (!clientId) { showAlert('Please choose a client — type to search, then tap the client in the list.'); return; }
  if (!principal || !rate || !term || !disbDate || !firstPayDate) { showAlert('Please fill all required fields.'); return; }
  // Company practice: top up an existing active loan rather than
  // running a second loan in parallel. Allow it only after an
  // explicit confirmation.
  if (!editId && !window._allowSecondLoan) {
    const active = clientActiveLoans(clientId);
    if (active.length) {
      const l0 = active[0];
      confirmAction(
        `This client already has an active loan ${loanRef(l0)} with ${fmt(loanOutstanding(l0.id))} outstanding.\n\nStandard practice is a Top-Up: the old loan is settled and the client keeps one loan and one instalment. Use the Top Up button on ${loanRef(l0)} instead.\n\nCreate a separate second loan anyway?`,
        async () => { window._allowSecondLoan = true; try { await saveLoan(editId); } finally { window._allowSecondLoan = false; } },
        'Create Second Loan',
        'bg-amber-600 hover:bg-amber-700'
      );
      return;
    }
  }
  if (firstPayDate <= disbDate) { showAlert('The first payment date must be after the disbursement date.'); return; }
  const latestFirstPay = new Date(disbDate); latestFirstPay.setMonth(latestFirstPay.getMonth() + 2);
  if (firstPayDate > latestFirstPay.toISOString().split('T')[0]) { showAlert('The first payment date should be within two months of disbursement. Please check the date.'); return; }

  if (productId) {
    const product = state.products.find(p => p.id === productId);
    if (product) {
      if (principal < product.minPrincipal || principal > product.maxPrincipal) {
        showAlert(`Principal must be between ${fmt(product.minPrincipal)} and ${fmt(product.maxPrincipal)} for the "${product.name}" product.`, 'Out of Range');
        return;
      }
    }
  }

  const { totalRepayable, monthlyInstallment, method } = loanFormFeeTotals(principal, rate, term);
  const purposeFinal = stripDisbMarker(purpose) + (method === 'eWallet' ? EWALLET_MARKER : '');
  const matDate = new Date(disbDate);
  matDate.setMonth(matDate.getMonth() + term);
  const maturityDate = matDate.toISOString().split('T')[0];

  if (editId) {
    const before = state.loans.find(l => l.id === editId);
    const statusEl = document.getElementById('f-status');
    const record = {
      principal, interest_rate: rate, term_months: term,
      disbursement_date: disbDate, maturity_date: maturityDate,
      total_repayable: totalRepayable, monthly_installment: monthlyInstallment, purpose: purposeFinal
    };
    if (statusEl) record.status = statusEl.value;
    // Regenerate schedule if core terms or the first payment date changed
    const firstPayChanged = firstPayDate !== (before.schedule?.[0]?.dueDate || '');
    if (before.principal !== principal || before.interestRate !== rate || before.termMonths !== term || before.disbursementDate !== disbDate || firstPayChanged) {
      record.schedule = generateSchedule({ ...before, principal, interestRate: rate, termMonths: term, disbursementDate: disbDate, firstPaymentDate: firstPayDate, totalRepayable, monthlyInstallment });
      record.maturity_date = record.schedule[record.schedule.length - 1].dueDate;
    }
    const { error } = await db.from('loans').update(record).eq('id', editId);
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await logAudit('update', 'loan', editId, { changes: record });
  } else {
    const record = {
      client_id: clientId,
      product_id: productId || null,
      principal, interest_rate: rate, term_months: term,
      disbursement_date: disbDate, maturity_date: maturityDate,
      total_repayable: totalRepayable, monthly_installment: monthlyInstallment,
      status: 'Active', purpose: purposeFinal,
      created_by: state.currentUser?.id || null
    };
    record.schedule = generateSchedule({ ...record, disbursementDate: disbDate, firstPaymentDate: firstPayDate, termMonths: term, totalRepayable, monthlyInstallment });
    record.maturity_date = record.schedule[record.schedule.length - 1].dueDate;
    const { data, error } = await db.from('loans').insert(record).select().single();
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await logAudit('create', 'loan', data.id, { clientId, productId, principal, rate, term });
  }
  await saveTable('loans');
  closeModal();
  render();
}

// =====================================================
// TOP-UP REFINANCE
// The client's old loan is settled from the proceeds of a new, larger
// loan: new principal = old outstanding balance + extra cash paid out.
// One new agreement, one instalment; the old loan closes cleanly.
// =====================================================
function openTopUpForm(loanId) {
  if (!requirePerm('create', 'loans')) return;

  if (!loan) return;

  const payday = nextClientPayday(loan.clientId) || defaultFirstPaymentDate(today());
  document.getElementById('modal-container').innerHTML = `
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4" onclick="if(event.target===this) closeModal()">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">

            <div class="flex justify-between mt-1"><span class="text-slate-600">Outstanding on ${loanRef(loan)}</span><span class="font-medium">${fmt(outstanding)}</span></div>
          </div>
          <div>
            <label>Extra Cash to Pay Out (N$) *</label>
            <input type="number" id="tu-cash" min="1" step="0.01" oninput="updateTopUpCalc('${loanId}')" placeholder="e.g. 2000">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label>Interest Rate (%) *</label><input type="number" id="tu-rate" min="0" step="0.1" value="${loan.interestRate || state.settings?.defaultRate || 20}" oninput="updateTopUpCalc('${loanId}')"></div>
            <div><label>Term (months) *</label><input type="number" id="tu-term" min="1" value="${loan.termMonths || state.settings?.defaultTerm || 1}" oninput="updateTopUpCalc('${loanId}')"></div>
          </div>
          <div>
            <label>First Payment Date (client's payday) *</label>
            <input type="date" id="tu-firstPay" value="${payday}">
          </div>
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm space-y-1">
            <div class="flex justify-between"><span class="text-blue-900">Settles old loan</span><span class="font-medium" id="tu-settle">${fmt(outstanding)}</span></div>
            <div class="flex justify-between"><span class="text-blue-900">Cash to client</span><span class="font-medium" id="tu-cashout">${fmt(0)}</span></div>
            <div class="flex justify-between border-t border-blue-200 pt-1 mt-1"><span class="text-blue-900 font-medium">New loan principal</span><span class="font-bold" id="tu-principal">${fmt(outstanding)}</span></div>
            <div class="flex justify-between"><span class="text-blue-900">Total repayable</span><span class="font-medium" id="tu-total">—</span></div>
            <div class="flex justify-between"><span class="text-blue-900">Monthly instalment</span><span class="font-medium" id="tu-monthly">—</span></div>
          </div>
          <div class="text-xs text-slate-500">The old loan is closed with a "Top-Up Settlement" record — no new interest is charged on it. The client signs a fresh agreement for the new loan.</div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
          <button onclick="closeModal()" class="btn-secondary">Cancel</button>
          <button onclick="confirmTopUp('${loanId}')" class="btn-primary bg-amber-600 hover:bg-amber-700">Create Top-Up Loan</button>
        </div>
      </div>
    </div>
  `;
  updateTopUpCalc(loanId);
}

function updateTopUpCalc(loanId) {
  const outstanding = loanOutstanding(loanId);
  const cash = parseFloat(document.getElementById('tu-cash')?.value) || 0;
  const rate = parseFloat(document.getElementById('tu-rate')?.value) || 0;
  const term = parseInt(document.getElementById('tu-term')?.value) || 1;
  const principal = Math.round((outstanding + cash) * 100) / 100;
  const { totalRepayable, monthlyInstallment } = calcLoan(principal, rate, term);
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('tu-cashout', fmt(cash));
  set('tu-principal', fmt(principal));
  set('tu-total', fmt(totalRepayable));
  set('tu-monthly', fmt(monthlyInstallment));
}

async function confirmTopUp(loanId) {
  const oldLoan = state.loans.find(l => l.id === loanId);
  if (!oldLoan) return;
  const outstanding = loanOutstanding(loanId);
  const cash = parseFloat(document.getElementById('tu-cash').value);
  const rate = parseFloat(document.getElementById('tu-rate').value);
  const term = parseInt(document.getElementById('tu-term').value);
  const firstPay = document.getElementById('tu-firstPay').value;
  const disbDate = today();
  if (!cash || cash <= 0) { showAlert('Please enter the extra cash amount to pay out.'); return; }
  if (!rate || !term || !firstPay) { showAlert('Please fill all required fields.'); return; }
  if (firstPay <= disbDate) { showAlert('The first payment date must be after today.'); return; }
  const latestFirstPay = new Date(disbDate); latestFirstPay.setMonth(latestFirstPay.getMonth() + 2);
  if (firstPay > latestFirstPay.toISOString().split('T')[0]) { showAlert('The first payment date should be within two months. Please check the date.'); return; }

  const principal = Math.round((outstanding + cash) * 100) / 100;
  const { totalRepayable, monthlyInstallment } = calcLoan(principal, rate, term);

  // 1. Create the new combined loan
  const record = {
    client_id: oldLoan.clientId,
    principal, interest_rate: rate, term_months: term,
    disbursement_date: disbDate,
    total_repayable: totalRepayable, monthly_installment: monthlyInstallment,
    status: 'Active',
    purpose: `Top-up refinance of ${loanRef(oldLoan)} — settles ${fmt(outstanding)}, pays out ${fmt(cash)} cash`,
    created_by: state.currentUser?.id || null
  };
  record.schedule = generateSchedule({ ...record, disbursementDate: disbDate, firstPaymentDate: firstPay, termMonths: term, totalRepayable, monthlyInstallment });
  record.maturity_date = record.schedule[record.schedule.length - 1].dueDate;
  const { data: newLoan, error: loanErr } = await db.from('loans').insert(record).select().single();
  if (loanErr) { showAlert('Could not create the top-up loan: ' + loanErr.message); return; }
  await saveTable('loans');
  const newRef = loanRef(snakeToCamel(newLoan));

  // 2. Settle the old loan from the new loan's proceeds
  const settlement = {
    loan_id: loanId,
    client_id: oldLoan.clientId,
    payment_date: disbDate,
    amount: outstanding,
    method: 'Top-Up Settlement',
    notes: `Settled by top-up loan ${newRef}`,
    created_by: state.currentUser?.id || null
  };
  const { error: payErr } = await db.from('payments').insert(settlement);
  if (payErr) { showAlert('The new loan was created, but settling the old one failed: ' + payErr.message + '\n\nPlease record a payment of ' + fmt(outstanding) + ' on ' + loanRef(oldLoan) + ' manually (method: Top-Up Settlement).'); return; }
  await saveTable('payments');
  allocatePayments(loanId);
  const localOld = state.loans.find(l => l.id === loanId);
  if (localOld) {
    localOld.status = 'Completed';
    await db.from('loans').update({ status: 'Completed', schedule: localOld.schedule }).eq('id', loanId);
  }
  await saveTable('loans');
  await logAudit('topup', 'loan', newLoan.id, { oldLoanId: loanId, settled: outstanding, cashOut: cash, principal });

  closeModal();
  render();
  showAlert(`Top-up complete.\n\n${loanRef(oldLoan)} settled (${fmt(outstanding)}) and closed.\nNew loan ${newRef} created for ${fmt(principal)} — pay out ${fmt(cash)} to the client and send the new agreement for signing.`, 'Top-Up Created');
  setTimeout(() => openLoanDetail(newLoan.id), 300);
}

async function deleteLoan(loanId) {
  if (!requirePerm('delete','loans')) return;
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return;
  const payments = state.payments.filter(p => p.loanId === loanId);
  let msg = `Delete loan ${loanRefById(loanId)} for ${clientName(loan.clientId)}?`;
  if (payments.length > 0) msg += `\n\nThis will also delete ${payments.length} associated payment(s) totalling ${fmt(payments.reduce((s,p)=>s+p.amount,0))}.`;
  msg += '\n\nThis cannot be undone.';
  confirmAction(msg, async () => {
    const { error } = await db.from('loans').delete().eq('id', loanId);
    if (error) { showAlert('Delete failed: ' + error.message); return; }
    await logAudit('delete', 'loan', loanId, { snapshot: loan });
    await saveTable('loans');
    await saveTable('payments');
    closeModal();
    render();
  });
}

async function loadExistingKycPreview(clientId) {
  const docs = await loadAllKyc(clientId);
  ['photo', 'id', 'income'].forEach(t => {
    const el = document.getElementById(`kyc-preview-${t}`);
    if (el && docs[t]) {
      el.innerHTML = renderKycPreview(t, { ...docs[t], size: docs[t].data.length });
      // mark these as the existing files to preserve unless changed
    }
  });
}

async function saveClient(editId) {
  const fullName = document.getElementById('c-fullName').value.trim();
  const idNumber = document.getElementById('c-idNumber').value.trim();
  const phoneDigits = namibianDigits(document.getElementById('c-phone').value);
  if (!fullName || !idNumber || !phoneDigits) { showAlert('Full name, ID number and phone are required.'); return; }
  if (phoneDigits.length < 7) { showAlert('Please check the phone number — it looks too short. Enter the number without the leading 0 (e.g. 81 234 5678).'); return; }
  // Every client must have a unique ID number
  const duplicate = state.clients.find(c => c.id !== editId && (c.idNumber || '').trim() === idNumber);
  if (duplicate) {
    showAlert(`A client with ID number ${idNumber} already exists: ${duplicate.fullName}.\n\nEach client must have a unique ID number — open the existing client record instead of creating a new one.`, 'Duplicate ID Number');
    return;
  }
  const phone = '+264' + phoneDigits;
  const record = {
    full_name: fullName,
    id_number: idNumber,
    phone,
    alt_phone: formatNamibianPhone(document.getElementById('c-altPhone').value) || null,
    email: document.getElementById('c-email').value.trim() || null,
    address: document.getElementById('c-address').value.trim() || null,
    employer: document.getElementById('c-employer').value.trim() || null,
    monthly_income: parseFloat(document.getElementById('c-income').value) || 0,
    emergency_contact: document.getElementById('c-emergency').value.trim() || null
  };
  if (editId) {
    const statusEl = document.getElementById('c-status');
    if (statusEl) record.status = statusEl.value;
    const { error } = await db.from('clients').update(record).eq('id', editId);
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await saveKycDocuments(editId);
    await logAudit('update', 'client', editId, { changes: record });
  } else {
    record.status = 'Active';
    record.registration_date = today();
    record.created_by = state.currentUser?.id || null;
    const { data, error } = await db.from('clients').insert(record).select().single();
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await saveKycDocuments(data.id);
    await logAudit('create', 'client', data.id, { fullName, idNumber, phone });
  }
  await saveTable('clients');
  closeModal();
  render();
}

async function deleteClient(clientId) {
  if (!requirePerm('delete','clients')) return;
  const client = state.clients.find(c => c.id === clientId);
  if (!client) return;
  const loans = state.loans.filter(l => l.clientId === clientId);
  if (loans.length > 0) { showAlert(`Cannot delete: ${client.fullName} has ${loans.length} loan(s) on record. Delete the loans first.`, 'Cannot Delete'); return; }
  confirmAction(`Delete client "${client.fullName}"?\n\nThis cannot be undone.`, async () => {
    const { error } = await db.from('clients').delete().eq('id', clientId);
    if (error) { showAlert('Delete failed: ' + error.message); return; }
    await logAudit('delete', 'client', clientId, { snapshot: client });
    await saveTable('clients');
    closeModal();
    render();
  });
}

          <button onclick="closeKycFullscreen()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <div class="p-4"><img src="${dataUrl}" class="max-w-full max-h-[75vh] mx-auto"></div>
      </div>
    </div>
  `;
  const div = document.createElement('div');
  div.id = 'kyc-fullscreen';

  document.body.appendChild(div);
}
function closeKycFullscreen() { const c = document.getElementById('kyc-fullscreen'); if (c) c.remove(); }

function renderPayments() {
  const f = state.filters.payments;
  const q = (f.search || '').toLowerCase().trim();
  let filtered = [...state.payments];
  if (q) {
    filtered = filtered.filter(p => {
      const c = state.clients.find(c => c.id === p.clientId);
      return (p.id || '').toLowerCase().includes(q) ||
             (p.loanId || '').toLowerCase().includes(q) ||
             (p.receiptNumber || '').toLowerCase().includes(q) ||
             (c?.fullName || '').toLowerCase().includes(q) ||
             (c?.phone || '').includes(q);
    });
  }
  if (f.method !== 'all') filtered = filtered.filter(p => p.method === f.method);
  if (f.from) filtered = filtered.filter(p => p.paymentDate >= f.from);
  if (f.to) filtered = filtered.filter(p => p.paymentDate <= f.to);
  const sorted = filtered.sort((a,b) => b.paymentDate.localeCompare(a.paymentDate));
  const totalFiltered = sorted.reduce((s,p) => s+p.amount, 0);

  return `
    <div class="mb-6 flex justify-between items-center">
      <div><h1 class="text-2xl font-bold text-slate-900">Payments</h1><p class="text-slate-500 text-sm mt-1">${state.payments.length} total · ${sorted.length} shown · ${fmt(totalFiltered)} filtered total</p></div>
      ${can('create','payments') ? `<button onclick="openPaymentForm()" class="btn-primary flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>Record Payment</button>` : ''}
    </div>
    <div class="card p-4 mb-4">
      <div class="grid grid-cols-4 gap-3">
        <div class="col-span-2 relative">
          <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search by client name, payment/loan ID, or receipt no..." style="padding-left: 36px;" value="${escapeHtml(f.search || '')}" oninput="state.filters.payments.search = this.value; debouncedRender();">
        </div>
        <select onchange="state.filters.payments.method = this.value; render();">
          <option value="all" ${f.method==='all'?'selected':''}>All methods</option>
          <option value="Cash" ${f.method==='Cash'?'selected':''}>Cash</option>
          <option value="Bank Transfer" ${f.method==='Bank Transfer'?'selected':''}>Bank Transfer</option>
          <option value="Mobile Money" ${f.method==='Mobile Money'?'selected':''}>Mobile Money</option>
          <option value="Cheque" ${f.method==='Cheque'?'selected':''}>Cheque</option>
        </select>
        <div class="grid grid-cols-2 gap-2">
          <input type="date" value="${f.from || ''}" placeholder="From" onchange="state.filters.payments.from = this.value; render();" title="From date">
          <input type="date" value="${f.to || ''}" placeholder="To" onchange="state.filters.payments.to = this.value; render();" title="To date">
        </div>
      </div>
      ${(f.search || f.method !== 'all' || f.from || f.to) ? `<div class="mt-3"><button onclick="state.filters.payments={search:'',method:'all',from:'',to:''}; render();" class="text-xs text-blue-700 hover:underline">Clear filters</button></div>` : ''}
    </div>
    <div class="card overflow-hidden">
      ${sorted.length === 0 ? `
        <div class="p-12 text-center">
          <h3 class="font-medium text-slate-900">${state.payments.length === 0 ? 'No payments yet' : 'No payments match your filters'}</h3>
          <p class="text-sm text-slate-500 mt-1">${state.payments.length === 0 ? 'Record a payment against an active loan' : 'Try adjusting search or filters'}</p>
          ${state.payments.length === 0 && can('create','payments') ? '<button onclick="openPaymentForm()" class="btn-primary mt-4">Record Payment</button>' : ''}
        </div>` : `
        <table>
          <thead><tr><th>Payment Ref</th><th>Date</th><th>Client</th><th>Loan Ref</th><th>Amount</th><th>Method</th><th>Receipt</th><th class="text-right">Actions</th></tr></thead>
          <tbody>
            ${sorted.map(p => `<tr><td class="font-mono text-xs">${paymentRef(p)}</td><td>${fmtDate(p.paymentDate)}</td><td class="font-medium">${escapeHtml(clientName(p.clientId))}</td><td class="font-mono text-xs">${loanRefById(p.loanId)}</td><td class="font-medium text-green-700">${fmt(p.amount)}</td><td>${escapeHtml(p.method)}</td><td class="font-mono text-xs">${escapeHtml(p.receiptNumber || '—')}</td><td class="text-right whitespace-nowrap"><button onclick="downloadReceipt('${p.id}')" class="text-xs text-blue-700 hover:underline mr-3" title="Receipt PDF">Receipt</button><button onclick="shareReceiptWhatsApp('${p.id}')" class="text-xs text-green-700 hover:underline mr-3" title="WhatsApp">WhatsApp</button>${can('update','payments')?`<button onclick="openPaymentForm(null,'${p.id}')" class="text-xs text-slate-600 hover:underline mr-3">Edit</button>`:''}${can('delete','payments')?`<button onclick="deletePayment('${p.id}')" class="text-xs text-red-600 hover:underline">Delete</button>`:''}</td></tr>`).join('')}
          </tbody>
        </table>`}

  `;

function openPaymentForm(preselectedLoanId, editId) {
  if (editId && !requirePerm('update','payments')) return;
  if (!editId && !requirePerm('create','payments')) return;
  const editing = editId ? state.payments.find(p => p.id === editId) : null;
  const activeLoans = editing
    ? state.loans.filter(l => l.id === editing.loanId || loanOutstanding(l.id) > 0)
    : state.loans.filter(l => loanOutstanding(l.id) > 0);
  if (activeLoans.length === 0) { showAlert('No active loans available for payment.'); return; }
  const selectedLoanId = editing?.loanId || preselectedLoanId;
  const modal = `
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4" onclick="if(event.target===this) closeModal()">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-xl">
        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
          <h2 class="font-semibold text-lg">${editing ? 'Edit Payment' : 'Record Payment'}</h2>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <label>Loan *</label>
            <select id="p-loanId" onchange="updatePaymentInfo()" required ${editing ? 'disabled' : ''}>
              <option value="">Select loan...</option>
              ${activeLoans.map(l => `<option value="${l.id}" ${selectedLoanId===l.id?'selected':''}>${escapeHtml(clientName(l.clientId))} - ${l.id} (Outstanding: ${fmt(loanOutstanding(l.id))})</option>`).join('')}
            </select>
            ${editing ? '<div class="text-xs text-slate-500 mt-1">Loan cannot be changed on existing payments</div>' : ''}
          </div>
          <div id="payment-info" class="hidden bg-slate-50 rounded-lg p-3 text-sm"></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label>Payment Date *</label><input type="date" id="p-date" value="${editing?.paymentDate || today()}" required></div>
            <div><label>Amount (N$) *</label><input type="number" id="p-amount" min="0.01" step="0.01" value="${editing?.amount || ''}" required></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label>Method *</label><select id="p-method" required>
              <option value="Cash" ${editing?.method==='Cash'?'selected':''}>Cash</option>
              <option value="Bank Transfer" ${editing?.method==='Bank Transfer'?'selected':''}>Bank Transfer</option>
              <option value="Mobile Money" ${editing?.method==='Mobile Money'?'selected':''}>Mobile Money</option>
              <option value="Cheque" ${editing?.method==='Cheque'?'selected':''}>Cheque</option>
            </select></div>
            <div><label>Receipt Number</label><input type="text" id="p-receipt" value="${escapeHtml(editing?.receiptNumber || '')}"></div>
          </div>
          <div><label>Notes</label><textarea id="p-notes" rows="2">${escapeHtml(editing?.notes || '')}</textarea></div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
          <button onclick="closeModal()" class="btn-secondary">Cancel</button>
          <button onclick="savePayment('${editId || ''}')" class="btn-primary">${editing ? 'Save Changes' : 'Save Payment'}</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modal;
  if (selectedLoanId) updatePaymentInfo();
}

function updatePaymentInfo() {
  const loanId = document.getElementById('p-loanId').value;
  const info = document.getElementById('payment-info');
  if (!loanId) { info.className = 'hidden'; return; }
  const loan = state.loans.find(l => l.id === loanId);
  const outstanding = loanOutstanding(loanId);
  info.className = 'bg-slate-50 rounded-lg p-3 text-sm';
  info.innerHTML = `<div class="grid grid-cols-3 gap-2"><div><span class="text-slate-500">Monthly:</span> <strong>${fmt(loan.monthlyInstallment)}</strong></div><div><span class="text-slate-500">Outstanding:</span> <strong>${fmt(outstanding)}</strong></div><div><span class="text-slate-500">Matures:</span> <strong>${fmtDate(loan.maturityDate)}</strong></div></div>`;
  const amountEl = document.getElementById('p-amount');
  if (!amountEl.value) amountEl.value = Math.min(loan.monthlyInstallment, outstanding).toFixed(2);
}

async function savePayment(editId) {
  const loanId = document.getElementById('p-loanId').value;
  const amount = parseFloat(document.getElementById('p-amount').value);
  const date = document.getElementById('p-date').value;
  const method = document.getElementById('p-method').value;
  if (!loanId || !amount || !date) { showAlert('Please fill all required fields.'); return; }
  const loan = state.loans.find(l => l.id === loanId);
  const receiptNumber = document.getElementById('p-receipt').value.trim();
  const notes = document.getElementById('p-notes').value.trim();
  const otherPayments = state.payments.filter(p => p.loanId === loanId && p.id !== editId).reduce((s, p) => s + p.amount, 0);
  const outstandingExclThis = loan.totalRepayable - otherPayments;

  const doSave = async () => {
    const record = {
      payment_date: date, amount, method,
      receipt_number: receiptNumber || null,
      notes: notes || null
    };
    if (editId) {
      const { error } = await db.from('payments').update(record).eq('id', editId);
      if (error) { showAlert('Save failed: ' + error.message); return; }
      await logAudit('update', 'payment', editId, { changes: record });
    } else {
      record.loan_id = loanId;
      record.client_id = loan.clientId;
      record.created_by = state.currentUser?.id || null;
      const { data, error } = await db.from('payments').insert(record).select().single();
      if (error) { showAlert('Save failed: ' + error.message); return; }
      await logAudit('create', 'payment', data.id, { loanId, amount, method });
    }
    await saveTable('payments');
    // Recompute schedule allocation for this loan
    allocatePayments(loanId);
    const newOutstanding = loanOutstanding(loanId);
    let newStatus = null;
    if (newOutstanding <= 0.01 && loan.status !== 'Completed') newStatus = 'Completed';
    else if (newOutstanding > 0.01 && loan.status === 'Completed') newStatus = 'Active';
    if (newStatus) {
      const localLoan = state.loans.find(l => l.id === loanId);
      if (localLoan) localLoan.status = newStatus;
      await db.from('loans').update({ status: newStatus, schedule: localLoan.schedule }).eq('id', loanId);
    } else {
      // Save updated schedule
      const localLoan = state.loans.find(l => l.id === loanId);
      if (localLoan) await db.from('loans').update({ schedule: localLoan.schedule }).eq('id', loanId);
    }
    closeModal();
    render();
  };

  if (amount > outstandingExclThis + 0.01) {
    confirmAction(`Amount exceeds outstanding balance (${fmt(outstandingExclThis)}). Continue anyway?`, doSave, 'Continue', 'bg-blue-700 hover:bg-blue-800');
  } else {
    await doSave();
  }
}

async function deletePayment(paymentId) {
  if (!requirePerm('delete','payments')) return;
  const p = state.payments.find(x => x.id === paymentId);
  if (!p) return;
  confirmAction(`Delete payment of ${fmt(p.amount)} dated ${fmtDate(p.paymentDate)}?\n\nThis cannot be undone and will increase the loan's outstanding balance.`, async () => {
    const { error } = await db.from('payments').delete().eq('id', paymentId);
    if (error) { showAlert('Delete failed: ' + error.message); return; }
    await logAudit('delete', 'payment', paymentId, { snapshot: p });
    await saveTable('payments');
    // Re-evaluate loan status
    const loan = state.loans.find(l => l.id === p.loanId);
    if (loan) {
      allocatePayments(loan.id);
      const newStatus = (loan.status === 'Completed' && loanOutstanding(loan.id) > 0.01) ? 'Active' : loan.status;
      if (newStatus !== loan.status) loan.status = newStatus;
      await db.from('loans').update({ status: loan.status, schedule: loan.schedule }).eq('id', loan.id);
    }
    closeModal();
    render();
  });
}

function renderReports() {
  const tab = state.currentReportTab || 'daily';

function reportDailyCollection() {
  const today_ = today();
  const items = [];
  state.loans.forEach(l => {
    if (l.status !== 'Active') return;
    ensureSchedule(l).forEach(s => {
      if (s.status === 'Paid') return;
      if (s.dueDate <= today_) {
        items.push({ loan: l, inst: s, days: daysBetween(s.dueDate, today_), balance: s.amountDue - s.amountPaid });
      }
    });
  });
  items.sort((a, b) => a.inst.dueDate.localeCompare(b.inst.dueDate));
  const totalDue = items.reduce((s, x) => s + x.balance, 0);
  const dueTodayCount = items.filter(x => x.inst.dueDate === today_).length;
  const overdueCount = items.filter(x => x.inst.dueDate < today_).length;

  return `
    <div class="mb-4 flex justify-between items-center no-print">
      <div class="text-sm text-slate-600">Report date: <strong>${fmtDate(today_)}</strong></div>
      <button onclick="window.print()" class="btn-secondary text-sm">Print</button>
    </div>
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="card p-4"><div class="text-xs text-slate-500 uppercase">Due Today</div><div class="text-2xl font-bold mt-1">${dueTodayCount}</div></div>
      <div class="card p-4"><div class="text-xs text-slate-500 uppercase">Overdue</div><div class="text-2xl font-bold text-red-700 mt-1">${overdueCount}</div></div>
      <div class="card p-4"><div class="text-xs text-slate-500 uppercase">Total Expected</div><div class="text-2xl font-bold text-blue-700 mt-1">${fmt(totalDue)}</div></div>
    </div>
    <div class="card overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-200"><h3 class="font-semibold">Collection Sheet — ${fmtDate(today_)}</h3></div>
      ${items.length === 0 ? '<div class="p-12 text-center text-slate-500">Nothing due today and no overdue items. Clean book!</div>' : `
        <table>
          <thead><tr><th>Client</th><th>Phone</th><th>Loan Ref</th><th>Inst #</th><th>Due Date</th><th>Days</th><th class="text-right">Amount Due</th></tr></thead>
          <tbody>
            ${items.map(x => {
              const c = state.clients.find(c => c.id === x.loan.clientId);
              const overdue = x.days > 0;
              return `<tr class="clickable" onclick="openLoanDetail('${x.loan.id}')"><td class="font-medium">${escapeHtml(c?.fullName || '—')}</td><td>${escapeHtml(c?.phone || '—')}</td><td class="font-mono text-xs">${loanRef(x.loan)}</td><td>${x.inst.instalmentNo}</td><td>${fmtDate(x.inst.dueDate)}</td><td>${overdue ? `<span class="text-red-700 font-medium">${x.days}d late</span>` : 'today'}</td><td class="text-right font-medium">${fmt(x.balance)}</td></tr>`;
            }).join('')}
            <tr><td colspan="6" class="text-right font-semibold">TOTAL</td><td class="text-right font-bold">${fmt(totalDue)}</td></tr>
          </tbody>
        </table>`}
    </div>
  `;
}

function reportAgeing() {
  const today_ = today();
  const buckets = { current: [], '1-30': [], '31-60': [], '61-90': [], '90+': [] };
  state.loans.forEach(l => {
    if (l.status === 'Completed' || l.status === 'Written Off') return;
    ensureSchedule(l).forEach(s => {
      if (s.status === 'Paid') return;
      const balance = s.amountDue - s.amountPaid;
      if (balance <= 0.01) return;
      const days = daysBetween(s.dueDate, today_);
      const entry = { loan: l, inst: s, days, balance };
      if (days <= 0) buckets.current.push(entry);
      else if (days <= 30) buckets['1-30'].push(entry);
      else if (days <= 60) buckets['31-60'].push(entry);
      else if (days <= 90) buckets['61-90'].push(entry);
      else buckets['90+'].push(entry);
    });
  });
  const sumOf = (b) => b.reduce((s, x) => s + x.balance, 0);
  const total = Object.values(buckets).reduce((s, b) => s + sumOf(b), 0);

  const bucketCard = (label, items, color) => `
    <div class="card p-4"><div class="text-xs text-slate-500 uppercase">${label}</div><div class="text-2xl font-bold ${color} mt-1">${fmt(sumOf(items))}</div><div class="text-xs text-slate-500 mt-1">${items.length} instalment(s)</div></div>
  `;

  return `
    <div class="mb-4 flex justify-between items-center no-print">
      <div class="text-sm text-slate-600">As at: <strong>${fmtDate(today_)}</strong></div>
      <button onclick="window.print()" class="btn-secondary text-sm">Print</button>
    </div>
    <div class="grid grid-cols-5 gap-4 mb-6">
      ${bucketCard('Current', buckets.current, 'text-slate-900')}
      ${bucketCard('1–30 days', buckets['1-30'], 'text-amber-700')}
      ${bucketCard('31–60 days', buckets['31-60'], 'text-orange-700')}
      ${bucketCard('61–90 days', buckets['61-90'], 'text-red-700')}
      ${bucketCard('90+ days', buckets['90+'], 'text-red-900')}
    </div>
    <div class="card p-4 mb-6 bg-blue-50">
      <div class="text-xs text-blue-900 uppercase">Total Receivables</div>
      <div class="text-2xl font-bold text-blue-900 mt-1">${fmt(total)}</div>
    </div>
    ${['90+','61-90','31-60','1-30','current'].map(k => {
      const items = buckets[k];
      if (items.length === 0) return '';
      const label = k === 'current' ? 'Current (not yet due)' : k + ' days overdue';
      return `
        <div class="card overflow-hidden mb-4">
          <div class="px-6 py-3 border-b border-slate-200 bg-slate-50 flex justify-between"><h3 class="font-semibold">${label}</h3><span class="text-sm text-slate-600">${fmt(sumOf(items))}</span></div>
          <table>
            <thead><tr><th>Client</th><th>Loan Ref</th><th>Inst #</th><th>Due Date</th><th>Days</th><th class="text-right">Balance</th></tr></thead>
            <tbody>
              ${items.map(x => {
                const c = state.clients.find(c => c.id === x.loan.clientId);
                return `<tr class="clickable" onclick="openLoanDetail('${x.loan.id}')"><td class="font-medium">${escapeHtml(c?.fullName || '—')}</td><td class="font-mono text-xs">${loanRef(x.loan)}</td><td>${x.inst.instalmentNo}</td><td>${fmtDate(x.inst.dueDate)}</td><td>${x.days > 0 ? x.days + 'd' : '—'}</td><td class="text-right font-medium">${fmt(x.balance)}</td></tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }).join('')}
  `;
}

function reportPAR() {
  const today_ = today();
  const thresholds = [1, 30, 60, 90];
  const results = thresholds.map(t => {
    let atRisk = 0, totalPortfolio = 0;
    state.loans.forEach(l => {
      if (l.status === 'Completed' || l.status === 'Written Off') return;
      const outstanding = loanOutstanding(l.id);
      totalPortfolio += outstanding;
      const hasOverdueBeyond = ensureSchedule(l).some(s => {
        if (s.status === 'Paid' || s.amountDue - s.amountPaid <= 0.01) return false;
        return daysBetween(s.dueDate, today_) > t;
      });
      if (hasOverdueBeyond) atRisk += outstanding;
    });
    return { threshold: t, atRisk, totalPortfolio, ratio: totalPortfolio > 0 ? (atRisk / totalPortfolio) * 100 : 0 };
  });

  const par30 = results.find(r => r.threshold === 30);
  return `
    <div class="mb-4 flex justify-between items-center no-print">
      <div class="text-sm text-slate-600">As at: <strong>${fmtDate(today_)}</strong></div>
      <button onclick="window.print()" class="btn-secondary text-sm">Print</button>
    </div>
    <div class="card p-6 mb-6 bg-blue-50">
      <div class="text-xs text-blue-900 uppercase font-medium">PAR 30 (Industry Benchmark)</div>
      <div class="text-4xl font-bold text-blue-900 mt-2">${par30.ratio.toFixed(2)}%</div>
      <div class="text-sm text-blue-800 mt-2">${fmt(par30.atRisk)} at risk out of ${fmt(par30.totalPortfolio)} total portfolio</div>
      <div class="text-xs text-blue-700 mt-3">Healthy: &lt;5% · Warning: 5–10% · Critical: &gt;10%</div>
    </div>
    <div class="card overflow-hidden">
      <div class="px-6 py-3 border-b border-slate-200 bg-slate-50"><h3 class="font-semibold">Portfolio at Risk by Threshold</h3></div>
      <table>
        <thead><tr><th>PAR Bucket</th><th>Amount at Risk</th><th>Total Portfolio</th><th class="text-right">PAR Ratio</th></tr></thead>
        <tbody>
