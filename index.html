function buildClientStatement(clientId) {
  const c = state.clients.find(x => x.id === clientId);
  if (!c) return '<div>Client not found</div>';
  const loans = state.loans.filter(l => l.clientId === clientId);
  const allPayments = state.payments.filter(p => p.clientId === clientId).sort((a,b) => a.paymentDate.localeCompare(b.paymentDate));
  const totalDisbursed = loans.reduce((s, l) => s + l.principal, 0);
  const totalRepayable = loans.reduce((s, l) => s + l.totalRepayable, 0);
  const totalPaid = allPayments.reduce((s, p) => s + p.amount, 0);
  const totalOutstanding = totalRepayable - totalPaid;

  return `
    <div class="card p-8">
      <div class="flex justify-between items-start mb-6">
        <div>
          <h2 class="text-xl font-bold text-slate-900">Client Statement</h2>
          <div class="text-sm text-slate-500 mt-1">Generated: ${fmtDate(today())}</div>
        </div>
        <button onclick="window.print()" class="btn-secondary no-print">Print Statement</button>
      </div>

      <div class="border-t border-b border-slate-200 py-4 mb-6 grid grid-cols-2 gap-4">
        <div><div class="text-xs text-slate-500 uppercase">Client</div><div class="font-semibold mt-1">${escapeHtml(c.fullName)}</div></div>
        <div><div class="text-xs text-slate-500 uppercase">Client ID</div><div class="font-mono text-sm mt-1">${clientRef(c)}</div></div>
        <div><div class="text-xs text-slate-500 uppercase">ID Number</div><div class="font-medium mt-1">${escapeHtml(c.idNumber)}</div></div>
        <div><div class="text-xs text-slate-500 uppercase">Phone</div><div class="font-medium mt-1">${escapeHtml(c.phone)}</div></div>
      </div>

      <div class="grid grid-cols-4 gap-4 mb-6 kpi-grid">
        <div class="bg-slate-50 rounded-lg p-3"><div class="text-xs text-slate-500 uppercase">Total Disbursed</div><div class="font-bold text-lg mt-1">${fmt(totalDisbursed)}</div></div>
        <div class="bg-slate-50 rounded-lg p-3"><div class="text-xs text-slate-500 uppercase">Total Repayable</div><div class="font-bold text-lg mt-1">${fmt(totalRepayable)}</div></div>
        <div class="bg-green-50 rounded-lg p-3"><div class="text-xs text-green-800 uppercase">Total Paid</div><div class="font-bold text-lg text-green-800 mt-1">${fmt(totalPaid)}</div></div>
        <div class="bg-blue-50 rounded-lg p-3"><div class="text-xs text-blue-800 uppercase">Outstanding</div><div class="font-bold text-lg text-blue-800 mt-1">${fmt(totalOutstanding)}</div></div>
      </div>

      <h3 class="font-semibold mb-3">Loans</h3>
      ${loans.length === 0 ? '<div class="text-slate-500 mb-6">No loans on record</div>' : `
        <table class="mb-6">
          <thead><tr><th>Loan Ref</th><th>Disbursed</th><th>Principal</th><th>Total Repayable</th><th>Paid</th><th>Outstanding</th><th>Status</th></tr></thead>
          <tbody>
            ${loans.map(l => `<tr><td class="font-mono text-xs">${loanRef(l)}</td><td>${fmtDate(l.disbursementDate)}</td><td>${fmt(l.principal)}</td><td>${fmt(l.totalRepayable)}</td><td>${fmt(loanPaid(l.id))}</td><td class="font-medium">${fmt(loanOutstanding(l.id))}</td><td><span class="badge badge-${(isOverdue(l)?'overdue':l.status).toLowerCase()}">${isOverdue(l)?'Overdue':l.status}</span></td></tr>`).join('')}
          </tbody>
        </table>`}

      <h3 class="font-semibold mb-3">Transaction History</h3>
      ${allPayments.length === 0 ? '<div class="text-slate-500">No payments on record</div>' : `
        <table>
          <thead><tr><th>Date</th><th>Loan Ref</th><th>Amount</th><th>Method</th><th>Receipt</th></tr></thead>
          <tbody>
            ${allPayments.map(p => `<tr><td>${fmtDate(p.paymentDate)}</td><td class="font-mono text-xs">${loanRefById(p.loanId)}</td><td class="font-medium text-green-700">${fmt(p.amount)}</td><td>${escapeHtml(p.method)}</td><td class="font-mono text-xs">${escapeHtml(p.receiptNumber || '—')}</td></tr>`).join('')}
          </tbody>
        </table>`}

      <div class="mt-8 pt-4 border-t border-slate-200 text-xs text-slate-500">
        This statement is computer-generated. Please report any discrepancies to your loan officer immediately.
      </div>
    </div>
  `;
}

function reportOfficer() {
  // Group loans and payments by creator
  const officers = {};
  state.users.forEach(u => { officers[u.id] = { user: u, loansCreated: 0, principalDisbursed: 0, paymentsRecorded: 0, amountCollected: 0 }; });
  state.loans.forEach(l => { if (officers[l.createdBy]) { officers[l.createdBy].loansCreated++; officers[l.createdBy].principalDisbursed += l.principal; } });
  state.payments.forEach(p => { if (officers[p.createdBy]) { officers[p.createdBy].paymentsRecorded++; officers[p.createdBy].amountCollected += p.amount; } });
  const rows = Object.values(officers).filter(o => o.loansCreated > 0 || o.paymentsRecorded > 0).sort((a,b) => b.amountCollected - a.amountCollected);

  return `
    <div class="mb-4 flex justify-between items-center no-print">
      <div class="text-sm text-slate-600">All-time performance</div>
      <button onclick="window.print()" class="btn-secondary text-sm">Print</button>
    </div>
    <div class="card overflow-hidden">
      ${rows.length === 0 ? '<div class="p-12 text-center text-slate-500">No activity recorded yet</div>' : `
        <table>
          <thead><tr><th>Officer</th><th>Role</th><th class="text-right">Loans Created</th><th class="text-right">Principal Disbursed</th><th class="text-right">Payments Recorded</th><th class="text-right">Amount Collected</th></tr></thead>
          <tbody>
            ${rows.map(o => `<tr><td class="font-medium">${escapeHtml(o.user.fullName)}</td><td><span class="badge badge-${o.user.role.toLowerCase().replace(' ','')}">${escapeHtml(o.user.role)}</span></td><td class="text-right">${o.loansCreated}</td><td class="text-right font-medium">${fmt(o.principalDisbursed)}</td><td class="text-right">${o.paymentsRecorded}</td><td class="text-right font-medium text-green-700">${fmt(o.amountCollected)}</td></tr>`).join('')}

}

const MANAGE_USERS_FN_URL = SUPABASE_URL + '/functions/v1/manage-users';

async function callManageUsers(payload) {
  const { data: sessionData } = await db.auth.getSession();
  const token = sessionData?.session?.access_token;
  const resp = await fetch(MANAGE_USERS_FN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'apikey': SUPABASE_KEY },
    body: JSON.stringify(payload)
  });
  const out = await resp.json();
  if (!resp.ok) throw new Error(out.error || 'Request failed');
  return out;
}

function generateTempPassword() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let p = '';
  for (let i = 0; i < 10; i++) p += chars[Math.floor(Math.random() * chars.length)];
  return p;
}

async function saveUser() {
  const fullName = document.getElementById('u-fullName').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const role = document.getElementById('u-role').value;
  const password = document.getElementById('u-password').value;
  if (!fullName || !email || !role) { showAlert('Full name, email and role are required.'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('Please enter a valid email address.'); return; }
  if (!password || password.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
  const btn = document.getElementById('u-save-btn');
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    const result = await callManageUsers({ action: 'create', full_name: fullName, email, role, password });
    await logAudit('create', 'user', result.user_id, { fullName, role });
    await saveTable('users');
    closeModal();
    render();
    showAlert(`User created.\n\nLogin email: ${email}\nTemporary password: ${password}\n\nShare these with ${fullName.split(' ')[0]} privately, then delete the message.`, 'User Created');
  } catch (e) {
    showAlert('Could not create user: ' + e.message);
    btn.disabled = false; btn.textContent = 'Create User';
  }
}

function toggleUserActive(userId, active) {
  const u = state.users.find(x => x.id === userId);
  if (!u) return;
  confirmAction(
    active
      ? `Reactivate ${u.fullName}? They will be able to sign in again.`
      : `Deactivate ${u.fullName}?\n\nThey will be blocked from signing in immediately. Their history and records remain intact.`,
    async () => {
      try {
        await callManageUsers({ action: 'set_active', user_id: userId, active });
        await logAudit(active ? 'activate' : 'deactivate', 'user', userId, { fullName: u.fullName });
        await saveTable('users');
        closeModal();
        render();
      } catch (e) { showAlert('Could not update user: ' + e.message); }
    },
    active ? 'Activate' : 'Deactivate',
    active ? 'bg-green-700 hover:bg-green-800' : undefined
  );
}

function showAuditDetail(auditId) {
  const a = state.audit.find(x => x.id === auditId);
  if (!a) return;
  let detailsHtml = '';
  if (a.details.changes) {
    const changes = a.details.changes;
    detailsHtml = `<table><thead><tr><th>Field</th><th>Before</th><th>After</th></tr></thead><tbody>${Object.keys(changes).map(k => `<tr><td class="font-medium">${escapeHtml(k)}</td><td class="text-red-700">${escapeHtml(String(changes[k].before ?? '—'))}</td><td class="text-green-700">${escapeHtml(String(changes[k].after ?? '—'))}</td></tr>`).join('')}</tbody></table>`;
  } else if (a.details.snapshot) {
    detailsHtml = `<table><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>${Object.keys(a.details.snapshot).filter(k => typeof a.details.snapshot[k] !== 'object').map(k => `<tr><td class="font-medium">${escapeHtml(k)}</td><td>${escapeHtml(String(a.details.snapshot[k] ?? '—'))}</td></tr>`).join('')}</tbody></table>`;
  } else {
    detailsHtml = `<pre class="bg-slate-50 p-3 rounded text-xs overflow-auto">${escapeHtml(JSON.stringify(a.details, null, 2))}</pre>`;
  }
  const modal = `
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4" onclick="if(event.target===this) closeModal()">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-3xl max-h-[90vh] overflow-auto">

          <div class="grid grid-cols-2 gap-4 mb-6">
            <div><div class="text-xs text-slate-500 uppercase">Timestamp</div><div class="font-medium mt-1">${fmtDateTime(a.timestamp)}</div></div>

// =====================================================
// APR CALCULATION (NAMFISA disclosure requirement)
// =====================================================
function calculateAPR(principal, monthlyPayment, months) {
  if (principal <= 0 || monthlyPayment <= 0 || months <= 0) return 0;
  // Newton-Raphson to solve PV = M * (1 - (1+i)^-n) / i for monthly rate i
  let i = 0.05;
  for (let iter = 0; iter < 100; iter++) {
    if (i <= 0) i = 0.001;
    const f = monthlyPayment * (1 - Math.pow(1 + i, -months)) / i - principal;
    const fPrime = monthlyPayment * (months * Math.pow(1 + i, -months - 1) / i - (1 - Math.pow(1 + i, -months)) / (i * i));
    const newI = i - f / fPrime;
    if (Math.abs(newI - i) < 1e-9) { i = newI; break; }
    i = newI;
  }
  return i * 12 * 100; // nominal annual rate as percentage
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function compressImage(file, maxSize = 1200, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxSize || height > maxSize) {
          if (width > height) { height = Math.round((height / width) * maxSize); width = maxSize; }
          else { width = Math.round((width / height) * maxSize); height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleKycUpload(inputEl, kycType) {
  const file = inputEl.files[0];
  if (!file) return;
  const maxSizeMB = 4;
  if (file.size > maxSizeMB * 1024 * 1024) {
    showAlert(`File too large (max ${maxSizeMB}MB). Try a smaller file or take a clearer photo.`);
    inputEl.value = '';
    return;
  }
  try {
    let dataUrl;
    if (file.type.startsWith('image/')) {
      // Compress images, especially for client photos
      const maxDim = kycType === 'photo' ? 600 : 1400;
      dataUrl = await compressImage(file, maxDim, 0.75);
    } else {
      // PDFs and other docs — store as-is
      dataUrl = await fileToBase64(file);
    }
    state.pendingKyc[kycType] = { filename: file.name, mimeType: file.type, data: dataUrl, size: file.size };
    const previewEl = document.getElementById(`kyc-preview-${kycType}`);
    if (previewEl) previewEl.innerHTML = renderKycPreview(kycType, state.pendingKyc[kycType]);
  } catch (e) {
    showAlert('Could not process file: ' + e.message);
  }
}

function renderKycPreview(kycType, doc) {
  if (!doc) return '<span class="text-xs text-slate-500">No file</span>';
  const isImg = doc.mimeType.startsWith('image/');
  return `
    <div class="flex items-center gap-3 p-2 bg-slate-50 rounded-lg">
      ${isImg ? `<img src="${doc.data}" class="w-12 h-12 object-cover rounded">` : `<div class="w-12 h-12 bg-slate-200 rounded flex items-center justify-center text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>`}
      <div class="flex-1 min-w-0">
        <div class="text-xs font-medium truncate">${escapeHtml(doc.filename || 'document')}</div>
        <div class="text-xs text-slate-500">${Math.round((doc.size || doc.data.length) / 1024)}KB</div>
      </div>
      <button onclick="removePendingKyc('${kycType}')" class="text-xs text-red-600 hover:underline">Remove</button>
    </div>
  `;
}

function removePendingKyc(kycType) {
  state.pendingKyc[kycType] = '__DELETE__';
  const previewEl = document.getElementById(`kyc-preview-${kycType}`);
  if (previewEl) previewEl.innerHTML = '<span class="text-xs text-slate-500">Marked for removal — save to confirm</span>';

}

async function saveKycDocuments(clientId) {
  const updates = {};
  const typeMap = { photo: 'photo_url', id: 'id_document_url', income: 'income_document_url' };
  for (const kycType of ['photo', 'id', 'income']) {
    const pending = state.pendingKyc[kycType];
    if (!pending) continue;
    const urlField = typeMap[kycType];
    if (pending === '__DELETE__') {
      // Remove from storage and clear URL
      const client = state.clients.find(c => c.id === clientId);
      const url = client?.[urlField.replace(/_([a-z])/g, (_, c) => c.toUpperCase())];
      if (url) {
        const path = extractStoragePath(url);
        if (path) await db.storage.from('kyc-documents').remove([path]);
      }
      updates[urlField] = null;
    } else {
      // Upload to storage
      try {
        const ext = pending.filename.split('.').pop().toLowerCase();
        const path = `${clientId}/${kycType}_${Date.now()}.${ext}`;
        // Convert base64 data URL to Blob
        const res = await fetch(pending.data);
        const blob = await res.blob();
        const { error: upErr } = await db.storage.from('kyc-documents').upload(path, blob, { contentType: pending.mimeType, upsert: true });
        if (upErr) { console.error('Upload error:', upErr); showAlert(`Could not upload ${kycType}: ${upErr.message}`); continue; }
        const { data: urlData } = db.storage.from('kyc-documents').getPublicUrl(path);
        updates[urlField] = urlData.publicUrl;
      } catch (e) {
        console.error(e);
        showAlert(`Could not save ${kycType} document: ${e.message}`);
      }
    }
  }
  if (Object.keys(updates).length > 0) {
    await db.from('clients').update(updates).eq('id', clientId);
  }
  state.pendingKyc = {};
}

function extractStoragePath(url) {
  // Extract path after /kyc-documents/ in a Supabase public URL
  const match = url.match(/\/kyc-documents\/(.+)$/);
  return match ? match[1] : null;
}

async function loadKycDocument(clientId, kycType) {
  const client = state.clients.find(c => c.id === clientId);
  if (!client) return null;
  const urlField = { photo: 'photoUrl', id: 'idDocumentUrl', income: 'incomeDocumentUrl' }[kycType];
  const url = client[urlField];
  if (!url) return null;
  // Return a doc object compatible with existing UI
  const filename = url.split('/').pop() || `${kycType}.file`;
  const mimeType = filename.match(/\.(jpg|jpeg)$/i) ? 'image/jpeg' :
                   filename.match(/\.png$/i) ? 'image/png' :
                   filename.match(/\.pdf$/i) ? 'application/pdf' : 'application/octet-stream';
  return { filename, mimeType, data: url };
}

async function loadAllKyc(clientId) {
  const result = {};
  for (const kycType of ['photo', 'id', 'income']) {
    result[kycType] = await loadKycDocument(clientId, kycType);
  }
  return result;
}

function downloadDataUrl(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// =====================================================
// WHATSAPP SHARING
// =====================================================
// =====================================================
// NAMIBIAN PHONE NUMBER HELPERS (+264)
// =====================================================
// Returns just the local digits: strips +264 / 264 / 00264 prefixes and a leading 0
function namibianDigits(raw) {
  let d = (raw || '').toString().replace(/\D/g, '');
  if (d.startsWith('00264')) d = d.substring(5);
  else if (d.startsWith('264')) d = d.substring(3);
  if (d.startsWith('0')) d = d.substring(1);
  return d;
}
// Full international format for storage: +26481xxxxxxx
function formatNamibianPhone(raw) {
  const d = namibianDigits(raw);
  return d ? '+264' + d : '';
}
// A phone input with a fixed +264 prefix; the person types only the local number
function phonePrefixInput(id, value, required, placeholder) {
  return `
    <div style="display:flex; align-items:stretch;">
      <span style="display:flex; align-items:center; background:#f1f5f9; border:1px solid #cbd5e1; border-right:0; border-radius:8px 0 0 8px; padding:0 10px; font-size:14px; color:#334155; white-space:nowrap;">+264</span>
      <input type="tel" id="${id}" inputmode="numeric" value="${escapeHtml(namibianDigits(value || ''))}" placeholder="${placeholder || '81 234 5678'}" ${required ? 'required' : ''} style="border-radius:0 8px 8px 0;" oninput="this.value = this.value.replace(/[^0-9 ]/g, '')">
    </div>
  `;
}

function whatsappLink(phone, message) {
  // Strip non-digits, ensure starts with country code
  let num = (phone || '').replace(/[^0-9]/g, '');
  // Namibian numbers: if starts with 0, replace with 264
  if (num.startsWith('0')) num = '264' + num.substring(1);
  return `https://wa.me/${num}?text=${encodeURIComponent(message)}`;
}

function openWhatsApp(phone, message) {
  const url = whatsappLink(phone, message);
  if (typeof openLink === 'function') openLink(url);
  else window.open(url, '_blank');
}

// Sends the client a WhatsApp message that their loan is approved,
// with the amount and repayment details.
function sendLoanApprovalWhatsApp(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return;
  const client = state.clients.find(c => c.id === loan.clientId);
  if (!client || !client.phone) { showAlert('No phone number on file for this client.'); return; }
  const schedule = ensureSchedule(loan);
  const firstDue = schedule && schedule.length ? schedule[0].dueDate : null;
  const lastDue = schedule && schedule.length ? schedule[schedule.length - 1].dueDate : loan.maturityDate;
  const firstName = (client.fullName || '').split(' ')[0];
  const message =
    `Dear ${firstName},\n\n` +
    `Good news! Your loan with GPL Finance has been *APPROVED*. 🎉\n\n` +
    `*Loan Details*\n` +
    `Loan Ref: ${loanRef(loan)}\n` +
    `Loan Amount: ${fmt(loan.principal)}\n` +
    `Total Repayable: ${fmt(loan.totalRepayable)}\n` +
    `Monthly Repayment: ${fmt(loan.monthlyInstallment)} x ${loan.termMonths} month${loan.termMonths > 1 ? 's' : ''}\n` +
    (firstDue ? `First Repayment Date: ${fmtDate(firstDue)}\n` : '') +
    (lastDue ? `Final Repayment Date: ${fmtDate(lastDue)}\n` : '') +
    `\nPlease keep this message for your records. If you have any questions, simply reply here.\n\n` +
    `Kind regards,\nGPL Finance`;
  logAudit('send', 'loan', loanId, { channel: 'whatsapp', type: 'approval_notice' });
  openWhatsApp(client.phone, message);
}

// PDF GENERATION
// =====================================================
function generateLoanAgreement(loanId) {
  if (!window.jspdf) { showAlert('PDF library not loaded. Please wait a moment and try again.'); return; }
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return;
  const client = state.clients.find(c => c.id === loan.clientId);
  const s = state.settings || {};
  const schedule = ensureSchedule(loan);
  const apr = calculateAPR(loan.principal, loan.monthlyInstallment, loan.termMonths);
  const pdfEwalletFee = loanEwalletFee(loan);
  const financeCharge = loan.totalRepayable - loan.principal - pdfEwalletFee;
  const flatRate = loan.interestRate;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 18;
  let y = 16;

  // ---- HEADER ----
  doc.setFontSize(13).setFont('helvetica', 'bold');
  y = addPdfLogo(doc, s, pageW, y);
  doc.text(s.companyName || 'GPL Finance', pageW/2, y, { align: 'center' }); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');
  if (s.namfisaReg) { doc.text(`Registered Microlender · NAMFISA Reg. No.: ${s.namfisaReg}`, pageW/2, y, { align: 'center' }); y += 4; }
  if (s.address) { doc.text(s.address, pageW/2, y, { align: 'center' }); y += 4; }
  if (s.phone || s.email) { doc.text(`${s.phone || ''}${s.phone && s.email ? ' · ' : ''}${s.email || ''}`, pageW/2, y, { align: 'center' }); y += 4; }
  y += 3;
  doc.setDrawColor(30, 64, 175).setLineWidth(0.5).line(margin, y, pageW - margin, y); y += 8;

  doc.setFontSize(14).setFont('helvetica', 'bold');
  doc.text('MICROLENDING AGREEMENT', pageW/2, y, { align: 'center' }); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');
  doc.text('Issued in terms of the Microlending Act, 2018 (Act No. 7 of 2018)', pageW/2, y, { align: 'center' }); y += 8;

  // ---- AGREEMENT METADATA ----
  doc.setFontSize(9);
  doc.text(`Agreement Reference: ${loanRef(loan)}`, margin, y);
  doc.text(`Date of Issue: ${fmtDate(today())}`, pageW - margin, y, { align: 'right' }); y += 6;

  // ---- PARTIES ----
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('1. PARTIES', margin, y); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');
  doc.text(`THE LENDER:  ${s.companyName || 'GPL Finance'}`, margin, y); y += 4;
  if (s.namfisaReg) { doc.text(`             NAMFISA Reg. No.: ${s.namfisaReg}`, margin, y); y += 4; }
  if (s.address) { doc.text(`             Address: ${s.address}`, margin, y); y += 4; }
  y += 2;
  doc.text(`THE BORROWER: ${client?.fullName || '—'}`, margin, y); y += 4;
  doc.text(`              ID Number: ${client?.idNumber || '—'}`, margin, y); y += 4;
  doc.text(`              Phone: ${client?.phone || '—'}`, margin, y); y += 4;
  if (client?.address) { doc.text(`              Address: ${client.address}`, margin, y); y += 4; }
  y += 4;

  // ---- LOAN PARTICULARS ----
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('2. LOAN PARTICULARS', margin, y); y += 5;
  doc.autoTable({
    startY: y,
    head: [['Item', 'Amount / Detail']],
    body: [
      ['Principal Amount (capital advanced)', fmt(loan.principal)],
      ['Finance Charge (interest)', fmt(financeCharge)],
      ...(pdfEwalletFee ? [['eWallet Disbursement Fee', fmt(pdfEwalletFee)]] : []),
      ['Total Cost of Credit', fmt(loan.totalRepayable)],
      ['Flat Interest Rate', `${flatRate}% over ${loan.termMonths} months`],
      ['Annual Percentage Rate (APR)', `${apr.toFixed(2)}% per annum`],
      ['Term of Loan', `${loan.termMonths} months`],
      ['Disbursement Date', fmtDate(loan.disbursementDate)],
      ['Final Repayment Date', fmtDate(loan.maturityDate)],
      ['Monthly Instalment', fmt(loan.monthlyInstallment)],
      ['Number of Instalments', `${loan.termMonths}`],
      ['Purpose of Loan', loan.purpose || 'Not specified']
    ],
    theme: 'grid',
    headStyles: { fillColor: [30, 64, 175], textColor: 255, fontStyle: 'bold', fontSize: 9 },
    bodyStyles: { fontSize: 9 },
    columnStyles: { 0: { cellWidth: 75 }, 1: { cellWidth: pageW - margin*2 - 75 } },
    margin: { left: margin, right: margin }
  });
  y = doc.lastAutoTable.finalY + 6;

  // ---- COST OF CREDIT DISCLOSURE ----
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('3. COST OF CREDIT DISCLOSURE', margin, y); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');

  const lines = doc.splitTextToSize(disclosure, pageW - margin*2);
  doc.text(lines, margin, y); y += lines.length * 4 + 4;

  // Late Payment Penalty Disclosure (if enabled)
  const penaltyCfg = state.settings.penalty;
  if (penaltyCfg?.enabled) {
    if (y > 250) { doc.addPage(); y = 20; }
    doc.setFont('helvetica', 'bold').setFontSize(9);
    doc.text('Late Payment Penalty:', margin, y); y += 4;
    doc.setFont('helvetica', 'normal');
    const penDescParts = [];
    if (penaltyCfg.type === 'percentage') penDescParts.push(`${penaltyCfg.amount}% of the ${penaltyCfg.basis === 'instalment' ? 'overdue instalment' : 'outstanding balance'}`);
    else penDescParts.push(`a flat fee of ${fmt(penaltyCfg.amount)}`);
    penDescParts.push(`${penaltyCfg.frequency} basis`);
    penDescParts.push(`after a grace period of ${penaltyCfg.gracePeriodDays} day(s)`);
    if (penaltyCfg.maxPenaltyPercent < 100) penDescParts.push(`subject to a maximum cap of ${penaltyCfg.maxPenaltyPercent}% of principal`);
    const penText = `Late payments will accrue a penalty of ${penDescParts.join(', ')}. Penalties form part of the total outstanding balance and must be paid in addition to scheduled instalments. This penalty arrangement complies with the limits set by the Microlending Act, 2018.`;
    const penLines = doc.splitTextToSize(penText, pageW - margin*2);
    doc.text(penLines, margin, y); y += penLines.length * 4 + 4;
  }

  // ---- REPAYMENT SCHEDULE ----
  if (y > 240) { doc.addPage(); y = 20; }
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('4. REPAYMENT SCHEDULE', margin, y); y += 5;

    startY: y,
    head: [['Inst. #', 'Due Date', 'Amount Due (N$)']],

    bodyStyles: { fontSize: 9 },
    margin: { left: margin, right: margin }
  });
  y = doc.lastAutoTable.finalY + 6;

  // ---- TERMS AND CONDITIONS ----
  if (y > 220) { doc.addPage(); y = 20; }
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('5. TERMS AND CONDITIONS', margin, y); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');

  const terms = [
    ['5.1 Cooling-Off Period', 'The Borrower may, within five (5) business days of signing this agreement, cancel the loan by repaying the principal in full without any interest or charges, in accordance with Section 13 of the Microlending Act, 2018.'],
    ['5.2 Repayment', 'The Borrower undertakes to repay each instalment on or before the due date stated in the schedule above, by the method agreed with the Lender (cash, bank transfer, mobile money, or cheque).'],
    ['5.3 Default', 'Should the Borrower fail to pay any instalment by its due date, the full outstanding balance may become immediately due and payable. The Lender reserves the right to institute legal action and to list the Borrower with credit bureaus, as permitted by law.'],
    ['5.4 Early Settlement', 'The Borrower may at any time settle the outstanding balance in full or in part without penalty. Upon settlement, only interest accrued up to the date of settlement shall be payable.'],
    ['5.5 Variation', 'Any variation of this agreement must be in writing and signed by both parties.'],
    ['5.6 Complaints', 'In the event of any dispute, the Borrower may lodge a complaint with the Namibia Financial Institutions Supervisory Authority (NAMFISA) at +264 61 290 5000 or complaints@namfisa.com.na.'],
    ['5.7 Personal Information', 'The Borrower consents to the processing of personal information by the Lender for the purposes of administering this loan, in accordance with applicable data protection laws.']
  ];
  for (const [heading, body] of terms) {
    if (y > 270) { doc.addPage(); y = 20; }
    doc.setFont('helvetica', 'bold').setFontSize(9);
    doc.text(heading, margin, y); y += 4;
    doc.setFont('helvetica', 'normal');
    const wrapped = doc.splitTextToSize(body, pageW - margin*2);
    doc.text(wrapped, margin, y); y += wrapped.length * 4 + 3;
  }

  // ---- ACKNOWLEDGMENT & SIGNATURES ----
  if (y > 235) { doc.addPage(); y = 20; }
  y += 4;
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('6. ACKNOWLEDGMENT', margin, y); y += 4;
  doc.setFontSize(9).setFont('helvetica', 'normal');
  const ack = 'The Borrower acknowledges that the terms of this agreement, including the total cost of credit and the Annual Percentage Rate, have been explained and understood. The Borrower confirms that the information provided is true and correct, and that this loan is being taken voluntarily.';
  const ackLines = doc.splitTextToSize(ack, pageW - margin*2);
  doc.text(ackLines, margin, y); y += ackLines.length * 4 + 6;

  const sigY = y;
  const colW = (pageW - margin*2 - 20) / 2;
  const sigLineY = sigY + 16;   // Y coordinate of the signature line
  const sigBoxHeight = 14;      // Compact space above the line for signature image

  // Draw signature lines
  doc.setDrawColor(0).setLineWidth(0.3);
  doc.line(margin, sigLineY, margin + colW, sigLineY);
  doc.line(margin + colW + 20, sigLineY, margin + colW + 20 + colW, sigLineY);

  // ---- EMBED BORROWER SIGNATURE if loan is signed ----
  if (loan.signedAt && loan.signatureData && loan.signatureData.signature_image) {
    try {
      const sigW = colW - 4;
      const sigH = sigBoxHeight;
      doc.addImage(
        loan.signatureData.signature_image,
        'PNG',
        margin + 2,
        sigLineY - sigH,
        sigW,
        sigH
      );
    } catch (e) {
      console.warn('Signature image embed failed:', e);
    }
  }

  // ---- EMBED LENDER SIGNATURE if countersigned ----
  if (loan.lenderSignedAt && loan.lenderSignatureData && loan.lenderSignatureData.signature_image) {
    try {
      const sigW = colW - 4;
      const sigH = sigBoxHeight;
      doc.addImage(
        loan.lenderSignatureData.signature_image,
        'PNG',
        margin + colW + 20 + 2,
        sigLineY - sigH,
        sigW,
        sigH
      );
    } catch (e) {
      console.warn('Lender signature image embed failed:', e);
    }
  }

  // Signed at / on details - fill in for borrower if signed
  doc.setFontSize(8);
  const signedDate = loan.signedAt ? new Date(loan.signedAt) : null;
  const signedDateStr = signedDate ? signedDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '___________';

  doc.text(`Signed at ${signedLocStr} on ${signedDateStr}`, margin, sigLineY + 4);

  if (loan.signedAt && loan.signatureData?.id_number) {
    doc.text(`ID Number: ${loan.signatureData.id_number}`, margin, sigLineY + 12);
  }

  // Lender side - fill in if countersigned
  const lenderDate = loan.lenderSignedAt ? new Date(loan.lenderSignedAt) : null;
  const lenderDateStr = lenderDate ? lenderDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : '___________';
  const lenderLocStr = loan.lenderSignedAt ? 'Electronically' : '_____________________';
  doc.text(`Signed at ${lenderLocStr} on ${lenderDateStr}`, margin + colW + 20, sigLineY + 4);
  doc.text(`For and on behalf of the Lender`, margin + colW + 20, sigLineY + 8);
  if (loan.lenderSignedAt && loan.lenderSignatureData?.signed_by_name) {
    doc.text(`Signed by: ${loan.lenderSignatureData.signed_by_name}`, margin + colW + 20, sigLineY + 12);
  }

  // ---- Compact electronic signature note (below signature block) if signed ----
  if (loan.signedAt) {
    let noteY = sigLineY + 18;
    doc.setDrawColor(200); doc.setLineWidth(0.2);
    doc.line(margin, noteY, pageW - margin, noteY); noteY += 3;

    doc.setFontSize(7).setFont('helvetica', 'italic').setTextColor(80);
    let noteText = `Electronically signed on ${signedDate.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}. Borrower: ${loan.signatureData?.name || client?.fullName || ''}${loan.signatureData?.id_number ? ' · ID: ' + loan.signatureData.id_number : ''}.`;
    if (loan.lenderSignedAt) {
      noteText += ` Lender countersigned by ${loan.lenderSignatureData.signed_by_name} on ${new Date(loan.lenderSignedAt).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}.`;
    }
    noteText += ` Legally binding under the Electronic Transactions Act, 4 of 2019 (Namibia).`;
    doc.text(noteText, margin, noteY, { maxWidth: pageW - margin*2 });
    doc.setTextColor(0);
  }

  // ---- FOOTER ----
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(8).setTextColor(120);
    doc.text(`${loanRef(loan)}  ·  Page ${i} of ${pageCount}`, pageW/2, doc.internal.pageSize.getHeight() - 8, { align: 'center' });
  }

  return doc;
}


function downloadLoanAgreement(loanId) {

  const client = state.clients.find(c => c.id === loan.clientId);

  };

async function sendSignedAgreementWhatsApp(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return;
  const client = state.clients.find(c => c.id === loan.clientId);
  if (!client?.phone) { showAlert('Client has no phone number on file.'); return; }
  if (!loan.signedAt) { showAlert('Loan has not been signed yet.'); return; }

  // Check for existing active agreement link for this loan
  let link = (state.clientLinks || []).find(l => l.loanId === loanId && l.linkType === 'agreement' && new Date(l.expiresAt) > new Date());

  // Create a new one if none exists
  if (!link) {
    const token = generateToken();
    const expiresAt = new Date();
    expiresAt.setDate(expiresAt.getDate() + 30); // 30 days for agreements
    const record = {
      token,
      link_type: 'agreement',
      client_id: loan.clientId,
      loan_id: loanId,
      expires_at: expiresAt.toISOString(),
      created_by: state.currentUser?.id || null
    };
    const { data, error } = await db.from('client_links').insert(record).select().single();
    if (error) { showAlert('Could not create agreement link: ' + error.message); return; }
    await saveTable('clientLinks');
    await logAudit('create', 'client_link', data.id, { type: 'agreement', loanId });
    link = snakeToCamel(data);
  }

  const url = buildLinkUrl({ link_type: 'agreement', token: link.token });
  const companyName = state.settings.companyName || 'GPL Finance';
  const message = buildSignedAgreementLinkMessage(loan, client, companyName, url);
  const phone = (client.phone || '').replace(/[^0-9]/g, '');
  const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  await logAudit('send', 'loan', loanId, { channel: 'whatsapp', method: 'link' });
  window.open(waUrl, '_blank');
}

function loanFirstDueDate(loan) {
  const sched = loan.schedule;
  if (sched && sched.length) return new Date(sched[0].dueDate);
  const d = new Date(loan.disbursementDate || loan.disbursement_date);
  d.setMonth(d.getMonth() + 1);
  return d;
}

function buildSignedAgreementLinkMessage(loan, client, companyName, url) {
  const firstName = client.fullName.split(' ')[0];
  const principal = fmt(loan.principal);
  const firstDue = loanFirstDueDate(loan);
  return `Hello ${firstName},\n\nThank you for signing your loan agreement with ${companyName}.\n\nYou can view and download your signed agreement here:\n${url}\n\nLoan Reference: ${loanRef(loan)}\nPrincipal: ${principal}\nTotal Repayable: ${fmt(loan.totalRepayable)}\nMonthly Instalment: ${fmt(loan.monthlyInstallment)}\nFirst Payment Due: ${firstDue.toISOString().slice(0,10)}\n\nThis link is valid for 30 days.\n\n${companyName}`;
}

function buildSignedAgreementMessage(loan, client, companyName) {
  const firstName = client.fullName.split(' ')[0];
  const principal = fmt(loan.principal);
  const firstDue = loanFirstDueDate(loan);
  return `Hello ${firstName},\n\nThank you for signing your loan agreement with ${companyName}.\n\nAttached is your signed copy for your records.\n\nLoan Reference: ${loanRef(loan)}\nPrincipal: ${principal}\nTotal Repayable: ${fmt(loan.totalRepayable)}\nMonthly Instalment: ${fmt(loan.monthlyInstallment)}\nFirst Payment Due: ${firstDue.toISOString().slice(0,10)}\n\nFunds will be released shortly.\n\n${companyName}`;
}

function buildAgreementMessage(loan, client, companyName) {
  const firstName = client.fullName.split(' ')[0];
  const principal = fmt(loan.principal);
  // Generate or find signature link for this loan
  const link = findActiveSignatureLink(loan.id);
  const signUrl = link ? `${PUBLIC_APP_URL}?sign=${link.token}` : '';
  let msg = `Hello ${firstName},\n\nYour loan of ${principal} has been approved.\n\n`;
  if (signUrl) {
    msg += `Please review and sign your agreement here:\n${signUrl}\n\nOnce signed, funds will be released.\n\n`;
  } else {
    msg += `Your agreement is ready for review and signing. We will send the signature link shortly.\n\n`;
  }
  msg += `${companyName}`;
  return msg;
}

function findActiveSignatureLink(loanId) {
  return (state.clientLinks || []).find(l => l.loanId === loanId && l.linkType === 'signature' && !l.completedAt && new Date(l.expiresAt) > new Date());
}

    <button onclick="sendCurrentPdfEmail()" class="text-sm bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>

          </div>
          <div class="flex gap-2 items-center flex-shrink-0 ml-4">
            <button onclick="downloadCurrentPdf()" class="btn-primary text-sm flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              Download
            </button>
            ${whatsappBtn}

function closePdfPreview() {
  const c = document.getElementById('pdf-preview-container');
  if (c) c.remove();
  if (state.currentPdf?.blobUrl) {
    try { URL.revokeObjectURL(state.currentPdf.blobUrl); } catch (e) {}
  }
  state.currentPdf = null;
}

function downloadCurrentPdf() {
  if (!state.currentPdf) return;
  const { dataUri, filename } = state.currentPdf;
  // Try multiple methods to maximize chance of success in sandboxed iframe
  // Method 1: anchor with download attribute
  try {
    const a = document.createElement('a');
    a.href = dataUri;
    a.download = filename;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) {
    // Method 2: open in new window via openLink (escapes the sandbox)
    if (typeof openLink === 'function') {
      openLink(dataUri);
    } else {
      window.open(dataUri, '_blank');
    }
  }
}

function sendCurrentPdfWhatsApp() {
  if (!state.currentPdf?.whatsapp) return;
  // Open WhatsApp with the message only — the Download button is there
  // for anyone who wants the file itself.
  const { phone, message } = state.currentPdf.whatsapp;
  openWhatsApp(phone, message);
}

function generateReceipt(paymentId) {
  if (!window.jspdf) { showAlert('PDF library not loaded. Please wait a moment and try again.'); return; }
  const payment = state.payments.find(p => p.id === paymentId);
  if (!payment) return;
  const loan = state.loans.find(l => l.id === payment.loanId);
  const client = state.clients.find(c => c.id === payment.clientId);
  const s = state.settings || {};
  const remaining = loan ? loanOutstanding(loan.id) : 0;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a5', orientation: 'portrait' });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 12;
  let y = 12;

  // Header
  doc.setFontSize(13).setFont('helvetica', 'bold');
  y = addPdfLogo(doc, s, pageW, y);
  doc.text(s.companyName || 'GPL Finance', pageW/2, y, { align: 'center' }); y += 5;
  doc.setFontSize(8).setFont('helvetica', 'normal');
  if (s.namfisaReg) { doc.text(`NAMFISA Reg. No.: ${s.namfisaReg}`, pageW/2, y, { align: 'center' }); y += 3.5; }
  if (s.address) { doc.text(s.address, pageW/2, y, { align: 'center' }); y += 3.5; }
  if (s.phone) { doc.text(s.phone, pageW/2, y, { align: 'center' }); y += 3.5; }
  y += 2;
  doc.setDrawColor(30, 64, 175).setLineWidth(0.4).line(margin, y, pageW - margin, y); y += 6;

  // Title
  doc.setFontSize(12).setFont('helvetica', 'bold');
  doc.text('PAYMENT RECEIPT', pageW/2, y, { align: 'center' }); y += 8;

  // Receipt body
  doc.setFontSize(9).setFont('helvetica', 'normal');
  const row = (label, value, bold) => {
    doc.setFont('helvetica', 'normal').text(label, margin, y);
    doc.setFont('helvetica', bold ? 'bold' : 'normal').text(String(value), pageW - margin, y, { align: 'right' });
    y += 5;
  };
  row('Receipt No.', payment.receiptNumber || paymentRef(payment));
  row('Date', fmtDate(payment.paymentDate));
  row('Time Recorded', new Date(payment.createdAt || payment.paymentDate).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }));
  y += 2;
  doc.setDrawColor(200).setLineWidth(0.2).line(margin, y, pageW - margin, y); y += 4;
  row('Received From', client?.fullName || '—', true);
  row('Phone', client?.phone || '—');
  row('Loan Reference', payment.loanId);
  row('Payment Method', payment.method);
  y += 2;
  doc.setDrawColor(200).line(margin, y, pageW - margin, y); y += 6;

  // Amount box
  doc.setFillColor(239, 246, 255);
  doc.rect(margin, y, pageW - margin*2, 16, 'F');
  doc.setFontSize(8).setTextColor(30, 64, 175).setFont('helvetica', 'normal');
  doc.text('AMOUNT RECEIVED', pageW/2, y + 5, { align: 'center' });
  doc.setFontSize(16).setFont('helvetica', 'bold');
  doc.text(fmt(payment.amount), pageW/2, y + 13, { align: 'center' });
  doc.setTextColor(0);
  y += 22;

  // Balance summary
  if (loan) {
    doc.setFontSize(9).setFont('helvetica', 'normal');
    row('Total Repayable', fmt(loan.totalRepayable));
    row('Total Paid To Date', fmt(loanPaid(loan.id)));
    row('Remaining Balance', fmt(remaining), true);
    y += 2;
    if (remaining <= 0.01) {
      doc.setFillColor(220, 252, 231);
      doc.rect(margin, y, pageW - margin*2, 8, 'F');
      doc.setTextColor(22, 101, 52).setFont('helvetica', 'bold').setFontSize(10);
      doc.text('LOAN FULLY SETTLED', pageW/2, y + 5.5, { align: 'center' });
      doc.setTextColor(0);
      y += 12;
    }
  }

  if (payment.notes) {
    y += 4;
    doc.setFontSize(8).setFont('helvetica', 'italic').setTextColor(80);
    doc.text('Notes: ' + payment.notes, margin, y, { maxWidth: pageW - margin*2 });
    doc.setTextColor(0);
    y += 8;
  }

  // Footer
  y = doc.internal.pageSize.getHeight() - 25;
  doc.setDrawColor(200).line(margin, y, pageW - margin, y); y += 4;
  doc.setFontSize(7).setFont('helvetica', 'normal').setTextColor(120);
  doc.text(`Recorded by: ${state.users.find(u => u.id === payment.createdBy)?.fullName || 'System'}`, margin, y); y += 3;
  doc.text('This is a computer-generated receipt. Retain for your records.', margin, y); y += 3;
  doc.text('Thank you for your payment.', pageW/2, y + 4, { align: 'center' });

  return doc;
}

// Read the chosen image, shrink it to a sensible size, keep it pending
// until the user presses Save.
function handleLogoUpload(input) {
  const file = input.files && input.files[0];
  input.value = '';
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showAlert('Logo image is too large — please use an image under 5MB.'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const maxH = 160;
      const scale = Math.min(1, maxH / img.height);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      window._pendingLogo = canvas.toDataURL('image/png');
      const prev = document.getElementById('s-logo-preview');
      if (prev) { prev.classList.remove('bg-blue-700'); prev.classList.add('bg-white'); prev.innerHTML = `<img src="${window._pendingLogo}" style="width:100%; height:100%; object-fit:contain;">`; }
    };
    img.onerror = () => showAlert('That file could not be read as an image.');
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function removeCompanyLogo() {

// =====================================================
// DASHBOARD CHARTS
// =====================================================
function initDashboardCharts() {
  if (typeof Chart === 'undefined') return;
  // Destroy old charts if present
  Object.values(state.charts || {}).forEach(c => { try { c.destroy(); } catch (e) {} });
  state.charts = {};

  const commonOpts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { font: { size: 11 } } } }
  };

  // 1. Collections over last 30 days
  const colEl = document.getElementById('chart-collections');
  if (colEl) {
    const days = [];
    const labels = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const dStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      const total = state.payments.filter(p => p.paymentDate === dStr).reduce((s,p) => s+p.amount, 0);
      days.push(total);
      labels.push(d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }));
    }
    state.charts.collections = new Chart(colEl, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Daily Collections (N$)',
          data: days,
          borderColor: '#1e40af',
          backgroundColor: 'rgba(30, 64, 175, 0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 2
        }]
      },
      options: { ...commonOpts, scales: { y: { beginAtZero: true, ticks: { callback: v => 'N$' + v.toLocaleString() } } } }
    });
  }

  // 2. Loan status distribution (donut)
  const statusEl = document.getElementById('chart-status');
  if (statusEl) {
    const counts = { Active: 0, Pending: 0, Completed: 0, Defaulted: 0, 'Written Off': 0, Overdue: 0 };
    state.loans.forEach(l => {
      if (l.status === 'Active' && isOverdue(l)) counts.Overdue++;
      else counts[l.status] = (counts[l.status] || 0) + 1;
    });
    const filtered = Object.entries(counts).filter(([k,v]) => v > 0);
    state.charts.status = new Chart(statusEl, {
      type: 'doughnut',
      data: {
        labels: filtered.map(([k]) => k),
        datasets: [{
          data: filtered.map(([k,v]) => v),
          backgroundColor: ['#1e40af','#f59e0b','#16a34a','#dc2626','#64748b','#991b1b'],
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: { ...commonOpts, cutout: '60%' }
    });
  }

  // 3. Portfolio growth (cumulative outstanding by month, last 6 months)
  const portEl = document.getElementById('chart-portfolio');
  if (portEl) {
    const months = [];
    const data = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      d.setDate(1);
      const endOfMonth = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      const endStr = endOfMonth.toISOString().split('T')[0];
      // Calculate outstanding as of end of this month
      let outstanding = 0;
      state.loans.forEach(l => {
        if (l.disbursementDate > endStr) return;
        const repaid = state.payments.filter(p => p.loanId === l.id && p.paymentDate <= endStr).reduce((s,p) => s+p.amount, 0);
        const remaining = l.totalRepayable - repaid;
        if (remaining > 0.01) outstanding += remaining;
      });
      data.push(outstanding);
      months.push(d.toLocaleDateString('en-GB', { month: 'short', year: '2-digit' }));
    }
    state.charts.portfolio = new Chart(portEl, {
      type: 'bar',
      data: { labels: months, datasets: [{ label: 'Outstanding Portfolio (N$)', data, backgroundColor: '#1e40af' }] },
      options: { ...commonOpts, scales: { y: { beginAtZero: true, ticks: { callback: v => 'N$' + (v/1000).toFixed(0) + 'k' } } } }
    });
  }

  // 4. Disbursements vs Collections (6 months)
  const flowEl = document.getElementById('chart-flow');
  if (flowEl) {
    const labels = [];
    const disb = [];
    const coll = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const yyyymm = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      labels.push(d.toLocaleDateString('en-GB', { month: 'short', year: '2-digit' }));
      disb.push(state.loans.filter(l => l.disbursementDate.startsWith(yyyymm)).reduce((s,l) => s+l.principal, 0));
      coll.push(state.payments.filter(p => p.paymentDate.startsWith(yyyymm)).reduce((s,p) => s+p.amount, 0));
    }
    state.charts.flow = new Chart(flowEl, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Disbursed (N$)', data: disb, backgroundColor: '#1e40af' },
          { label: 'Collected (N$)', data: coll, backgroundColor: '#16a34a' }
        ]
      },
      options: { ...commonOpts, scales: { y: { beginAtZero: true, ticks: { callback: v => 'N$' + (v/1000).toFixed(0) + 'k' } } } }
    });
  }
}

function bulkChangeLoanStatus(newStatus) {
  const ids = Array.from(state.bulkSelection.loans);
  if (ids.length === 0) return;
  confirmAction(`Change status to "${newStatus}" for ${ids.length} loan(s)?`, async () => {
    for (const id of ids) {
      const idx = state.loans.findIndex(l => l.id === id);
      if (idx === -1) continue;
      const before = { ...state.loans[idx] };
      state.loans[idx].status = newStatus;
      state.loans[idx].updatedAt = new Date().toISOString();
      await logAudit('update', 'loan', id, { changes: { status: { before: before.status, after: newStatus } }, bulk: true });
    }
    await saveTable('loans');
    state.bulkSelection.loans.clear();
    closeModal();
    render();
    showAlert(`${ids.length} loan(s) updated to ${newStatus}.`, 'Done');
  }, 'Apply', 'bg-blue-700 hover:bg-blue-800');
}

function bulkSendStatements() {
  const ids = Array.from(state.bulkSelection.loans);
  // Group by client
  const clientIds = [...new Set(ids.map(id => state.loans.find(l => l.id === id)?.clientId).filter(Boolean))];
  if (clientIds.length === 0) return;
  confirmAction(`Open WhatsApp for ${clientIds.length} client(s)?\n\nA new WhatsApp tab will open for each client (with a statement summary). Your browser may ask permission to open multiple tabs.`, async () => {
    closeModal();
    for (let i = 0; i < clientIds.length; i++) {
      const c = state.clients.find(c => c.id === clientIds[i]);
      if (!c) continue;
      const clientLoans = state.loans.filter(l => l.clientId === c.id);
      const totalOut = clientLoans.filter(l => l.status === 'Active').reduce((s,l) => s + loanOutstanding(l.id), 0);

}

function renderReminders() {
  const today_ = today();
  const upcoming = []; // due within next 7 days, not yet due
  const overdue = []; // already overdue

  state.loans.forEach(l => {
    if (l.status === 'Completed' || l.status === 'Written Off') return;
    const c = state.clients.find(c => c.id === l.clientId);
    if (!c) return;
    ensureSchedule(l).forEach(s => {
      if (s.status === 'Paid' || (s.amountDue - s.amountPaid) <= 0.01) return;
      const balance = s.amountDue - s.amountPaid;
      const days = daysBetween(s.dueDate, today_);
      if (days >= 0 && days <= 30) {
        overdue.push({ loan: l, client: c, inst: s, daysOverdue: days, balance });
      } else if (days < 0 && days >= -7) {
        upcoming.push({ loan: l, client: c, inst: s, daysUntil: -days, balance });
      }
    });
  });

  overdue.sort((a,b) => b.daysOverdue - a.daysOverdue);
  upcoming.sort((a,b) => a.daysUntil - b.daysUntil);

  const buildReminderMsg = (item, isOverdueMsg) => {
    const co = state.settings.companyName || 'GPL Finance';
    if (isOverdueMsg) {
      return `Hello ${item.client.fullName.split(' ')[0]},\n\nThis is a reminder from ${co} that your loan instalment is now ${item.daysOverdue} day(s) overdue.\n\nLoan: ${loanRef(item.loan)}\nInstalment ${item.inst.instalmentNo} of ${item.loan.termMonths}\nAmount Due: ${fmt(item.balance)}\nOriginal Due Date: ${fmtDate(item.inst.dueDate)}\n\nPlease make payment as soon as possible to avoid further charges and adverse credit listing. Reply to this message to arrange payment.\n\nThank you.`;
    }
    return `Hello ${item.client.fullName.split(' ')[0]},\n\nFriendly reminder from ${co} that your next loan instalment is due in ${item.daysUntil} day(s).\n\nLoan: ${loanRef(item.loan)}\nInstalment ${item.inst.instalmentNo} of ${item.loan.termMonths}\nAmount Due: ${fmt(item.balance)}\nDue Date: ${fmtDate(item.inst.dueDate)}\n\nThank you for your continued business.`;
  };

  const totalOverdueAmount = overdue.reduce((s,x) => s+x.balance, 0);
  const totalUpcomingAmount = upcoming.reduce((s,x) => s+x.balance, 0);

  return `
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-900">Reminders</h1>
      <p class="text-slate-500 text-sm mt-1">Send WhatsApp reminders for upcoming and overdue payments</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="card p-5 border-l-4" style="border-left-color:#dc2626">
        <div class="text-xs font-medium text-red-700 uppercase">Overdue Reminders</div>
        <div class="text-3xl font-bold text-red-700 mt-2">${overdue.length}</div>
        <div class="text-sm text-slate-600 mt-1">${fmt(totalOverdueAmount)} in arrears</div>
      </div>
      <div class="card p-5 border-l-4" style="border-left-color:#f59e0b">
        <div class="text-xs font-medium text-amber-700 uppercase">Due in Next 7 Days</div>
        <div class="text-3xl font-bold text-amber-700 mt-2">${upcoming.length}</div>
        <div class="text-sm text-slate-600 mt-1">${fmt(totalUpcomingAmount)} expected</div>
      </div>
    </div>

    <div class="card overflow-hidden mb-6">
      <div class="px-6 py-3 border-b border-slate-200 bg-red-50">
        <h3 class="font-semibold text-red-900">Overdue Payments</h3>
        <p class="text-xs text-red-800 mt-1">Click WhatsApp to send overdue notice to each client</p>
      </div>
      ${overdue.length === 0 ? '<div class="p-12 text-center text-slate-500">No overdue payments. 🎉</div>' : `
        <table>
          <thead><tr><th>Client</th><th>Phone</th><th>Loan Ref</th><th>Days Overdue</th><th>Amount Due</th><th class="text-right">Action</th></tr></thead>
          <tbody>
            ${overdue.map((item, i) => `<tr>
              <td class="font-medium">${escapeHtml(item.client.fullName)}</td>
              <td>${escapeHtml(item.client.phone)}</td>
              <td class="font-mono text-xs">${loanRef(item.loan)}</td>
              <td><span class="badge badge-overdue">${item.daysOverdue}d</span></td>
              <td class="font-medium">${fmt(item.balance)}</td>
              <td class="text-right"><button onclick='sendReminderWhatsApp(${JSON.stringify(item.client.phone)}, ${JSON.stringify(buildReminderMsg(item, true))})' class="text-sm bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded font-medium">WhatsApp</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`}
    </div>

    <div class="card overflow-hidden">
      <div class="px-6 py-3 border-b border-slate-200 bg-amber-50">
        <h3 class="font-semibold text-amber-900">Upcoming Payments</h3>
        <p class="text-xs text-amber-800 mt-1">Send friendly reminders to clients with payments due soon</p>

function csvEscape(v) {
  const s = String(v ?? '');
  return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function tableToCSV(rows, columns) {
  const header = columns.map(c => csvEscape(c.label)).join(',');
  const data = rows.map(row => columns.map(c => csvEscape(typeof c.value === 'function' ? c.value(row) : row[c.value])).join(','));
  return [header, ...data].join('\r\n');
}

async function handleBackupImport(input) {

    const backup = JSON.parse(text);
    if (!backup.clients || !Array.isArray(backup.clients)) throw new Error('Not a valid backup file (missing clients array)');
    confirmAction(
      `Restore backup from ${backup.exportDate ? fmtDateTime(backup.exportDate) : 'unknown date'}?\n\n` +
      `This will REPLACE all current data with:\n` +
      `• ${backup.clients?.length || 0} clients\n` +
      `• ${backup.loans?.length || 0} loans\n` +
      `• ${backup.payments?.length || 0} payments\n` +
      `• ${Object.keys(backup.kycDocuments || {}).length} KYC documents\n\n` +
      `Your current data will be lost. This cannot be undone.`,
      async () => {
        state.clients = backup.clients || [];
        state.loans = backup.loans || [];
        state.payments = backup.payments || [];
        state.audit = backup.audit || [];
        state.settings = backup.settings || {};
        // Do not restore users (would lock you out if hashes differ)
        for (const k of ['clients', 'loans', 'payments', 'audit']) await saveTable(k);
        await saveSettings();
        // Restore KYC
        if (backup.kycDocuments) {

        showAlert('Backup restored successfully.', 'Done');

      },

  input.value = '';

// CSV IMPORT FOR CLIENTS
async function handleClientsCsvImport(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('CSV file appears empty');
    const headers = rows[0].map(h => h.trim().toLowerCase());
    const findCol = (...names) => {
      for (const n of names) { const i = headers.indexOf(n.toLowerCase()); if (i >= 0) return i; }
      return -1;
    };
    const nameCol = findCol('full name', 'fullname', 'name');
    const idCol = findCol('id number', 'idnumber', 'id');
    const phoneCol = findCol('phone', 'phone number', 'mobile');
    if (nameCol < 0 || idCol < 0 || phoneCol < 0) {
      throw new Error('CSV must contain columns: "Full Name", "ID Number", and "Phone" (case insensitive). Missing one or more.');
    }
    const dataRows = rows.slice(1).filter(r => r[nameCol] || r[idCol] || r[phoneCol]);
    showCsvImportPreview(dataRows, headers, { nameCol, idCol, phoneCol,
      altPhoneCol: findCol('alt phone', 'alternative phone'),
      emailCol: findCol('email'),
      addressCol: findCol('address'),
      employerCol: findCol('employer', 'employer / business'),
      incomeCol: findCol('monthly income', 'income'),
      emergencyCol: findCol('emergency contact', 'emergency')
    });
  } catch (e) {
    showAlert('Could not import CSV: ' + e.message);
  }
  input.value = '';
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cell += ch; }
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(cell); cell = ''; }
      else if (ch === '\r') { /* skip */ }
      else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else { cell += ch; }
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function showCsvImportPreview(dataRows, headers, cols) {
  const preview = dataRows.slice(0, 10);
  const modal = `
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4" onclick="if(event.target===this) closeModal()">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-4xl max-h-[85vh] overflow-auto">
        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center sticky top-0 bg-white">
          <div><h2 class="font-semibold text-lg">CSV Import Preview</h2><div class="text-sm text-slate-500 mt-1">${dataRows.length} client record(s) found · showing first ${preview.length}</div></div>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <div class="p-6">
          <table>
            <thead><tr><th>Full Name</th><th>ID Number</th><th>Phone</th><th>Email</th></tr></thead>
            <tbody>
              ${preview.map(r => `<tr><td>${escapeHtml(r[cols.nameCol] || '')}</td><td>${escapeHtml(r[cols.idCol] || '')}</td><td>${escapeHtml(r[cols.phoneCol] || '')}</td><td>${escapeHtml(cols.emailCol >= 0 ? r[cols.emailCol] : '')}</td></tr>`).join('')}
            </tbody>
          </table>
          <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 mt-4 text-sm text-amber-900">
            <strong>Note:</strong> Duplicates (by ID Number) will be skipped. Existing clients are not modified.
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2 sticky bottom-0 bg-white">
          <button onclick="closeModal()" class="btn-secondary">Cancel</button>
          <button onclick='commitCsvImport(${JSON.stringify(dataRows).replace(/'/g, "\\'")}, ${JSON.stringify(cols)})' class="btn-primary">Import ${dataRows.length} Client(s)</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modal;
}

async function commitCsvImport(dataRows, cols) {
  const existingIds = new Set(state.clients.map(c => (c.idNumber || '').trim().toLowerCase()));
  let imported = 0, skipped = 0;
  for (const r of dataRows) {
    const idNum = (r[cols.idCol] || '').trim();
    if (!idNum || existingIds.has(idNum.toLowerCase())) { skipped++; continue; }
    const fullName = (r[cols.nameCol] || '').trim();
    const phone = (r[cols.phoneCol] || '').trim();
    if (!fullName || !phone) { skipped++; continue; }
    state.clients.push({
      id: genId('CL'),
      fullName, idNumber: idNum, phone,
      altPhone: cols.altPhoneCol >= 0 ? (r[cols.altPhoneCol] || '').trim() : '',
      email: cols.emailCol >= 0 ? (r[cols.emailCol] || '').trim() : '',
      address: cols.addressCol >= 0 ? (r[cols.addressCol] || '').trim() : '',
      employer: cols.employerCol >= 0 ? (r[cols.employerCol] || '').trim() : '',
      monthlyIncome: cols.incomeCol >= 0 ? (parseFloat(r[cols.incomeCol]) || 0) : 0,
      emergencyContact: cols.emergencyCol >= 0 ? (r[cols.emergencyCol] || '').trim() : '',
      status: 'Active',
      registrationDate: today(),
      createdBy: state.currentUser?.id,
      importedFromCsv: true
    });
    existingIds.add(idNum.toLowerCase());
    imported++;
  }
  await saveTable('clients');
  await logAudit('import', 'client', '', { imported, skipped });
  closeModal();
  showAlert(`Import complete.\n\n${imported} client(s) added\n${skipped} skipped (duplicates or missing fields)`, 'CSV Import');
  render();
}

const BACKUP_BUCKET = 'backups';

function buildCloudBackupObject() {
  return {
    appName: 'GPL Finance',
    version: 1,
    type: 'daily-cloud-backup',
    exportDate: new Date().toISOString(),
    clients: state.clients,
    loans: state.loans,
    payments: state.payments,
    products: state.products,
    applications: state.applications,

    settings: state.settings,

    audit: state.audit
  };
}

// Runs on login: if today's backup doesn't exist yet, create it silently.
async function maybeAutoBackup() {
  if (state.currentUser?.role !== 'Administrator') return;
  try {
    const name = `backup-${today()}.json`;
    const { data: files, error } = await db.storage.from(BACKUP_BUCKET).list('', { limit: 5, search: name });
    if (error) { window._backupStatus = 'setup-needed'; return; }
    if ((files || []).some(f => f.name === name)) { window._backupStatus = 'ok'; return; }
    await runCloudBackup('auto');
  } catch (e) { console.warn('Auto-backup skipped:', e); }
}

async function runCloudBackup(mode) {
  const name = `backup-${today()}.json`;
  const blob = new Blob([JSON.stringify(buildCloudBackupObject())], { type: 'application/json' });
  const { error } = await db.storage.from(BACKUP_BUCKET).upload(name, blob, { upsert: true, contentType: 'application/json' });
  if (error) {
    window._backupStatus = 'setup-needed';
    if (mode === 'manual') showAlert('Could not save the backup to cloud storage: ' + error.message + '\n\nThe "backups" storage bucket may not be set up yet — see the note on this page.', 'Backup Failed');
    return false;
  }
  window._backupStatus = 'ok';
  logAudit('backup', 'system', null, { file: name, mode });
  // Keep the newest 30 daily backups, prune the rest
  try {
    const { data: files } = await db.storage.from(BACKUP_BUCKET).list('', { limit: 100, sortBy: { column: 'name', order: 'desc' } });
    const stale = (files || []).filter(f => f.name.startsWith('backup-')).slice(30).map(f => f.name);
    if (stale.length) await db.storage.from(BACKUP_BUCKET).remove(stale);
  } catch (e) { /* pruning is best-effort */ }
  return true;
}

async function manualCloudBackup() {
  const btn = document.getElementById('cloud-backup-now');
  if (btn) { btn.disabled = true; btn.textContent = 'Backing up...'; }
  const ok = await runCloudBackup('manual');
  if (btn) { btn.disabled = false; btn.textContent = 'Back Up Now'; }
  if (ok) { showAlert('Backup saved to cloud storage.', 'Backup Complete'); hydrateCloudBackups(); }
}

async function hydrateCloudBackups() {
  const el = document.getElementById('cloud-backup-list');
  if (!el) return;
  const { data: files, error } = await db.storage.from(BACKUP_BUCKET).list('', { limit: 7, sortBy: { column: 'name', order: 'desc' } });
  if (error) {
    el.innerHTML = `
      <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-900">
        <strong>One-time setup needed:</strong> in your Supabase dashboard, open <strong>Storage</strong> and create a <strong>private</strong> bucket named <code>backups</code>, then add a policy allowing the <em>authenticated</em> role to read and write it. Daily backups will start automatically after that.
      </div>`;
    return;
  }
  const backups = (files || []).filter(f => f.name.startsWith('backup-'));
  if (!backups.length) { el.innerHTML = '<div class="text-sm text-slate-500">No cloud backups yet — the first one is created automatically when an administrator signs in each day.</div>'; return; }
  el.innerHTML = backups.map(f => `
    <div class="flex justify-between items-center py-2 border-b border-slate-100 text-sm">
      <div><span class="font-medium">${escapeHtml(f.name.replace('backup-', '').replace('.json', ''))}</span>
        <span class="text-xs text-slate-500 ml-2">${f.metadata?.size ? Math.round(f.metadata.size / 1024) + ' KB' : ''}</span></div>
      <button onclick="downloadCloudBackup('${escapeHtml(f.name)}')" class="btn-secondary text-xs">Download</button>
    </div>`).join('');
}

async function downloadCloudBackup(name) {
  const { data, error } = await db.storage.from(BACKUP_BUCKET).download(name);
  if (error) { showAlert('Could not download backup: ' + error.message); return; }
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function saveProduct(editId) {
  const name = document.getElementById('pr-name').value.trim();
  if (!name) { showAlert('Product name is required.'); return; }
  const record = {
    name,
    description: document.getElementById('pr-description').value.trim() || null,
    min_principal: parseFloat(document.getElementById('pr-min').value) || 0,
    max_principal: parseFloat(document.getElementById('pr-max').value) || 0,
    interest_rate: parseFloat(document.getElementById('pr-rate').value) || 0,
    term_months: parseInt(document.getElementById('pr-term').value) || 1,
    fee: parseFloat(document.getElementById('pr-fee').value) || 0,
    eligibility: document.getElementById('pr-eligibility').value.trim() || null
  };
  if (record.min_principal > record.max_principal) { showAlert('Minimum principal cannot be greater than maximum.'); return; }
  if (editId) {
    const activeEl = document.getElementById('pr-active');
    if (activeEl) record.active = activeEl.value === 'true';
    const { error } = await db.from('products').update(record).eq('id', editId);
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await logAudit('update', 'product', editId, { changes: record });
  } else {
    record.active = true;
    record.created_by = state.currentUser?.id || null;
    const { data, error } = await db.from('products').insert(record).select().single();
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await logAudit('create', 'product', data.id, { name });
  }
  await saveTable('products');
  closeModal();
  render();
}

async function deleteProduct(productId) {
  const product = state.products.find(p => p.id === productId);
  if (!product) return;
  const usageCount = state.loans.filter(l => l.productId === productId).length;
  let msg = `Delete product "${product.name}"?`;
  if (usageCount > 0) msg += `\n\n${usageCount} existing loan(s) reference this product. They will keep their current terms but lose the product link.`;
  msg += '\n\nThis cannot be undone.';
  confirmAction(msg, async () => {

    await logAudit('delete', 'product', productId, { snapshot: product });
    await saveTable('products');
    render();
  });

// =====================================================
// LATE PAYMENT PENALTIES
// =====================================================
function calculatePenalties(loan) {
  if (!loan || !state.settings.penalty?.enabled) return [];
  const cfg = state.settings.penalty;
  const today_ = today();
  const schedule = ensureSchedule(loan);
  const penalties = [];
  for (const inst of schedule) {
    const balance = inst.amountDue - inst.amountPaid;
    if (balance <= 0.01) continue;
    const daysLate = daysBetween(inst.dueDate, today_);
    const effectiveDays = daysLate - (cfg.gracePeriodDays || 0);
    if (effectiveDays <= 0) continue;
    let amount = 0;
    const base = cfg.basis === 'instalment' ? inst.amountDue : (loan.totalRepayable - loanPaid(loan.id));
    if (cfg.type === 'percentage') {
      const baseAmount = base * ((cfg.amount || 0) / 100);
      if (cfg.frequency === 'monthly') amount = baseAmount * Math.ceil(effectiveDays / 30);
      else if (cfg.frequency === 'daily') amount = baseAmount * effectiveDays;
      else amount = baseAmount;
    } else {
      if (cfg.frequency === 'monthly') amount = (cfg.amount || 0) * Math.ceil(effectiveDays / 30);
      else if (cfg.frequency === 'daily') amount = (cfg.amount || 0) * effectiveDays;
      else amount = cfg.amount || 0;
    }
    penalties.push({ instalmentNo: inst.instalmentNo, dueDate: inst.dueDate, daysLate, effectiveDays, amount: Math.round(amount * 100) / 100 });
  }
  // Apply cap as % of principal
  const cap = loan.principal * ((cfg.maxPenaltyPercent || 100) / 100);
  let total = penalties.reduce((s, p) => s + p.amount, 0);
  if (total > cap && total > 0) {
    const ratio = cap / total;
    penalties.forEach(p => { p.amount = Math.round(p.amount * ratio * 100) / 100; });
  }
  return penalties;
}

function totalPenalties(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return 0;
  return calculatePenalties(loan).reduce((s, p) => s + p.amount, 0);
}

function generateToken() {
  // 32-char URL-safe random token
  const arr = new Uint8Array(24);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function createClientLink(linkType, clientId, loanId, expiryDays) {
  const token = generateToken();
  const expiresAt = new Date();
  expiresAt.setDate(expiresAt.getDate() + (expiryDays || 7));
  const record = {
    token,
    link_type: linkType,
    client_id: clientId || null,
    loan_id: loanId || null,
    expires_at: expiresAt.toISOString(),
    created_by: state.currentUser?.id || null
  };
  const { data, error } = await db.from('client_links').insert(record).select().single();
  if (error) { showAlert('Could not generate link: ' + error.message); return null; }
  await saveTable('clientLinks');
  await logAudit('create', 'client_link', data.id, { type: linkType, clientId, loanId });
  return data;
}

  if (params.has('apply')) { renderApplyPage(); isPublic = true; }
  else if (uploadToken) { renderUploadPage(uploadToken); isPublic = true; }
  else if (signToken) { renderSignaturePage(signToken); isPublic = true; }
  else if (agreementToken) { renderAgreementViewPage(agreementToken); isPublic = true; }
  // Swap the placeholder badge for the company logo once the page
  // has rendered (retries cover the async pages).
  if (isPublic) [300, 1200, 3000].forEach(ms => setTimeout(applyPublicBranding, ms));
  return isPublic;
}
