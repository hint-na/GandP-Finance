function handlePublicFile(input, key, multiple) {
  const files = Array.from(input.files);
  if (files.length === 0) return;
  for (const f of files) {
    if (f.size > 10 * 1024 * 1024) {
      alert(`File ${f.name} is too large. Maximum 10MB per file.`);
      input.value = '';
      return;
    }
  }
  window._publicUploads[key] = files;
  const preview = document.getElementById(`preview-${key}`);
  if (files.length === 1 && files[0].type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.innerHTML = `<img src="${e.target.result}" style="max-width:100%; max-height:200px; border-radius:8px; border:1px solid #e2e8f0;">`;
    };
    reader.readAsDataURL(files[0]);
  } else {
    preview.innerHTML = `<div class="text-sm text-green-700 bg-green-50 border border-green-200 p-2 rounded">✓ ${files.length} file(s) selected: ${files.map(f => escapeHtml(f.name)).join(', ')}</div>`;
  }
  const requiredKeys = window._publicRequestedDocs || ['selfie', 'id_front', 'id_back', 'income_document', 'bank_statement'];
  const allPresent = requiredKeys.every(k => window._publicUploads[k] && window._publicUploads[k].length > 0);
  document.getElementById('submit-uploads-btn').disabled = !allPresent;
}

async function submitPublicUploads(token, clientId) {
  const btn = document.getElementById('submit-uploads-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';
  const urlMap = { selfie: 'selfie_url', id_front: 'id_front_url', id_back: 'id_back_url', income_document: 'income_document_url', bank_statement: 'bank_statement_url' };
  const updates = {};
  const isTargeted = !!window._publicRequestedDocs;

  // For targeted re-upload, fetch existing client so we merge instead of overwrite
  let existingClient = null;
  if (isTargeted) {
    const { data } = await db.from('clients').select('*').eq('id', clientId).maybeSingle();
    existingClient = data || {};
  }

  const pages = isTargeted ? (existingClient.document_pages || {}) : {};
  const sources = isTargeted ? (existingClient.document_sources || {}) : {};
  const reviews = isTargeted ? (existingClient.document_reviews || {}) : {};

  try {
    for (const key of Object.keys(window._publicUploads)) {
      const files = window._publicUploads[key];
      const uploadedUrls = [];
      for (let i = 0; i < files.length; i++) {
        const file = await compressImageFile(files[i]);
        const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
        const path = `${clientId}/${key}_${Date.now()}_${i}.${ext}`;
        await uploadWithRetry(path, file).catch(e => { throw new Error(`Failed to upload ${key}: ${e.message}`); });
        const { data: urlData } = db.storage.from('kyc-documents').getPublicUrl(path);
        uploadedUrls.push(urlData.publicUrl);
      }
      if (uploadedUrls.length > 0) {
        updates[urlMap[key]] = uploadedUrls[0];
        // Replace pages for this doc (fresh upload wipes old pages for this doc only)
        if (uploadedUrls.length > 1) pages[key] = uploadedUrls.slice(1);
        else delete pages[key];
        sources[key] = 'client';
        // Clear old review status for this document (fresh review needed)
        delete reviews[key];
      }
    }
    updates.document_sources = sources;
    updates.document_pages = pages;
    updates.document_reviews = reviews;
    updates.documents_uploaded_at = new Date().toISOString();
    // Recompute KYC status based on merged state
    const merged = { ...camelifyKeys(existingClient || {}), ...camelifyKeys(updates) };
    updates.kyc_status = computeKycStatus(merged);

    const { error: updErr } = await db.from('clients').update(updates).eq('id', clientId);
    if (updErr) throw new Error('Failed to save: ' + updErr.message);
    await db.from('client_links').update({ completed_at: new Date().toISOString() }).eq('token', token);
    // Create notification for staff
    try {
      const clientName = existingClient?.full_name || 'Client';
      const isTargeted = !!window._publicRequestedDocs;
      if (isTargeted) {
        const docLabels = window._publicRequestedDocs.map(k => ({ selfie: 'Selfie', id_front: 'ID Front', id_back: 'ID Back', income_document: 'Payslip', bank_statement: 'Bank Statement' }[k] || k)).join(', ');
        await db.rpc('create_broadcast_notification', {
          p_event_type: 'reupload_submitted',
          p_title: `${clientName} re-uploaded documents`,
          p_message: `${docLabels} submitted for review`,
          p_client_id: clientId,
          p_loan_id: null
        });
        await dispatchPush({
          event_type: 'reupload_submitted',
          title: `${clientName} re-uploaded documents`,
          message: `${docLabels} submitted for review`,
          client_id: clientId
        });
      } else {
        await db.rpc('create_broadcast_notification', {
          p_event_type: 'upload_submitted',
          p_title: `${clientName} uploaded KYC documents`,
          p_message: 'All KYC documents submitted and ready for review',
          p_client_id: clientId,
          p_loan_id: null
        });
        await dispatchPush({
          event_type: 'upload_submitted',
          title: `${clientName} uploaded KYC documents`,
          message: 'All KYC documents submitted and ready for review',
          client_id: clientId
        });
      }
    } catch (e) { console.warn('Notification create failed:', e); }
    document.getElementById('public-container').innerHTML = `
      <div class="max-w-md mx-auto text-center py-12">
        <div class="w-16 h-16 bg-green-100 rounded-full mx-auto flex items-center justify-center mb-4">
          <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 class="text-xl font-bold text-slate-900">Thank You</h1>
        <p class="text-sm text-slate-600 mt-2">Your document${isTargeted ? '' : 's'} ha${isTargeted ? 's' : 've'} been submitted successfully.</p>
        <p class="text-sm text-slate-600 mt-1">GPL Finance will contact you shortly.</p>
      </div>
    `;
  } catch (e) {
    alert('Upload failed: ' + e.message);
    btn.disabled = false;
    btn.textContent = isTargeted ? 'Resubmit Document' : 'Submit Documents';
  }
}

function initSignaturePad() {
  const canvas = document.getElementById('signature-pad');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  ctx.strokeStyle = '#0f172a';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  let drawing = false;
  let lastX, lastY;
  window._sigHasStrokes = false;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - r.left, y: touch.clientY - r.top };
  }
  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
    window._sigHasStrokes = true;
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x; lastY = p.y;
  }
  function stop() { drawing = false; }
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('mouseleave', stop);
  canvas.addEventListener('touchstart', start);
  canvas.addEventListener('touchmove', move);
  canvas.addEventListener('touchend', stop);
}

function clearSignature() {
  const canvas = document.getElementById('signature-pad');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  window._sigHasStrokes = false;
}

  }).eq('id', state.currentUser.id);
  if (error) { showAlert('Save failed: ' + error.message); return; }
  await logAudit('save', 'signature', state.currentUser.id, { action: 'stored_signature' });
  await saveTable('users');
  showAlert('Signature saved. It will be applied automatically to future signed loans.', 'Saved');
  render();
}

async function applyLenderSignature(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return;
  if (!loan.signedAt) { showAlert('Client has not signed this loan yet.'); return; }
  if (loan.lenderSignedAt) { showAlert('Lender signature already applied.'); return; }

  const userProfile = state.users.find(u => u.id === state.currentUser.id);
  if (!userProfile?.signatureImage) {
    showAlert('You have not saved your signature yet. Go to Settings → My Signature to save it first.', 'No Signature');
    return;
  }
  const now = new Date().toISOString();
  const lenderSigData = {
    signature_image: userProfile.signatureImage,
    signed_by_user_id: state.currentUser.id,
    signed_by_name: state.currentUser.fullName,
    timestamp: now,
    method: 'manual'
  };
  const { error } = await db.from('loans').update({
    lender_signed_at: now,
    lender_signature_data: lenderSigData
  }).eq('id', loanId);
  if (error) { showAlert('Countersign failed: ' + error.message); return; }
  await logAudit('countersign', 'loan', loanId, { method: 'manual', signedBy: state.currentUser.fullName });
  await saveTable('loans');
  closeModal();
  openLoanDetail(loanId);
  showAlert('Lender signature applied. The agreement is now fully signed.', 'Countersigned');
}

  const canvas = document.getElementById('signature-pad');

async function buildAgreementForView() {
  const { loan, client, settings } = window._agreementViewData || {};
  if (!loan) return null;
  // Convert snake_case to camelCase for the PDF generator
  const camelLoan = {};
  for (const k in loan) {
    const camel = k.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
    camelLoan[camel] = loan[k];
  }
  const camelClient = {};
  for (const k in client) {
    const camel = k.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
    camelClient[camel] = client[k];
  }
  const camelSettings = {};
  for (const k in (settings || {})) {
    const camel = k.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
    camelSettings[camel] = settings[k];
  }
  // Set up temporary state so generateLoanAgreement can find them
  state.loans = [camelLoan];
  state.clients = [camelClient];
  state.settings = camelSettings;
  return generateLoanAgreement(camelLoan.id);
}

async function getSignedUrl(publicUrl) {
  // Extract storage path from public URL
  const match = publicUrl.match(/\/storage\/v1\/object\/(?:public\/)?kyc-documents\/(.+)$/);
  if (!match) return publicUrl;
  const path = match[1];
  const { data, error } = await db.storage.from('kyc-documents').createSignedUrl(path, 3600);
  if (error) { console.error('Signed URL error:', error); return publicUrl; }
  return data.signedUrl;
}

// Loads the PDF renderer on demand (cached after first use)
async function ensurePdfJs() {
  if (window.pdfjsLib) return;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = res;
    s.onerror = () => rej(new Error('Could not load the PDF viewer. Check your connection.'));
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// Draws every PDF page inside the viewer — no browser download behaviour involved
async function renderPdfInViewer(signedUrl, body) {
  const resp = await fetch(signedUrl);
  if (!resp.ok) throw new Error('Could not fetch the document.');
  const data = await resp.arrayBuffer();
  await ensurePdfJs();
  const pdf = await window.pdfjsLib.getDocument({ data }).promise;
  body.innerHTML = '';
  const containerWidth = Math.min(body.clientWidth || 700, 900) - 12;
  const maxPages = Math.min(pdf.numPages, 30);
  for (let p = 1; p <= maxPages; p++) {
    const page = await pdf.getPage(p);
    const base = page.getViewport({ scale: 1 });
    const scale = containerWidth / base.width;
    const dpr = window.devicePixelRatio || 1;
    const vp = page.getViewport({ scale: scale * dpr });
    const canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width = containerWidth + 'px';
    canvas.style.borderRadius = '8px';
    canvas.style.border = '1px solid #e2e8f0';
    canvas.style.marginBottom = '8px';
    body.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  }
  if (pdf.numPages > maxPages) {
    body.insertAdjacentHTML('beforeend', `<div class="text-xs text-slate-500 mb-2">Showing first ${maxPages} of ${pdf.numPages} pages. Use "Open in New Tab" for the full file.</div>`);
  }
}

async function downloadDocument(publicUrl, filename) {
  if (!publicUrl) return;
  const signedUrl = await getSignedUrl(publicUrl);
  const a = document.createElement('a');
  a.href = signedUrl;
  a.download = filename || 'document';
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

  return reviews[docKey]?.status || 'pending';
}

function docPages(client, docKey) {
  const pages = client.documentPages || {};
  return pages[docKey] || [];
}

function computeKycStatus(client) {
  const reviews = client.documentReviews || {};
  const statuses = KYC_DOC_TYPES.map(d => reviews[d.key]?.status || 'missing');
  const primaryUrls = KYC_DOC_TYPES.map(d => client[d.urlField]).filter(u => u);
  if (primaryUrls.length === 0) return 'Not Started';
  if (statuses.some(s => s === 'rejected')) return 'Requires Correction';
  if (statuses.every(s => s === 'approved')) return 'Approved';
  if (primaryUrls.length < KYC_DOC_TYPES.length) return 'Pending';
  return 'In Review';
}

function renderKycSection(client) {
  const status = client.kycStatus || computeKycStatus(client);
  const statusColors = {
    'Not Started': 'bg-slate-100 text-slate-700',
    'Pending': 'bg-yellow-100 text-yellow-800',
    'In Review': 'bg-blue-100 text-blue-800',
    'Approved': 'bg-green-100 text-green-800',
    'Requires Correction': 'bg-red-100 text-red-800'
  };
  return `
    <div class="flex justify-between items-center mb-3">
      <h3 class="font-semibold">KYC Documents</h3>
      <div class="flex items-center gap-2">
        <span class="text-xs px-2 py-1 rounded-full ${statusColors[status]}">${status}</span>
        <button onclick="openAdminUploadModal('${client.id}')" class="text-xs text-blue-700 hover:underline">+ Upload for Client</button>
      </div>
    </div>
    <div class="space-y-2 mb-6">
      ${KYC_DOC_TYPES.map(d => renderKycDocRow(client, d)).join('')}
    </div>
  `;
}

function renderKycDocRow(client, docType) {
  const url = client[docType.urlField];
  const pages = docPages(client, docType.key);
  const totalPages = (url ? 1 : 0) + pages.length;
  const review = (client.documentReviews || {})[docType.key];
  const status = review?.status || (url ? 'pending' : 'missing');
  const source = (client.documentSources || {})[docType.key];
  const sourceLabel = source === 'client' ? '(uploaded by client)' : source ? '(uploaded by staff)' : '';

  const statusBadge = {
    'missing': '<span class="text-xs text-slate-500">Not uploaded</span>',
    'pending': '<span class="text-xs bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded">Awaiting review</span>',
    'approved': '<span class="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded">✓ Approved</span>',
    'rejected': `<span class="text-xs bg-red-100 text-red-800 px-2 py-0.5 rounded">✗ Rejected${review?.reason ? ': ' + escapeHtml(review.reason) : ''}</span>`
  }[status];

  const actions = url ? `
    <div class="flex gap-2 mt-2 flex-wrap">
      <button onclick="viewDocument('${url}', '${docType.key}')" class="text-xs bg-slate-700 hover:bg-slate-800 text-white px-2 py-1 rounded">View</button>
      <button onclick="downloadDocument('${url}', '${docType.key}.pdf')" class="text-xs bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded">Download</button>
      ${status === 'pending' ? `
        <button onclick="approveDocument('${client.id}', '${docType.key}')" class="text-xs bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded">Approve</button>
        <button onclick="rejectDocument('${client.id}', '${docType.key}')" class="text-xs bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded">Reject</button>
      ` : ''}
      ${status === 'approved' || status === 'rejected' ? `
        <button onclick="resetDocumentReview('${client.id}', '${docType.key}')" class="text-xs text-slate-500 hover:underline">Reset review</button>
      ` : ''}
    </div>
  ` : '';

  const multiPageList = pages.length > 0 ? `
    <div class="text-xs text-slate-600 mt-1">
      Additional pages: ${pages.map((p, i) => `<button onclick="viewDocument('${p}', '${docType.key}_p${i+2}')" class="text-blue-700 hover:underline mr-2">Page ${i+2}</button>`).join('')}
    </div>
  ` : '';

  return `
    <div class="border border-slate-200 rounded-lg p-3 bg-white">
      <div class="flex justify-between items-start">
        <div>
          <div class="font-medium text-sm">${docType.icon} ${docType.label}${totalPages > 1 ? ` (${totalPages} pages)` : ''}</div>
          <div class="text-xs text-slate-500 mt-0.5">${sourceLabel}</div>
        </div>
        ${statusBadge}
      </div>
      ${multiPageList}
      ${actions}
    </div>
  `;
}

async function approveDocument(clientId, docKey) {
  const client = state.clients.find(c => c.id === clientId);
  if (!client) return;
  const reviews = { ...(client.documentReviews || {}) };
  reviews[docKey] = {
    status: 'approved',
    reviewedBy: state.currentUser?.id,
    reviewedByName: state.currentUser?.fullName,
    reviewedAt: new Date().toISOString(),
    reason: null
  };
  const updates = { document_reviews: reviews };
  // Recompute overall status
  const tempClient = { ...client, documentReviews: reviews };
  updates.kyc_status = computeKycStatus(tempClient);
  const { error } = await db.from('clients').update(updates).eq('id', clientId);
  if (error) { showAlert('Approval failed: ' + error.message); return; }
  await logAudit('approve', 'kyc_document', clientId, { docKey });
  await saveTable('clients');
  closeModal();
  openClientDetail(clientId);
}

function rejectDocument(clientId, docKey) {
  const docTypeLabel = KYC_DOC_TYPES.find(d => d.key === docKey)?.label || docKey;
  const modal = `
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-[60] p-4" onclick="if(event.target===this) closeSubModal()">

        <div class="p-6 space-y-4">
          <div>
            <label class="text-sm font-medium">Reason for rejection *</label>
            <select id="rej-reason" onchange="document.getElementById('rej-custom').style.display = this.value==='Other' ? 'block' : 'none';" class="mt-2">
              <option value="">Select a reason...</option>
              <option value="Photo too blurry or unclear">Photo too blurry or unclear</option>
              <option value="Document not fully visible">Document not fully visible</option>
              <option value="Wrong document uploaded">Wrong document uploaded</option>
              <option value="Document appears expired">Document appears expired</option>
              <option value="Document does not match client details">Document does not match client details</option>
              <option value="Poor lighting or shadows on document">Poor lighting or shadows on document</option>

            </select>

          </div>
          <div class="bg-amber-50 border border-amber-200 p-3 rounded-lg text-xs text-amber-900">
            After rejection, a re-upload link with the reason will be generated for you to send to the client via WhatsApp.
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
          <button onclick="closeSubModal()" class="btn-secondary">Cancel</button>
          <button onclick="confirmRejectDocument('${clientId}', '${docKey}')" class="text-white bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-medium">Reject Document</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').insertAdjacentHTML('beforeend', `<div id="sub-modal">${modal}</div>`);
}

function closeSubModal() {
  const sub = document.getElementById('sub-modal');
  if (sub) sub.remove();
}

async function confirmRejectDocument(clientId, docKey) {
  const selectEl = document.getElementById('rej-reason');
  const customEl = document.getElementById('rej-custom');
  let reason = selectEl.value;
  if (reason === 'Other') reason = customEl.value.trim();
  if (!reason) { showAlert('Please select or enter a reason.'); return; }

  const client = state.clients.find(c => c.id === clientId);
  const reviews = { ...(client.documentReviews || {}) };
  reviews[docKey] = {
    status: 'rejected',
    reviewedBy: state.currentUser?.id,
    reviewedByName: state.currentUser?.fullName,
    reviewedAt: new Date().toISOString(),
    reason
  };
  const updates = { document_reviews: reviews };
  const tempClient = { ...client, documentReviews: reviews };
  updates.kyc_status = computeKycStatus(tempClient);
  const { error } = await db.from('clients').update(updates).eq('id', clientId);
  if (error) { showAlert('Rejection failed: ' + error.message); return; }
  await logAudit('reject', 'kyc_document', clientId, { docKey, reason });
  await saveTable('clients');
  closeSubModal();

  // Generate a new upload link with rejection message
  await generateRejectionUploadLink(clientId, docKey, reason);
}

async function resetDocumentReview(clientId, docKey) {
  const client = state.clients.find(c => c.id === clientId);
  const reviews = { ...(client.documentReviews || {}) };
  delete reviews[docKey];
  const updates = { document_reviews: reviews };
  const tempClient = { ...client, documentReviews: reviews };
  updates.kyc_status = computeKycStatus(tempClient);
  const { error } = await db.from('clients').update(updates).eq('id', clientId);
  if (error) { showAlert('Reset failed: ' + error.message); return; }
  await saveTable('clients');
  closeModal();
  openClientDetail(clientId);
}

async function generateRejectionUploadLink(clientId, docKey, reason) {
  const client = state.clients.find(c => c.id === clientId);
  const docLabel = KYC_DOC_TYPES.find(d => d.key === docKey)?.label || docKey;
  // Create link with metadata specifying which document(s) are requested
  const token = generateToken();
  const expiresAt = new Date();
  expiresAt.setDate(expiresAt.getDate() + 7);
  const metadata = {
    requested_docs: [docKey],
    rejection_reasons: { [docKey]: reason }
  };
  const record = {
    token,
    link_type: 'upload',
    client_id: clientId,
    loan_id: null,
    expires_at: expiresAt.toISOString(),
    metadata,
    created_by: state.currentUser?.id || null
  };
  const { data: link, error } = await db.from('client_links').insert(record).select().single();
  if (error) { showAlert('Could not generate link: ' + error.message); return; }
  await saveTable('clientLinks');
  await logAudit('create', 'client_link', link.id, { type: 'upload', targeted: [docKey] });
  const url = buildLinkUrl(link);
  const firstName = client.fullName.split(' ')[0];

  const waUrl = `https://wa.me/${(client.phone || '').replace(/[^0-9]/g, '')}?text=${encodeURIComponent(message)}`;
  document.getElementById('modal-container').innerHTML = `
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4" onclick="if(event.target===this) closeModal()">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-lg">
        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
          <h2 class="font-semibold text-lg">Rejection Message Ready</h2>
          <button onclick="closeModal(); openClientDetail('${clientId}');" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <div class="p-6 space-y-4">
          <div class="bg-red-50 border border-red-200 rounded-lg p-3">
            <div class="text-xs font-medium text-red-900 mb-1">Rejected Document</div>
            <div class="text-sm text-red-900">${escapeHtml(docLabel)}</div>
            <div class="text-xs text-red-800 mt-2">Reason: ${escapeHtml(reason)}</div>
          </div>
          <div class="bg-green-50 border border-green-200 rounded-lg p-3 text-xs text-green-900">
            The upload link will show <strong>only the ${escapeHtml(docLabel)}</strong> — the client won't need to re-upload other approved documents.
          </div>
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-3">
            <div class="text-xs font-medium text-blue-900 mb-1">WhatsApp Message</div>
            <div class="text-xs text-blue-900 whitespace-pre-wrap">${escapeHtml(message)}</div>
          </div>
          <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-900">
            Review the message before sending. Ensure the phone number ${escapeHtml(client.phone)} is in international format (+264...).
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2 flex-wrap">
          <button onclick="navigator.clipboard.writeText(\`${message.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`).then(() => showAlert('Message copied'))" class="btn-secondary text-sm">Copy Message</button>
          <a href="${waUrl}" target="_blank" class="text-sm bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium">Send via WhatsApp</a>
          <button onclick="closeModal(); openClientDetail('${clientId}');" class="btn-secondary text-sm">Done</button>
        </div>
      </div>

}

async function submitAdminUploads(clientId) {
  const btn = document.getElementById('admin-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';
  const client = state.clients.find(c => c.id === clientId);
  const updates = {};
  const sources = { ...(client.documentSources || {}) };
  const pages = { ...(client.documentPages || {}) };
  const reviews = { ...(client.documentReviews || {}) };
  let uploadedCount = 0;
  try {
    for (const d of KYC_DOC_TYPES) {
      const inp = document.getElementById(`admin-file-${d.key}`);
      const files = Array.from(inp.files);
      if (files.length === 0) continue;
      const uploadedUrls = [];
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        if (file.size > 10 * 1024 * 1024) { showAlert(`File ${file.name} too large (max 10MB). Skipped.`); continue; }
        const ext = file.name.split('.').pop().toLowerCase();
        const path = `${clientId}/${d.key}_${Date.now()}_${i}.${ext}`;
        const { error: upErr } = await db.storage.from('kyc-documents').upload(path, file, { contentType: file.type, upsert: true });
        if (upErr) throw new Error(`Failed to upload ${file.name}: ${upErr.message}`);
        const { data: urlData } = db.storage.from('kyc-documents').getPublicUrl(path);
        uploadedUrls.push(urlData.publicUrl);
      }
      if (uploadedUrls.length > 0) {
        updates[snakeCase(d.urlField)] = uploadedUrls[0];
        if (uploadedUrls.length > 1) pages[d.key] = uploadedUrls.slice(1);
        sources[d.key] = state.currentUser.id;
        // Reset review status since it's a new upload
        delete reviews[d.key];
        uploadedCount += uploadedUrls.length;
      }
    }
    if (uploadedCount === 0) { showAlert('No files selected.'); btn.disabled = false; btn.textContent = 'Upload Documents'; return; }
    updates.document_sources = sources;
    updates.document_pages = pages;
    updates.document_reviews = reviews;
    updates.documents_uploaded_at = new Date().toISOString();
    const tempClient = { ...client, ...camelifyKeys(updates) };
    updates.kyc_status = computeKycStatus(tempClient);
    const { error } = await db.from('clients').update(updates).eq('id', clientId);
    if (error) throw error;
    await logAudit('admin_upload', 'client', clientId, { count: uploadedCount });
    await saveTable('clients');
    closeModal();
    openClientDetail(clientId);
    showAlert(`${uploadedCount} document(s) uploaded successfully.`, 'Uploaded');
  } catch (e) {
    showAlert('Upload failed: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Upload Documents';
  }
}

function snakeCase(camel) {
  return camel.replace(/[A-Z]/g, c => '_' + c.toLowerCase());
}
function camelifyKeys(obj) {
  const result = {};
  for (const k in obj) {
    const camel = k.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
    result[camel] = obj[k];
  }
  return result;
}

function showKycWarningForClient(clientId) {
  const box = document.getElementById('kyc-warning-box');
  if (!box) return;
  if (!clientId) { box.innerHTML = ''; return; }
  const client = state.clients.find(c => c.id === clientId);
  if (!client) { box.innerHTML = ''; return; }
  const status = client.kycStatus || computeKycStatus(client);
  if (status === 'Approved') {
    box.innerHTML = `<div class="text-xs bg-green-50 border border-green-200 text-green-900 rounded px-3 py-2">✓ KYC documents approved</div>`;
  } else if (status === 'Not Started') {
    box.innerHTML = `<div class="text-xs bg-red-50 border border-red-200 text-red-900 rounded px-3 py-2">⚠ No KYC documents on file. Consider collecting documents before disbursing this loan.</div>`;
  } else {
    box.innerHTML = `<div class="text-xs bg-amber-50 border border-amber-200 text-amber-900 rounded px-3 py-2">⚠ KYC status: <strong>${status}</strong>. Review documents before disbursing.</div>`;
  }
}

state.notifications = [];
state.notificationsOpen = false;
window._notificationChannel = null;
window._notificationSoundEnabled = true;
window._originalTitle = document.title;

async function loadNotifications() {
  const { data, error } = await db.from('notifications')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(50);
  if (error) { console.warn('Notifications load error:', error); return; }
  state.notifications = (data || []).map(snakeToCamel);
  updateNotificationBadge();
}

function subscribeToNotifications() {
  if (!state.currentUser) return;
  // Unsubscribe from previous channel if any
  if (window._notificationChannel) {
    db.removeChannel(window._notificationChannel);
    window._notificationChannel = null;
  }
  window._notificationChannel = db.channel('notifications-channel')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notifications'
    }, payload => {
      const notif = snakeToCamel(payload.new);
      // Only show if it's for this user or broadcast
      if (notif.recipientId && notif.recipientId !== state.currentUser.id) return;
      state.notifications.unshift(notif);
      if (state.notifications.length > 50) state.notifications = state.notifications.slice(0, 50);
      updateNotificationBadge();
      playNotificationSound();
      // If dropdown is open, refresh it
      if (state.notificationsOpen) renderNotificationDropdown();
    })
    .subscribe();
}

// =====================================================
// LIVE DATA REFRESH
// Keeps every open device in sync: changes made by other staff (or new
// online applications) appear without a manual reload. Uses realtime
// events where the database publishes them, plus a gentle poll as a
// safety net.
// =====================================================
const LIVE_TABLES = { clients: 'clients', loans: 'loans', payments: 'payments', loan_applications: 'applications', client_links: 'clientLinks', products: 'products' };

function subscribeToDataChanges() {
  if (!state.currentUser) return;
  if (window._dataChannel) {
    db.removeChannel(window._dataChannel);
    window._dataChannel = null;
  }
  let ch = db.channel('data-sync');
  Object.keys(LIVE_TABLES).forEach(t => {
    ch = ch.on('postgres_changes', { event: '*', schema: 'public', table: t }, () => queueDataRefresh(LIVE_TABLES[t]));
  });
  window._dataChannel = ch.subscribe();
}

window._pendingRefresh = new Set();
function queueDataRefresh(name) {
  window._pendingRefresh.add(name);
  clearTimeout(window._refreshTimer);
  window._refreshTimer = setTimeout(async () => {
    const names = [...window._pendingRefresh];
    window._pendingRefresh.clear();
    for (const n of names) await saveTable(n);
    refreshViewIfIdle();
  }, 700);
}

// Redraw the current view, but never while the user is in a modal or
// typing — a redraw there would throw away their work.
function refreshViewIfIdle() {
  if (!state.currentUser) return;
  const modalOpen = !!document.getElementById('modal-container')?.innerHTML.trim() ||
                    !!document.getElementById('confirm-container');
  const typing = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName);
  if (modalOpen || typing) return;
  render();
  buildNav();
}

// Safety-net poll: every 90 seconds (only while the tab is visible),
// quietly reload the fast-moving tables in case a realtime event was missed.
setInterval(async () => {
  if (!state.currentUser || document.hidden) return;
  try {
    await saveTable('applications');
    await saveTable('loans');
    await saveTable('payments');
    await saveTable('clients');
    refreshViewIfIdle();
  } catch (e) { /* offline — try again next round */ }
}, 90000);

function unreadNotifications() {
  return state.notifications.filter(n => !n.readAt);
}

function updateNotificationBadge() {
  const count = unreadNotifications().length;
  const badges = [document.getElementById('notification-badge'), document.getElementById('mobile-notification-badge')];
  badges.forEach(badge => {
    if (!badge) return;
    if (count > 0) {
      badge.textContent = count > 99 ? '99+' : String(count);
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
  });
  // Update tab title
  if (count > 0) {
    document.title = `(${count}) ${window._originalTitle}`;
  } else {
    document.title = window._originalTitle;
  }
}

function playNotificationSound() {
  if (!window._notificationSoundEnabled) return;
  try {
    // Short chime using Web Audio API - no external file needed
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1108, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
    // Also try browser Notification API if permission granted
    if ('Notification' in window && Notification.permission === 'granted' && document.hidden) {
      const latest = state.notifications[0];
      if (latest) {
        new Notification(latest.title, { body: latest.message, icon: '/favicon.svg' });
      }
    }
  } catch (e) { /* silent */ }
}

function notifTimeAgo(iso) {
  const now = Date.now();
  const then = new Date(iso).getTime();
  const seconds = Math.floor((now - then) / 1000);
  if (seconds < 60) return 'Just now';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  if (days < 7) return `${days}d ago`;
  return new Date(iso).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

const VAPID_PUBLIC_KEY = 'BAUK2hUBRAvoQXWQN_GcVXJst-LseRAzvD2FlP32XvjOITFXL3efEh2l_srUdKIj_x3ZvpM_pKnXfx5N7LAqh0I';
const PUSH_FN_URL = SUPABASE_URL + '/functions/v1/send-push';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

function pushSupported() {
  return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
}

async function pushEnabledOnDevice() {
  if (!pushSupported()) return false;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    return !!sub;
  } catch (e) { return false; }
}

async function subscribeToPush() {
  if (!pushSupported()) {
    showAlert('Your browser does not support push notifications.', 'Not supported');
    return false;
  }
  if (!state.currentUser) {
    showAlert('You must be signed in.', 'Not signed in');
    return false;
  }

  const permission = await Notification.requestPermission();
  if (permission !== 'granted') {
    showAlert('Notification permission not granted. You can change this in your browser settings.', 'Permission denied');
    return false;
  }

  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    const subJson = sub.toJSON();
    const deviceLabel = getDeviceLabel();
    const { error } = await db.from('push_subscriptions').upsert({
      user_id: state.currentUser.id,
      endpoint: sub.endpoint,
      p256dh: subJson.keys.p256dh,
      auth: subJson.keys.auth,
      user_agent: navigator.userAgent,
      device_label: deviceLabel
    }, { onConflict: 'endpoint' });
    if (error) { showAlert('Could not save subscription: ' + error.message); return false; }
    showAlert('Push notifications are now enabled on this device.', 'Enabled');
    render();
    return true;
  } catch (e) {
    console.error('subscribeToPush error:', e);
    showAlert('Could not enable push: ' + e.message);
    return false;
  }
}

async function unsubscribeFromPush() {
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      await db.from('push_subscriptions').delete().eq('endpoint', sub.endpoint);
      await sub.unsubscribe();
    }
    showAlert('Push notifications disabled on this device.', 'Disabled');
    render();
  } catch (e) {
    showAlert('Could not disable push: ' + e.message);
  }
}

function getDeviceLabel() {
  const ua = navigator.userAgent;
  let device = 'Unknown Device';
  if (/iPhone/.test(ua)) device = 'iPhone';
  else if (/iPad/.test(ua)) device = 'iPad';
  else if (/Android/.test(ua)) device = 'Android';
  else if (/Windows/.test(ua)) device = 'Windows PC';
  else if (/Mac/.test(ua)) device = 'Mac';
  else if (/Linux/.test(ua)) device = 'Linux';
  let browser = '';
  if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) browser = 'Chrome';
  else if (/Firefox\//.test(ua)) browser = 'Firefox';
  else if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) browser = 'Safari';
  else if (/Edg\//.test(ua)) browser = 'Edge';
  else if (/SamsungBrowser\//.test(ua)) browser = 'Samsung Internet';
  return browser ? `${device} (${browser})` : device;
}

// Shrink photos in the browser before upload. A phone camera photo is
// 4–12MB; a document is perfectly readable at ~1600px / ~250KB. This makes
// uploads roughly 10–20x faster and far more reliable on mobile data.
async function compressImageFile(file, maxDim = 1600, quality = 0.8) {
  if (!file.type || !file.type.startsWith('image/')) return file; // PDFs etc. untouched
  if (file.size < 400 * 1024) return file; // already small
  try {
    const bitmap = await createImageBitmap(file);
    const scale = Math.min(1, maxDim / Math.max(bitmap.width, bitmap.height));
    const w = Math.max(1, Math.round(bitmap.width * scale));
    const h = Math.max(1, Math.round(bitmap.height * scale));
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
    if (blob && blob.size < file.size) {
      return new File([blob], (file.name || 'photo').replace(/\.[^.]+$/, '') + '.jpg', { type: 'image/jpeg' });
    }
    return file;
  } catch (e) {
    console.warn('Compression skipped:', e);
    return file; // never block the upload because compression failed
  }
}

// Upload with automatic retries (handles brief mobile network drops)
async function uploadWithRetry(path, file, attempts = 3) {
  let lastErr = null;
  for (let a = 1; a <= attempts; a++) {
    const { error } = await db.storage.from('kyc-documents').upload(path, file, { contentType: file.type, upsert: true });
    if (!error) return;
    lastErr = error;
    if (a < attempts) await new Promise(r => setTimeout(r, 1500 * a)); // 1.5s, 3s backoff
  }
  throw new Error(lastErr ? lastErr.message : 'Upload failed');
}

// Matches an application to an existing client by ID number and sums up
// what that client still owes, for the repeat-borrower warning.
function applicationClientRisk(app) {
  const idNum = (app.idNumber || '').trim();
  if (!idNum) return null;
  const client = state.clients.find(c => (c.idNumber || '').trim() === idNum);
  if (!client) return null;
  const openLoans = state.loans.filter(l => l.clientId === client.id && l.status !== 'Completed' && l.status !== 'Written Off');
  const today_ = today();
  let arrears = 0, oldestDays = 0;
  openLoans.forEach(l => ensureSchedule(l).forEach(s => {
    const bal = s.amountDue - s.amountPaid;
    if (bal > 0.01 && s.dueDate < today_) {
      arrears += bal;
      oldestDays = Math.max(oldestDays, daysBetween(s.dueDate, today_));
    }
  }));
  const outstanding = openLoans.reduce((s, l) => s + loanOutstanding(l.id), 0);
  const badHistory = state.loans.some(l => l.clientId === client.id && (l.status === 'Defaulted' || l.status === 'Written Off'));
  return { client, outstanding, arrears, oldestDays, badHistory, openLoanCount: openLoans.length };
}

function applicationRiskBanner(app) {
  if (app.status !== 'Pending') return '';
  const risk = applicationClientRisk(app);

  const viewBtn = `<button onclick="closeModal(); openClientDetail('${risk.client.id}')" class="underline font-medium">View client record</button>`;
  if (risk.arrears > 0.01 || risk.badHistory) {

}

        <span id="apply-btn-${d.key}" class="btn-secondary text-sm cursor-pointer inline-flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3" stroke-width="2"/></svg>
          ${d.multiple ? 'Add pages' : 'Take / choose photo'}

  ['app-fullName','app-idNumber','app-phone','app-repaymentDate'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateApplySubmitState);
  });
  document.getElementById('app-repaymentDate').addEventListener('change', updateApplySubmitState);
}

function applyRepayMinDate() {
  const d = new Date(); d.setDate(d.getDate() + 1);
  return d.toISOString().split('T')[0];
}

function applyRepayMaxDate() {
  const d = new Date(); d.setMonth(d.getMonth() + 1);
  return d.toISOString().split('T')[0];
}

function applyRepayDateProblem(value) {
  if (!value) return 'repayment date (your payday)';
  if (value < applyRepayMinDate() || value > applyRepayMaxDate()) return 'repayment date must be within one month from today';
  return null;
}

function handleApplyFile(input, key, multiple) {
  const files = Array.from(input.files || []);
  input.value = ''; // allow re-selecting / adding more later
  if (files.length === 0) return;
  for (const f of files) {
    if (f.size > 10 * 1024 * 1024) { alert(`File "${f.name}" is too large. Maximum 10MB per file.`); return; }
  }
  if (multiple) {
    const existing = window._applyUploads[key] || [];
    if (existing.length + files.length > 60) { alert('Maximum 60 pages per document.'); return; }
    window._applyUploads[key] = existing.concat(files);
  } else {
    window._applyUploads[key] = [files[0]];
  }
  renderApplyPreview(key, multiple);
  updateApplySubmitState();
}

function removeApplyFile(key, index, multiple) {
  (window._applyUploads[key] || []).splice(index, 1);
  renderApplyPreview(key, multiple);
  updateApplySubmitState();
}

function renderApplyPreview(key, multiple) {
  const files = window._applyUploads[key] || [];
  const el = document.getElementById(`apply-preview-${key}`);
  const btn = document.getElementById(`apply-btn-${key}`);
  if (!el) return;
  if (files.length === 0) { el.innerHTML = ''; return; }
  if (multiple && btn) btn.lastChild.textContent = ' Add more pages';
  const items = files.map((f, i) => {
    const removeBtn = `<button onclick="removeApplyFile('${key}', ${i}, ${multiple})" style="position:absolute; top:-6px; right:-6px; width:22px; height:22px; border-radius:9999px; background:#dc2626; color:#fff; font-size:12px; line-height:22px; text-align:center;">✕</button>`;
    if (f.type.startsWith('image/')) {
      const url = URL.createObjectURL(f);
      return `<div style="position:relative;">
        <img src="${url}" style="width:100%; height:80px; object-fit:cover; border-radius:8px; border:1px solid #e2e8f0;">
        ${multiple ? `<div style="position:absolute; bottom:2px; left:4px; background:rgba(0,0,0,0.6); color:#fff; font-size:10px; padding:1px 5px; border-radius:4px;">Pg ${i + 1}</div>` : ''}
        ${removeBtn}
      </div>`;
    }
    return `<div style="position:relative;" class="bg-white border border-slate-200 rounded-lg p-2 text-xs text-slate-700 truncate">📄 ${escapeHtml(f.name)}${removeBtn}</div>`;
  }).join('');
  el.innerHTML = `
    <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;">${items}</div>
    <div class="text-xs text-green-700 mt-2">✓ ${files.length} ${multiple ? 'page(s) added' : 'photo added'}</div>
  `;
}

function updateApplySubmitState() {
  const btn = document.getElementById('apply-submit-btn');
  const hint = document.getElementById('apply-hint');
  if (!btn) return;
  const name = (document.getElementById('app-fullName')?.value || '').trim();
  const idNum = (document.getElementById('app-idNumber')?.value || '').trim();
  const phone = (document.getElementById('app-phone')?.value || '').trim();
  const consent = document.getElementById('app-consent')?.checked;
  const repayDate = (document.getElementById('app-repaymentDate')?.value || '').trim();
  const disbMethod = document.getElementById('app-disbMethod')?.value || '';
  const repayMethod = document.getElementById('app-repayMethod')?.value || '';
  const problems = [];
  if (!name) problems.push('full name');
  if (!idNum) problems.push('ID number');
  if (!phone) problems.push('WhatsApp number');
  const repayProblem = applyRepayDateProblem(repayDate);
  if (repayProblem) problems.push(repayProblem);
  if (!disbMethod) problems.push('how to receive the money');
  if (!repayMethod) problems.push('repayment method');
  if (!consent) problems.push('consent tick');
  btn.disabled = problems.length > 0;
  if (hint) hint.textContent = problems.length ? 'Still needed: ' + problems.join('; ') : 'Ready to submit ✓';
}

async function submitApplication() {
  const btn = document.getElementById('apply-submit-btn');
  const name = document.getElementById('app-fullName').value.trim();
  const idNum = document.getElementById('app-idNumber').value.trim().replace(/\s/g, '');
  const phoneDigits = namibianDigits(document.getElementById('app-phone').value);
  const phoneRaw = '+264' + phoneDigits;
  const amount = parseFloat(document.getElementById('app-amount').value) || null;
  const repaymentDate = document.getElementById('app-repaymentDate').value;
  const disbMethod = document.getElementById('app-disbMethod').value;
  const repayMethod = document.getElementById('app-repayMethod').value;
  if (!/^\d{9,13}$/.test(idNum)) { alert('Please check your ID number — it should be the digits on your Namibian ID.'); return; }
  if (phoneDigits.length < 7 || phoneDigits.length > 9) { alert('Please check your mobile number — enter it without the first 0, for example 81 234 5678.'); return; }
  if (applyRepayDateProblem(repaymentDate)) { alert('Please choose your repayment date — the day you get paid. It must be within one month from today.'); return; }
  if (!disbMethod || !repayMethod) { alert('Please choose how you would like to receive the money and how you will repay.'); return; }

  btn.disabled = true;
  // Keep the same application ID and completed-upload record across retries,
  // so tapping Submit again RESUMES instead of re-uploading everything.
  if (!window._applyAppId) {
    window._applyAppId = (crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16); }));
    window._applyDone = {};
  }
  const appId = window._applyAppId;
  const record = {
    id: appId,
    full_name: name,
    id_number: idNum,
    phone: phoneRaw,
    amount_requested: amount,
    status: 'Pending',
    document_pages: { _repayment_date: repaymentDate, _disbursement_method: disbMethod, _repayment_method: repayMethod }
  };
  const urlMap = { selfie: 'selfie_url', id_front: 'id_front_url', id_back: 'id_back_url', income_document: 'income_document_url', bank_statement: 'bank_statement_url' };
  const totalFiles = APPLY_DOC_TYPES.reduce((s, d) => s + (window._applyUploads[d.key] || []).length, 0);
  let done = 0;

  try {
    for (const d of APPLY_DOC_TYPES) {
      const files = window._applyUploads[d.key] || [];
      const uploadedUrls = [];
      for (let i = 0; i < files.length; i++) {
        const doneKey = `${d.key}_${i}_${files[i].name}_${files[i].size}`;
        // Skip files that already uploaded successfully on a previous attempt
        if (window._applyDone[doneKey]) {
          uploadedUrls.push(window._applyDone[doneKey]);
          done++;
          continue;
        }
        btn.textContent = `Preparing ${done + 1} of ${totalFiles}...`;
        const file = await compressImageFile(files[i]);
        btn.textContent = `Uploading ${done + 1} of ${totalFiles}...`;
        const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
        const path = `applications/${appId}/${d.key}_${i}.${ext}`;
        await uploadWithRetry(path, file).catch(e => { throw new Error(`Failed to upload ${d.label} (page ${i + 1}): ${e.message}`); });
        const { data: urlData } = db.storage.from('kyc-documents').getPublicUrl(path);
        window._applyDone[doneKey] = urlData.publicUrl;
        uploadedUrls.push(urlData.publicUrl);
        done++;
      }
      if (uploadedUrls.length > 0) {
        record[urlMap[d.key]] = uploadedUrls[0];
        if (uploadedUrls.length > 1) record.document_pages[d.key] = uploadedUrls.slice(1);
      }
    }

    btn.textContent = 'Submitting...';
    const { error: insErr } = await db.from('loan_applications').insert(record);
    if (insErr) throw new Error('Could not submit application: ' + insErr.message);

    // Notify staff (in-app bell + push)
    try {
      const msg = `ID ${idNum} · ${phoneRaw}` + (amount ? ` · Requested ${fmt(amount)}` : '') + ` · Repay ${repaymentDate}`;
      await db.rpc('create_broadcast_notification', {
        p_event_type: 'application_submitted',
        p_title: `${name} submitted a loan application`,
        p_message: msg,
        p_client_id: null,
        p_loan_id: null
      });
      await dispatchPush({
        event_type: 'application_submitted',
        title: `${name} submitted a loan application`,
        message: msg
      });
    } catch (e) { console.warn('Notification create failed:', e); }

    document.getElementById('public-container').innerHTML = `
      <div class="max-w-md mx-auto text-center py-12">
        <div class="w-16 h-16 bg-green-100 rounded-full mx-auto flex items-center justify-center mb-4">
          <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 class="text-xl font-bold text-slate-900">Application Received</h1>
        <p class="text-sm text-slate-600 mt-2">Thank you, ${escapeHtml(name)}.</p>
        <p class="text-sm text-slate-600 mt-1">Your reference number is <strong>APP-${appId.substring(0, 8).toUpperCase()}</strong>.</p>
        <p class="text-sm text-slate-600 mt-1">GPL Finance will review your application and contact you on WhatsApp.</p>
      </div>
    `;
  } catch (e) {
    alert(e.message + '\n\nPlease check your network signal and tap "Submit Application" again — pages already uploaded will NOT be re-uploaded, it will continue from where it stopped.');
    btn.disabled = false;
    btn.textContent = 'Submit Application';
  }
}

function applicationDocGallery(app) {
  const pages = app.documentPages || {};
  const urlMap = { selfie: app.selfieUrl, id_front: app.idFrontUrl, id_back: app.idBackUrl, income_document: app.incomeDocumentUrl, bank_statement: app.bankStatementUrl };
  const blank = 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==';
  return APPLY_DOC_TYPES.map(d => {
    const all = [urlMap[d.key], ...(pages[d.key] || [])].filter(u => u);
    if (all.length === 0) return `<div class="text-xs text-red-700">✗ ${d.label}: missing</div>`;
    const thumbs = all.map((u, i) => {
      const isPdf = /\.pdf(\?|$)/i.test(u);
      return `<a href="#" onclick="event.preventDefault(); viewDocument('${u}', '${d.key}')" style="display:block; position:relative;">
        ${isPdf
          ? `<div class="bg-slate-100 border border-slate-200 rounded-lg flex items-center justify-center" style="height:90px; font-size:24px;">📄</div>`
          : `<img data-signsrc="${u}" src="${blank}" loading="lazy" style="width:100%; height:90px; object-fit:cover; border-radius:8px; border:1px solid #e2e8f0; background:#f1f5f9;">`}
        ${all.length > 1 ? `<div style="position:absolute; bottom:2px; left:4px; background:rgba(0,0,0,0.6); color:#fff; font-size:10px; padding:1px 5px; border-radius:4px;">Pg ${i + 1}</div>` : ''}
      </a>`;
    }).join('');
    return `
      <div>
        <div class="text-xs font-medium text-slate-700 mb-1">${d.label} <span class="text-slate-400">(${all.length} page${all.length > 1 ? 's' : ''} — click to open)</span></div>
        <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:8px;">${thumbs}</div>
      </div>
    `;
  }).join('');
}

            <button onclick="approveApplication('${app.id}')" class="btn-primary bg-green-700 hover:bg-green-800">Approve &amp; Create Client</button>
          ` : ''}
          ${app.status === 'Rejected' ? `
            <button onclick="deleteApplication('${app.id}')" class="btn-secondary text-red-700">Delete</button>
            <button onclick="notifyApplicantRejection('${app.id}')" class="btn-primary">Notify via WhatsApp</button>
          ` : ''}
          ${app.status === 'Approved' && linkedClient ? `
            <button onclick="closeModal(); openLoanForm(null, '${linkedClient.id}')" class="btn-primary">Issue Loan</button>
          ` : ''}
          <button onclick="closeModal()" class="btn-secondary">Close</button>
        </div>
      </div>
    </div>
  `;
  setTimeout(hydrateApplicationDocThumbs, 50);
}

async function analyzeApplicationStatement(appId) {
  const app = (state.applications || []).find(a => a.id === appId);
  if (!app) return;
  const pages = app.documentPages || {};
  const urls = [
    app.bankStatementUrl, ...(pages.bank_statement || []),
    app.incomeDocumentUrl, ...(pages.income_document || [])
  ].filter(u => u);
  if (!urls.length) { showAlert('No bank statement on this application.'); return; }
  const btn = document.getElementById('ai-analyze-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Analyzing — 30–90 seconds...'; }
  try {
    const { data: sessionData } = await db.auth.getSession();
    const token = sessionData?.session?.access_token;
    const resp = await fetch(ANALYZE_FN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ urls, applicant_name: app.fullName, amount_requested: app.amountRequested || null })
    });
    const out = await resp.json();
    if (!resp.ok) throw new Error(out.error || 'Analysis failed');
    const { error } = await db.from('loan_applications').update({ ai_analysis: out, analyzed_at: new Date().toISOString() }).eq('id', appId);
    if (error) throw new Error('Analysis done but could not be saved: ' + error.message);
    await logAudit('analyze', 'application', appId, { applicant: app.fullName });
    await saveTable('applications');
    openApplicationReview(appId);
  } catch (e) {
    showAlert('Analysis failed: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Analyze Statement with AI'; }
  }
}

async function approveApplication(appId) {
  if (!requirePerm('create', 'clients')) return;
  const app = (state.applications || []).find(a => a.id === appId);
  if (!app || app.status !== 'Pending') return;

  // Guard against duplicate client records
  const existing = state.clients.find(c => (c.idNumber || '').trim() === (app.idNumber || '').trim());
  const finalize = async (clientId, createdNew) => {
    const { error } = await db.from('loan_applications').update({
      status: 'Approved',
      client_id: clientId,
      reviewed_by: state.currentUser?.id || null,
      reviewed_at: new Date().toISOString()
    }).eq('id', appId);
    if (error) { showAlert('Could not update application: ' + error.message); return; }
    await logAudit('approve', 'application', appId, { applicant: app.fullName, clientId, createdNew });
    try {
      await db.rpc('create_broadcast_notification', {
        p_event_type: 'application_approved',
        p_title: `Application from ${app.fullName} approved`,
        p_message: createdNew ? 'New client created from application' : 'Application linked to existing client',
        p_client_id: clientId,
        p_loan_id: null
      });
    } catch (e) { console.warn('Notification create failed:', e); }
    await saveTable('applications');
    await saveTable('clients');
    render();
    buildNav();
    confirmAction(
      `Application approved and client record ${createdNew ? 'created' : 'linked'} for ${app.fullName}.\n\nProceed to issue a loan now?`,
      () => openLoanForm(null, clientId),
      'Issue Loan Now',
      'bg-green-700 hover:bg-green-800'
    );
  };

  if (existing) {
    const risk = applicationClientRisk(app);
    const arrearsWarning = risk && (risk.arrears > 0.01 || risk.badHistory)
      ? `\n\n⚠ WARNING: ${risk.arrears > 0.01 ? `This client currently owes ${fmt(risk.arrears)} in overdue instalments (oldest ${risk.oldestDays} day(s) late).` : ''}${risk.badHistory ? ' This client has a defaulted or written-off loan on record.' : ''}`
      : '';
    confirmAction(
      `A client with ID ${app.idNumber} already exists: ${existing.fullName}.${arrearsWarning}\n\nApprove and link this application to the existing client? (The existing client's documents will not be changed — the application documents remain viewable here.)`,
      () => finalize(existing.id, false),
      'Link to Existing Client',
      'bg-green-700 hover:bg-green-800'
    );
    return;
  }

  confirmAction(
    `Approve this application and create a new client record for ${app.fullName}?\n\nThe uploaded documents will be attached to the client's KYC file.`,
    async () => {
      const pages = app.documentPages || {};
      const sources = {};
      ['selfie', 'id_front', 'id_back', 'income_document', 'bank_statement'].forEach(k => { sources[k] = 'client'; });
      const record = {
        full_name: app.fullName,
        id_number: app.idNumber,
        phone: app.phone,
        status: 'Active',
        registration_date: today(),
        created_by: state.currentUser?.id || null,
        selfie_url: app.selfieUrl || null,
        id_front_url: app.idFrontUrl || null,
        id_back_url: app.idBackUrl || null,
        income_document_url: app.incomeDocumentUrl || null,
        bank_statement_url: app.bankStatementUrl || null,
        document_pages: pages,
        document_sources: sources,
        document_reviews: {},
        documents_uploaded_at: app.submittedAt || new Date().toISOString()
      };
      record.kyc_status = computeKycStatus(snakeToCamel(record));
      const { data, error } = await db.from('clients').insert(record).select().single();
      if (error) { showAlert('Could not create client: ' + error.message); return; }
      await logAudit('create', 'client', data.id, { fullName: app.fullName, idNumber: app.idNumber, phone: app.phone, source: 'online_application' });
      await finalize(data.id, true);
    },
    'Approve & Create Client',
    'bg-green-700 hover:bg-green-800'
  );
}

function applicationMissingDocs(app) {
  const pages = app.documentPages || {};
  const urlMap = { selfie: app.selfieUrl, id_front: app.idFrontUrl, id_back: app.idBackUrl, income_document: app.incomeDocumentUrl, bank_statement: app.bankStatementUrl };
  return APPLY_DOC_TYPES.filter(d => [urlMap[d.key], ...(pages[d.key] || [])].filter(u => u).length === 0).map(d => d.label);
}

function requestMissingApplicationDocs(appId) {
  const app = (state.applications || []).find(a => a.id === appId);
  if (!app) return;
  const missing = applicationMissingDocs(app);
  if (!missing.length) return;
  const firstName = (app.fullName || '').split(' ')[0];
  const message =
    `Hello ${firstName},\n\n` +
    `Thank you for your loan application to GPL Finance (Ref: ${applicationRef(app)}).\n\n` +
    `To continue processing it, we still need the following document${missing.length > 1 ? 's' : ''}:\n` +
    missing.map(m => `• ${m}`).join('\n') + `\n\n` +
    `Please reply to this message with clear photos. Your application remains open — no need to apply again.\n\n` +
    `Kind regards,\nGPL Finance`;
  logAudit('request_docs', 'application', appId, { missing });
  openWhatsApp(app.phone, message);
}

function openRejectApplication(appId) {
  const app = (state.applications || []).find(a => a.id === appId);
  if (!app) return;
  const missingDocs = applicationMissingDocs(app);
  const missingReason = missingDocs.length
    ? `Missing documents: ${missingDocs.join(', ')}. Please send us these documents on WhatsApp, or submit a new application with them attached.`
    : null;
  const quickReasons = [
    'Affordability — income does not support the requested loan',
    'Bank statement incomplete — full 3 months required',
    'Documents unclear or unreadable — please re-take photos',
    'ID details could not be verified',
    'Existing loan in arrears must be settled first'
  ];
  document.getElementById('modal-container').innerHTML = `
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4" onclick="if(event.target===this) closeModal()">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-lg">
        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
          <h2 class="font-semibold text-lg">Reject Application</h2>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <div class="p-6 space-y-4">
          <div class="text-sm text-slate-600">Rejecting application <strong>${applicationRef(app)}</strong> from <strong>${escapeHtml(app.fullName)}</strong>. The reason below is saved on record and included in the WhatsApp message to the applicant.</div>
          <div>
            <label>Reason for rejection *</label>
            <textarea id="reject-reason" rows="3" placeholder="Type a reason or pick one below"></textarea>
          </div>
          ${missingReason ? `
          <div class="bg-red-50 border border-red-200 rounded-lg p-3">
            <div class="text-xs font-medium text-red-900 mb-2">This application is missing: ${escapeHtml(missingDocs.join(', '))}</div>
            <button onclick="document.getElementById('reject-reason').value=${JSON.stringify(missingReason).replace(/"/g, '&quot;')}" class="text-xs bg-white border border-red-300 text-red-800 hover:bg-red-100 rounded-full px-3 py-1.5">Use missing documents as the reason</button>
          </div>` : ''}
          <div class="flex flex-wrap gap-2">
            ${quickReasons.map(r => `<button onclick="document.getElementById('reject-reason').value=${JSON.stringify(r).replace(/"/g, '&quot;')}" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-full px-3 py-1.5 text-left">${escapeHtml(r)}</button>`).join('')}
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
          <button onclick="openApplicationReview('${app.id}')" class="btn-secondary">Back</button>
          <button onclick="confirmRejectApplication('${app.id}')" class="btn-primary bg-red-600 hover:bg-red-700">Reject Application</button>
        </div>

}

async function confirmRejectApplication(appId) {
  const app = (state.applications || []).find(a => a.id === appId);
  if (!app) return;
  const reason = (document.getElementById('reject-reason')?.value || '').trim();
  if (!reason) { showAlert('Please enter a reason for the rejection.'); return; }
  const { error } = await db.from('loan_applications').update({
    status: 'Rejected',
    rejection_reason: reason,
    reviewed_by: state.currentUser?.id || null,
    reviewed_at: new Date().toISOString()
  }).eq('id', appId);
  if (error) { showAlert('Could not reject application: ' + error.message); return; }
  await logAudit('reject', 'application', appId, { applicant: app.fullName, reason });
  await saveTable('applications');
  render();
  buildNav();
  app.status = 'Rejected';
  app.rejectionReason = reason;
  notifyApplicantRejection(appId);
}

function notifyApplicantRejection(appId) {
  const app = (state.applications || []).find(a => a.id === appId);
  if (!app) return;
  const firstName = (app.fullName || '').split(' ')[0];
  const message =
    `Dear ${firstName},\n\n` +
    `Thank you for your loan application to GPL Finance (Ref: ${applicationRef(app)}).\n\n` +
    `After careful review, we regret to inform you that your application was not successful at this time.\n\n` +
    `Reason: ${app.rejectionReason || 'Requirements not met'}\n\n` +
    `You are welcome to contact us for more information, or to apply again once the above has been addressed.\n\n` +
    `Kind regards,\nGPL Finance`;
  closeModal();
  openWhatsApp(app.phone, message);
}

function deleteApplication(appId) {
  if (state.currentUser?.role !== 'Administrator') { showAlert('Only Administrators can delete applications.'); return; }
  const app = (state.applications || []).find(a => a.id === appId);
  if (!app) return;
  confirmAction(`Delete application ${applicationRef(app)} from ${app.fullName}?\n\nThis cannot be undone.`, async () => {
    const { error } = await db.from('loan_applications').delete().eq('id', appId);
    if (error) { showAlert('Delete failed: ' + error.message); return; }
    await logAudit('delete', 'application', appId, { snapshot: { fullName: app.fullName, idNumber: app.idNumber } });
    await saveTable('applications');
    closeModal();
    render();
    buildNav();
  });
}

state.capital = state.capital || [];

function renderCapital() {
  if (!isCapitalOwner()) return '<div class="card p-8 text-center text-sm text-slate-500">This section is not available on your profile.</div>';
  const entries = (state.capital || []).slice().sort((a, b) => (b.investedOn || '').localeCompare(a.investedOn || ''));
  const total = entries.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);

state.bankStatements = state.bankStatements || [];
state.bankTx = state.bankTx || [];

const RECON_CATEGORIES = ['Repayment', 'Disbursement', 'Bank Charge', 'Capital In', 'Other', 'Skip (do not save)'];

// Cash at Bank card on the main Dashboard (Administrators only).
// Compares the real reconciled balance to the system's estimated cash
// (capital + collections − disbursements) and warns on a large gap.
function renderDashboardBankCard() {
  if (state.currentUser?.role !== 'Administrator') return '';
  const latest = (state.bankStatements || [])[0];
  if (!latest) return '';
  const bankBalance = parseFloat(latest.closingBalance) || 0;
  const totalCapital = (state.capital || []).reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
  const totalCollected = state.payments.reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
  const totalDisb = state.loans.reduce((s, l) => s + (parseFloat(l.principal) || 0), 0);
  const estimatedCash = totalCapital + totalCollected - totalDisb;
  const variance = bankBalance - estimatedCash;
  // Warn when the gap exceeds N$500 AND 10% of the estimate (avoids noise on small books)
  const bigGap = Math.abs(variance) > 500 && (estimatedCash === 0 || Math.abs(variance) / Math.max(Math.abs(estimatedCash), 1) > 0.10);
  return `
    <div class="card p-5 mb-6 ${bigGap ? 'bg-amber-50 border-amber-200' : 'bg-green-50 border-green-200'}">
      <div class="flex justify-between items-center flex-wrap gap-3">
        <div>
          <div class="text-xs font-medium ${bigGap ? 'text-amber-900' : 'text-green-900'} uppercase">Cash at Bank (reconciled)</div>
          <div class="text-2xl font-bold ${bigGap ? 'text-amber-900' : 'text-green-900'} mt-1">${fmt(bankBalance)}</div>
          <div class="text-xs ${bigGap ? 'text-amber-700' : 'text-green-700'} mt-1">${escapeHtml(latest.label)} · imported ${fmtDate(latest.createdAt)}</div>
          ${bigGap ? `<div class="text-xs text-amber-800 mt-2"><strong>⚠ ${fmt(Math.abs(variance))} ${variance < 0 ? 'below' : 'above'}</strong> the system estimate of ${fmt(estimatedCash)} — check for unrecorded expenses, cash on hand, or payments not yet captured.</div>` : `<div class="text-xs text-green-700 mt-1">Close to the system estimate of ${fmt(estimatedCash)} ✓</div>`}
        </div>
        <button onclick="navigate('bankrecon')" class="btn-secondary text-sm">Open Bank Recon</button>
      </div>
    </div>
  `;
}

function handleReconFiles(input) {

  el.innerHTML = `<div class="text-sm text-green-700 bg-green-50 border border-green-200 rounded p-2">✓ ${files.length} file(s) selected: ${files.map(f => escapeHtml(f.name)).join(', ')}</div>`;
  btn.disabled = false;
}

async function extractBankStatement() {
  const files = window._reconFiles || [];
  if (!files.length) return;
  const btn = document.getElementById('recon-extract-btn');
  const status = document.getElementById('recon-status');
  btn.disabled = true;
  status.textContent = 'Preparing files...';
  try {
    let body;
    const first = files[0];
    if (/\.csv$|\.txt$/i.test(first.name) || first.type === 'text/csv' || first.type === 'text/plain') {
      body = { text: await first.text() };
    } else {
      const payload = [];
      for (let i = 0; i < files.length; i++) {
        status.textContent = `Preparing page ${i + 1} of ${files.length}...`;
        const f = files[i].type === 'application/pdf' ? files[i] : await compressImageFile(files[i]);
        const b64 = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(',')[1]);
          r.onerror = () => rej(new Error('Could not read file'));
          r.readAsDataURL(f);
        });
        payload.push({ data: b64, mime_type: f.type || 'image/jpeg' });
      }
      body = { files: payload };
    }
    status.textContent = 'Reading statement with AI — this takes 20–60 seconds...';
    const { data: sessionData } = await db.auth.getSession();
    const token = sessionData?.session?.access_token;
    const resp = await fetch(RECON_FN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'apikey': SUPABASE_KEY },
      body: JSON.stringify(body)
    });
    const result = await resp.json();
    if (!resp.ok) throw new Error(result.error || 'Extraction failed');
    const txs = (result.transactions || []).map(t => ({
      txDate: t.date || null,
      description: t.description || '',
      amount: parseFloat(t.amount) || 0
    }));
    if (!txs.length) throw new Error('No transactions found. Try a clearer photo or the CSV export from your banking app.');
    window._reconExtracted = txs.map(t => ({ ...t, ...suggestReconCategory(t) }));
    window._reconClosing = result.closing_balance;
    status.innerHTML = `<span class="text-green-700">✓ ${txs.length} transactions extracted. Review below, correct anything the AI got wrong, then save.</span>`;
    renderReconReview();
  } catch (e) {
    status.innerHTML = `<span class="text-red-700">✗ ${escapeHtml(e.message)}</span>`;
  }
  btn.disabled = false;
}

function reconDateNear(a, b, days) {
  if (!a || !b) return false;
  return Math.abs(new Date(a) - new Date(b)) <= days * 86400000;
}

function suggestReconCategory(tx) {
  const amt = Math.abs(tx.amount);
  window._reconUsedPayments = window._reconUsedPayments || new Set();
  window._reconUsedLoans = window._reconUsedLoans || new Set();
  if (tx.amount < 0 && amt <= 500 && /fee|charge|comm|service|admin|levy|sms|subscription|monthly acc/i.test(tx.description)) {
    return { category: 'Bank Charge' };
  }
  if (tx.amount > 0) {
    const pay = state.payments.find(p => !window._reconUsedPayments.has(p.id) && Math.abs(p.amount - amt) < 0.01 && reconDateNear(p.paymentDate, tx.txDate, 5));
    if (pay) { window._reconUsedPayments.add(pay.id); return { category: 'Repayment', matchedPaymentId: pay.id }; }
    const cap = (state.capital || []).find(c => Math.abs(c.amount - amt) < 0.01 && reconDateNear(c.investedOn, tx.txDate, 7));
    if (cap) return { category: 'Capital In' };
    return { category: 'Other' };
  }
  const loan = state.loans.find(l => !window._reconUsedLoans.has(l.id) && Math.abs(l.principal - amt) < 0.01 && reconDateNear(l.disbursementDate, tx.txDate, 5));
  if (loan) { window._reconUsedLoans.add(loan.id); return { category: 'Disbursement', matchedLoanId: loan.id }; }
  return { category: 'Other' };
}

function reconMatchLabel(t) {
  if (t.matchedPaymentId) {
    const p = state.payments.find(x => x.id === t.matchedPaymentId);
    if (p) { const c = state.clients.find(x => x.id === state.loans.find(l => l.id === p.loanId)?.clientId); return '✓ Payment ' + paymentRef(p) + (c ? ' — ' + c.fullName : ''); }
  }
  if (t.matchedLoanId) {
    const l = state.loans.find(x => x.id === t.matchedLoanId);
    if (l) { const c = state.clients.find(x => x.id === l.clientId); return '✓ Loan ' + loanRef(l) + (c ? ' — ' + c.fullName : ''); }
  }
  return '';
}

async function saveReconciliation() {
  const txs = (window._reconExtracted || []).filter(t => t.category !== 'Skip (do not save)');
  const label = (document.getElementById('recon-label')?.value || '').trim();
  const closing = parseFloat(document.getElementById('recon-closing')?.value);
  if (!label) { showAlert('Please give the statement a name (e.g. FNB June 2026).'); return; }
  if (!txs.length) { showAlert('There are no transactions to save.'); return; }
  const { data: st, error: stErr } = await db.from('bank_statements').insert({
    label,
    closing_balance: isNaN(closing) ? null : closing,
    uploaded_by: state.currentUser?.id || null
  }).select().single();
  if (stErr) { showAlert('Could not save statement: ' + stErr.message); return; }
  const rows = txs.map(t => ({
    statement_id: st.id,
    tx_date: t.txDate || null,
    description: t.description || '',
    amount: t.amount,
    category: t.category,
    matched_payment_id: t.matchedPaymentId || null,
    matched_loan_id: t.matchedLoanId || null
  }));
  const { error: txErr } = await db.from('bank_transactions').insert(rows);
  if (txErr) { showAlert('Could not save transactions: ' + txErr.message); return; }
  await logAudit('create', 'bank_statement', st.id, { label, transactions: rows.length, closingBalance: closing || null });
  window._reconExtracted = null;
  window._reconFiles = null;
  window._reconUsedPayments = null;
  window._reconUsedLoans = null;
  await saveTable('bankStatements');
  await saveTable('bankTx');
  showAlert(`Reconciliation "${label}" saved with ${rows.length} transactions.`, 'Saved');
  render();
}

function deleteBankStatement(stId) {
  const s = (state.bankStatements || []).find(x => x.id === stId);
  if (!s) return;
  confirmAction(`Delete reconciliation "${s.label}" and all its transactions?\n\nThis cannot be undone.`, async () => {
    const { error } = await db.from('bank_statements').delete().eq('id', stId);
    if (error) { showAlert('Delete failed: ' + error.message); return; }

(async function init() {
  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // Listen for updates from the service worker
      navigator.serviceWorker.addEventListener('message', event => {
        if (event.data && event.data.type === 'UPDATE_AVAILABLE') {
          showUpdateBanner();
        }
        if (event.data && event.data.type === 'NOTIFICATION_CLICK') {
          const data = event.data.data || {};
          if (data.loan_id) {
            setTimeout(() => openLoanDetail(data.loan_id), 300);
          } else if (data.client_id) {
            setTimeout(() => openClientDetail(data.client_id), 300);
          }
        }
      });
      // Also check for an update every time the app loads
      reg.update().catch(() => {});
    }).catch(err => console.warn('SW registration failed:', err));
  }
  // Check for public client-facing routes (upload / signature / agreement) - no auth needed
  if (checkPublicRoute()) return;
  // Normal staff auth flow
  const sessionRestored = await restoreSession();
  if (sessionRestored) {
    await loadData();
    await loadNotifications();
    subscribeToNotifications();
    subscribeToDataChanges();
    maybeAutoBackup();
  }
  renderApp();
})();

function showUpdateBanner() {
  // Avoid stacking multiple banners
  if (document.getElementById('update-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.style.cssText = 'position:fixed; top:0; left:0; right:0; z-index:9999; background:#1e40af; color:white; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); font-size:14px;';
  banner.innerHTML = `
    <div style="flex:1;">
      <strong>New version available.</strong>
      <span style="opacity:0.9; margin-left:6px;">Refresh to load the latest features.</span>
    </div>
    <div style="display:flex; gap:8px;">
      <button onclick="applyUpdate()" style="background:white; color:#1e40af; border:none; padding:6px 14px; border-radius:6px; font-weight:600; cursor:pointer; font-size:14px;">Refresh</button>
      <button onclick="dismissUpdateBanner()" style="background:transparent; color:white; border:1px solid rgba(255,255,255,0.4); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:14px;">Later</button>
    </div>
  `;
  document.body.appendChild(banner);
}

function applyUpdate() {
  // Tell the SW to activate immediately, then reload
  if (navigator.serviceWorker && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
  }
  setTimeout(() => window.location.reload(), 150);
}

function dismissUpdateBanner() {
  const b = document.getElementById('update-banner');
  if (b) b.remove();
}
</script>
